<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Gestão Patrimonial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; padding: 0; }
        .rounded-premium { border-radius: 2rem; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .tabular { font-variant-numeric: tabular-nums; }
        .no-break { white-space: nowrap; }
        .text-huge { font-size: clamp(1rem, 3.5vw, 1.4rem); line-height: 1.1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        th.sortable { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        th.sortable:hover { background-color: rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="font-bold text-slate-400 animate-pulse uppercase tracking-widest text-xs">A processar Dashboard Analítico...</p>
            </div>
        </div>
    </div>

    <!-- Bibliotecas Necessárias -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            window.firebaseAPI = { db, doc, setDoc, onSnapshot, auth, signInAnonymously, onAuthStateChanged };
        } catch (e) { console.error("Firebase Fail:", e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = window.Recharts;

        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const COLORS = ['#0f172a', '#2563eb', '#10b981', '#8b5cf6', '#f43f5e', '#f59e0b', '#0ea5e9'];

        const parseValue = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'number') return val;
            let clean = val.toString().trim();
            if (clean.includes(',') && clean.includes('.')) {
                clean = clean.replace(/\./g, '').replace(',', '.');
            } else {
                clean = clean.replace(',', '.');
            }
            return parseFloat(clean) || 0;
        };

        const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => { if (window.lucide) { setReady(true); window.lucide.createIcons(); } }, [name]);
            return ready ? <i data-lucide={name} style={{ width: size, height: size }} className={className}></i> : <div style={{ width: size, height: size }}></div>;
        };

        const CategoryDetailCard = ({ label, stats, totalPortfolio, color, icon }) => {
            const pctCarteira = totalPortfolio > 0 ? (stats.atual / totalPortfolio) * 100 : 0;
            
            return (
                <div className="glass p-6 rounded-[2rem] border-l-4 shadow-sm hover:shadow-md transition-all animate-in" style={{ borderColor: color }}>
                    <div className="flex justify-between items-start mb-4">
                        <div className="flex items-center gap-3">
                            <div className="p-2.5 rounded-xl text-white shadow-sm" style={{ backgroundColor: color }}>
                                <LucideIcon name={icon} size={18} />
                            </div>
                            <span className="font-black text-slate-800 uppercase tracking-tight">{label}</span>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fatia Carteira</p>
                            <p className="font-black text-slate-900 tabular text-sm">{pctCarteira.toFixed(1)}%</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1">
                            <p className="text-[9px] font-bold text-slate-400 uppercase">Investido</p>
                            <p className="text-xs font-black text-slate-700 tabular">{formatBRL(stats.investido)}</p>
                        </div>
                        <div className="space-y-1 text-right">
                            <p className="text-[9px] font-bold text-slate-400 uppercase">Valor Atual</p>
                            <p className="text-sm font-black text-slate-900 tabular">{formatBRL(stats.atual)}</p>
                        </div>
                        <div className="space-y-1">
                            <p className="text-[9px] font-bold text-slate-400 uppercase">Lucro Bruto</p>
                            <p className={`text-xs font-black tabular ${stats.lucro >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                {formatBRL(stats.lucro)}
                            </p>
                        </div>
                        <div className="space-y-1 text-right">
                            <p className="text-[9px] font-bold text-slate-400 uppercase">Performance</p>
                            <p className={`text-xs font-black tabular ${stats.lucro >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                {stats.lucroPct.toFixed(2)}%
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const StatHeaderCard = ({ title, value, icon, colorClass, isMobile, subValue = null }) => (
            <div className={`glass p-5 rounded-premium flex ${isMobile ? 'flex-col items-start gap-2' : 'items-center gap-4'} min-w-0 shadow-sm hover:shadow-md transition-all flex-1`}>
                <div className={`${colorClass} p-3 rounded-2xl text-white shadow-lg flex-shrink-0`}>
                    <LucideIcon name={icon} size={24} />
                </div>
                <div className="min-w-0 flex-1">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1 truncate">{title}</p>
                    <h3 className="text-huge font-black text-slate-900 tabular no-break">{value}</h3>
                    {subValue && <p className={`text-[9px] font-bold mt-1 uppercase ${subValue.startsWith('-') ? 'text-rose-500' : 'text-emerald-500'}`}>{subValue}</p>}
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [investments, setInvestments] = useState({ 
                acoes: [], realEstate: [], caixa: [], alternativos: [],
                caixaTicker: [], altFunds: [], altStocks: [], altCrypto: [], dividendos: []
            });
            const [syncStatus, setSyncStatus] = useState("");
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (!window.firebaseAPI) return;
                const { auth, signInAnonymously, onAuthStateChanged, db, doc, onSnapshot } = window.firebaseAPI;
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(doc(db, 'investments', 'portfolio_principal'), (snap) => {
                            if (snap.exists()) setInvestments(prevState => ({...prevState, ...snap.data()}));
                        });
                    }
                });
            }, []);

            const save = async (newData) => {
                if (!window.firebaseAPI) return;
                const { db, doc, setDoc } = window.firebaseAPI;
                await setDoc(doc(db, 'investments', 'portfolio_principal'), newData);
            };

            const getSectionStats = (list, type = 'ticker') => {
                let investido = 0; let atual = 0;
                if (type === 'ticker') {
                    investido = (list || []).reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoMedio)), 0);
                    atual = (list || []).reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoAtual)), 0);
                } else {
                    investido = (list || []).reduce((acc, i) => acc + parseValue(i.valorAplicado), 0);
                    atual = (list || []).reduce((acc, i) => acc + parseValue(i.valorAtual), 0);
                }
                const lucro = atual - investido;
                const lucroPct = investido > 0 ? (lucro / investido) * 100 : 0;
                return { investido, atual, lucro, lucroPct };
            };

            const totals = useMemo(() => {
                const acoes = getSectionStats(investments.acoes, 'ticker');
                const re = getSectionStats(investments.realEstate, 'ticker');
                
                const sCaixaM = getSectionStats(investments.caixa, 'manual');
                const sCaixaT = getSectionStats(investments.caixaTicker, 'ticker');
                const caixa = { investido: sCaixaM.investido + sCaixaT.investido, atual: sCaixaM.atual + sCaixaT.atual };
                caixa.lucro = caixa.atual - caixa.investido;
                caixa.lucroPct = caixa.investido > 0 ? (caixa.lucro / caixa.investido) * 100 : 0;

                const sAltF = getSectionStats(investments.altFunds, 'manual');
                const sAltS = getSectionStats(investments.altStocks, 'ticker');
                const sAltC = getSectionStats(investments.altCrypto, 'ticker');
                const alt = { investido: sAltF.investido + sAltS.investido + sAltC.investido, atual: sAltF.atual + sAltS.atual + sAltC.atual };
                alt.lucro = alt.atual - alt.investido;
                alt.lucroPct = alt.investido > 0 ? (alt.lucro / alt.investido) * 100 : 0;

                const total = acoes.atual + re.atual + caixa.atual + alt.atual;
                return { acoes, re, caixa, alt, total };
            }, [investments]);

            const addManual = (cat) => {
                const n = prompt("Nome do Ativo:");
                const va = prompt("Valor Aplicado (R$):");
                const vt = prompt("Valor Atual Hoje (R$):");
                if (!n || va === null) return;
                const item = { id: Date.now().toString(), nome: n, valorAplicado: parseValue(va), valorAtual: parseValue(vt || va) };
                const updated = { ...investments, [cat]: [...(investments[cat] || []), item] };
                setInvestments(updated); save(updated);
            };

            const addTicker = (cat) => {
                const t = prompt("Ticker / Código:");
                const q = prompt("Quantidade:");
                const p = prompt("Preço Médio:");
                if (!t || !q) return;
                const item = { id: Date.now().toString(), ticker: t.toUpperCase(), quantidade: parseValue(q), precoMedio: parseValue(p), precoAtual: parseValue(p) };
                const updated = { ...investments, [cat]: [...(investments[cat] || []), item] };
                setInvestments(updated); save(updated);
            };

            const sync = async (cat) => {
                const list = [...(investments[cat] || [])];
                if (list.length === 0) return;
                setSyncStatus(`A atualizar cotações...`);
                for (let i = 0; i < list.length; i++) {
                    const t = list[i].ticker.trim().toUpperCase();
                    try {
                        let url = `https://brapi.dev/api/quote/${t}`;
                        if (cat === 'altCrypto' || ['BTC', 'ETH', 'SOL'].includes(t)) {
                            url = `https://brapi.dev/api/v2/crypto?coin=${t}&currency=BRL`;
                        }
                        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${BRAPI_TOKEN}` } });
                        const d = await res.json();
                        if (d.coins?.[0]) list[i].precoAtual = d.coins[0].regularMarketPrice;
                        else if (d.results?.[0]) list[i].precoAtual = d.results[0].regularMarketPrice;
                        await new Promise(r => setTimeout(r, 400));
                    } catch (e) { console.error(e); }
                }
                const updated = { ...investments, [cat]: list }; setInvestments(updated); save(updated);
                setSyncStatus("Pronto!"); setTimeout(() => setSyncStatus(""), 2000);
            };

            const renderTableSection = (cat, title, type = 'ticker') => (
                <div className="glass rounded-[2.5rem] overflow-hidden shadow-2xl animate-in mb-10">
                    <div className="p-8 bg-slate-50/50 border-b flex justify-between items-center">
                        <h2 className="font-black text-slate-800 uppercase tracking-tighter text-2xl">{title}</h2>
                        <div className="flex gap-4">
                            {type === 'ticker' && <button onClick={() => sync(cat)} className="bg-emerald-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 shadow-lg flex items-center gap-2"><LucideIcon name="RefreshCw" size={14} /> Sincronizar</button>}
                            <button onClick={() => type === 'ticker' ? addTicker(cat) : addManual(cat)} className="bg-slate-900 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black shadow-lg">+ Adicionar</button>
                        </div>
                    </div>
                    <div className="overflow-x-auto custom-scroll">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                <tr>
                                    <th className="px-10 py-6">{type === 'ticker' ? 'Ativo' : 'Nome'}</th>
                                    {type === 'ticker' && <th className="px-10 py-6 text-center">Qtd</th>}
                                    <th className="px-10 py-6 text-right">{type === 'ticker' ? 'P. Compra' : 'Vlr Aplicado'}</th>
                                    <th className="px-10 py-6 text-right">{type === 'ticker' ? 'P. Atual' : 'Vlr Atualizado'}</th>
                                    <th className="px-10 py-6 text-right font-black text-slate-900">Patrimônio</th>
                                    <th className="px-10 py-6 text-right">Lucro R$</th>
                                    <th className="px-10 py-6 text-right">Lucro %</th>
                                    <th className="px-10 py-6 text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {(investments[cat] || []).map(item => {
                                    const qty = type === 'ticker' ? parseValue(item.quantidade) : 1;
                                    const atual = type === 'ticker' ? parseValue(item.precoAtual) : parseValue(item.valorAtual);
                                    const custo = type === 'ticker' ? parseValue(item.precoMedio) : parseValue(item.valorAplicado);
                                    const totalVal = qty * atual; const custoTotal = qty * custo;
                                    const lucroVal = totalVal - custoTotal; const lucroPct = custoTotal > 0 ? (lucroVal / custoTotal) * 100 : 0;
                                    return (
                                        <tr key={item.id} className="hover:bg-slate-50/50 tabular text-sm">
                                            <td className="px-10 py-6 font-black text-slate-900 uppercase">{type === 'ticker' ? item.ticker : item.nome}</td>
                                            {type === 'ticker' && <td className="px-10 py-6 text-center font-bold text-slate-500">{qty < 1 ? qty.toFixed(8).replace(/\.?0+$/, "") : qty.toLocaleString('pt-BR')}</td>}
                                            <td className="px-10 py-6 text-right text-slate-500 font-bold">{formatBRL(custo)}</td>
                                            <td className="px-10 py-6 text-right font-black text-blue-600">{formatBRL(atual)}</td>
                                            <td className="px-10 py-6 text-right font-black text-slate-900">{formatBRL(totalVal)}</td>
                                            <td className={`px-10 py-6 text-right font-black ${lucroVal >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{formatBRL(lucroVal)}</td>
                                            <td className={`px-10 py-6 text-right font-black ${lucroVal >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{lucroPct.toFixed(2)}%</td>
                                            <td className="px-10 py-6 text-right">
                                                <button onClick={() => { if(confirm("Eliminar?")) { const u = {...investments, [cat]: investments[cat].filter(i => i.id !== item.id)}; setInvestments(u); save(u); } }} className="p-2 text-rose-500 hover:bg-rose-50 rounded-xl transition-all"><LucideIcon name="Trash2" size={18} /></button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
                    <header className="py-10 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 text-white p-4 rounded-[2rem] shadow-2xl"><LucideIcon name="ShieldCheck" size={32} /></div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter uppercase leading-none">ICARO<span className="text-blue-600">INVEST</span></h1>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mt-1">Management Elite v7.5</p>
                            </div>
                        </div>
                        <nav className="flex bg-white p-2 rounded-[1.5rem] shadow-xl border border-slate-100 overflow-x-auto no-scrollbar max-w-full">
                            {[
                                { id: 'dashboard', icon: 'LayoutDashboard', label: 'Resumo' },
                                { id: 'acoes', icon: 'TrendingUp', label: 'Ações' },
                                { id: 'realEstate', icon: 'Home', label: 'RE' },
                                { id: 'caixa', icon: 'Landmark', label: 'Caixa' },
                                { id: 'alternativos', icon: 'Layers', label: 'Alt' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl text-xs font-black transition-all whitespace-nowrap ${activeTab === t.id ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <LucideIcon name={t.icon} size={14} /> {t.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {syncStatus && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-8 py-3 rounded-full shadow-2xl text-[10px] font-black uppercase tracking-widest animate-in">{syncStatus}</div>}

                    <main className="space-y-10 animate-in">
                        {activeTab === 'dashboard' ? (
                            <>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <div className="glass p-8 rounded-premium flex flex-col justify-center items-center shadow-inner col-span-1 sm:col-span-2 lg:col-span-1 bg-slate-900 text-white border-none">
                                        <p className="text-[10px] font-black opacity-50 uppercase tracking-[0.3em] mb-2">Património Consolidado</p>
                                        <h2 className="text-3xl font-black tabular no-break">{formatBRL(totals.total)}</h2>
                                    </div>
                                    <div className="glass p-8 rounded-premium flex flex-col justify-center items-center shadow-inner bg-emerald-50 border-emerald-100">
                                        <p className="text-[10px] font-black text-emerald-600 uppercase tracking-[0.3em] mb-2">Lucro Total Carteira</p>
                                        <h2 className="text-2xl font-black text-emerald-700 tabular">{formatBRL(totals.acoes.lucro + totals.re.lucro + totals.caixa.lucro + totals.alt.lucro)}</h2>
                                    </div>
                                    <div className="glass p-8 rounded-premium flex flex-col justify-center items-center shadow-inner bg-blue-50 border-blue-100 col-span-1 sm:col-span-2 lg:col-span-2">
                                        <div className="flex gap-10 w-full justify-around text-center">
                                            <div>
                                                <p className="text-[9px] font-black text-blue-600 uppercase tracking-[0.2em] mb-1">Média Performance</p>
                                                <p className="text-xl font-black text-blue-800 tabular">
                                                    {(((totals.acoes.lucro + totals.re.lucro + totals.caixa.lucro + totals.alt.lucro) / 
                                                    (totals.acoes.investido + totals.re.investido + totals.caixa.investido + totals.alt.investido || 1)) * 100).toFixed(2)}%
                                                </p>
                                            </div>
                                            <div>
                                                <p className="text-[9px] font-black text-blue-600 uppercase tracking-[0.2em] mb-1">Total Investido</p>
                                                <p className="text-xl font-black text-blue-800 tabular">{formatBRL(totals.acoes.investido + totals.re.investido + totals.caixa.investido + totals.alt.investido)}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 glass rounded-[2.5rem] p-10 min-h-[500px] flex flex-col shadow-xl">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-10 text-center">Alocação Estratégica</h2>
                                        <div className="flex-1 w-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={[{ name: 'Ações', value: totals.acoes.atual }, { name: 'RE', value: totals.re.atual }, { name: 'Caixa', value: totals.caixa.atual }, { name: 'Alt', value: totals.alt.atual }].filter(d => d.value > 0)} innerRadius={80} outerRadius={140} paddingAngle={8} dataKey="value" stroke="none" cornerRadius={12}>
                                                        {COLORS.map((c, i) => <Cell key={i} fill={c} />)}
                                                    </Pie>
                                                    <Tooltip contentStyle={{ borderRadius: '1.5rem', border: 'none', boxShadow: '0 25px 50px rgba(0,0,0,0.1)', fontBold: '900' }} formatter={(v) => formatBRL(v)} />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-5 h-full">
                                        <CategoryDetailCard label="Bolsa / Ações" stats={totals.acoes} totalPortfolio={totals.total} color={COLORS[0]} icon="BarChart3" />
                                        <CategoryDetailCard label="Real Estate" stats={totals.re} totalPortfolio={totals.total} color={COLORS[1]} icon="Building2" />
                                        <CategoryDetailCard label="Reserva / Caixa" stats={totals.caixa} totalPortfolio={totals.total} color={COLORS[2]} icon="PiggyBank" />
                                        <CategoryDetailCard label="Alternativos" stats={totals.alt} totalPortfolio={totals.total} color={COLORS[3]} icon="Layers" />
                                    </div>
                                </div>
                            </>
                        ) : (
                            <div className="space-y-6">
                                {(() => {
                                    const s = activeTab === 'alternativos' ? totals.alt : 
                                              activeTab === 'acoes' ? totals.acoes :
                                              activeTab === 'realEstate' ? totals.re : totals.caixa;
                                    return (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                                            <StatHeaderCard isMobile={isMobile} title="Total Investido" value={formatBRL(s.investido)} icon="PiggyBank" colorClass="bg-slate-900" />
                                            <StatHeaderCard isMobile={isMobile} title="Lucro Bruto" value={formatBRL(s.lucro)} subValue={`${s.lucroPct.toFixed(2)}%`} icon="TrendingUp" colorClass={s.lucro >= 0 ? "bg-emerald-500" : "bg-rose-500"} />
                                            <StatHeaderCard isMobile={isMobile} title="Patrimônio Atual" value={formatBRL(s.atual)} icon="Wallet" colorClass="bg-blue-600" />
                                        </div>
                                    );
                                })()}
                                
                                {activeTab === 'acoes' && renderTableSection('acoes', 'Carteira Principal de Ações', 'ticker')}
                                {activeTab === 'realEstate' && renderTableSection('realEstate', 'Real Estate (FIIs)', 'ticker')}
                                {activeTab === 'caixa' && (
                                    <div className="space-y-10">
                                        {renderTableSection('caixa', 'Gestão Manual de Saldo', 'manual')}
                                        {renderTableSection('caixaTicker', 'Ativos Cotados / Tickers', 'ticker')}
                                    </div>
                                )}
                                {activeTab === 'alternativos' && (
                                    <div className="space-y-10">
                                        {}
                                        <div className="space-y-4">
                                            <CategoryDetailCard 
                                                label="Fundos de Investimento" 
                                                stats={getSectionStats(investments.altFunds, 'manual')} 
                                                totalPortfolio={totals.alt} 
                                                color="#8b5cf6" 
                                                icon="Briefcase" 
                                            />
                                            {renderTableSection('altFunds', 'Listagem de Fundos', 'manual')}
                                        </div>

                                        {}
                                        <div className="space-y-4">
                                            <CategoryDetailCard 
                                                label="Ações Alternativas" 
                                                stats={getSectionStats(investments.altStocks, 'ticker')} 
                                                totalPortfolio={totals.alt} 
                                                color="#2563eb" 
                                                icon="TrendingUp" 
                                            />
                                            {renderTableSection('altStocks', 'Listagem de Ações Alt', 'ticker')}
                                        </div>

                                        {}
                                        <div className="space-y-4">
                                            <CategoryDetailCard 
                                                label="Criptomoedas" 
                                                stats={getSectionStats(investments.altCrypto, 'ticker')} 
                                                totalPortfolio={totals.alt} 
                                                color="#f59e0b" 
                                                icon="Coins" 
                                            />
                                            {renderTableSection('altCrypto', 'Listagem de Criptos (Alta Precisão)', 'ticker')}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                    <footer className="mt-20 py-10 text-center border-t border-slate-100 text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">IcaroInvest Analytics &copy; 2026</footer>
                </div>
            );
        };
        const start = () => { if (window.ReactDOM && window.React && window.Recharts) { ReactDOM.createRoot(document.getElementById('root')).render(<App />); } else { setTimeout(start, 50); } };
        start();
    </script>
</body>
</html>
