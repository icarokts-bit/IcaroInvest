<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Controle de Investimentos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { PieChart, Pie, Cell, Legend, ResponsiveContainer, Tooltip } = window.Recharts;

        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            messagingSenderId: "45341061429",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c",
            measurementId: "G-Z8FZGVKK8W"
        };

        const INITIAL_DATA = { acoes: [], realEstate: [], caixa: [], alternativos: [] };
        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#06b6d4'];

        const B3_DATA = {
            "PETR4": "Petrobras PN", "VALE3": "Vale S.A.", "ITUB4": "Itaú Unibanco", 
            "BBDC4": "Bradesco PN", "BBAS3": "Banco do Brasil", "ITSAS4": "Itaúsa PN",
            "LJQQ3": "Lojas Quero-Quero S.A.", "WEGE3": "WEG S.A.", "MGLU3": "Magazine Luiza",
            "KNRI11": "FII Kinea", "HGLG11": "FII Logística", "MXRF11": "FII Maxi Renda",
            "IVVB11": "iShares S&P 500", "BOVA11": "iShares Ibovespa", "SANB11": "Santander Brasil"
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 ${className}`}>
                {children}
            </div>
        );

        const StatCard = ({ title, value, iconName, colorClass }) => (
            <Card className="flex items-center gap-4 hover:shadow-md transition-shadow">
                <div className={`p-3.5 rounded-2xl ${colorClass} text-white shadow-lg flex items-center justify-center`}>
                    <i data-lucide={iconName} className="w-6 h-6"></i>
                </div>
                <div className="overflow-hidden">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">{title}</p>
                    <p className="text-xl font-black text-slate-900 truncate">{value}</p>
                </div>
            </Card>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isUpdating, setIsUpdating] = useState(false);
            const [loading, setLoading] = useState(true);
            const [firebaseStatus, setFirebaseStatus] = useState('initializing');
            const [statusMessage, setStatusMessage] = useState(null);
            const [investments, setInvestments] = useState(INITIAL_DATA);
            const [newAcao, setNewAcao] = useState({ ticker: '', quantidade: '', precoCompra: '' });
            
            const dbRef = useRef(null);

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        if (!window.firebase.apps.length) {
                            window.firebase.initializeApp(firebaseConfig);
                        }
                        const db = window.firebase.firestore();
                        dbRef.current = db.collection("investments").doc("portfolio_principal");

                        dbRef.current.onSnapshot((doc) => {
                            if (doc.exists) {
                                setInvestments(doc.data());
                            } else {
                                dbRef.current.set(INITIAL_DATA);
                            }
                            setFirebaseStatus('connected');
                            setLoading(false);
                            setTimeout(() => lucide.createIcons(), 100);
                        }, (err) => {
                            console.error("Erro Firestore:", err);
                            setFirebaseStatus('error');
                            setLoading(false);
                        });
                    } catch (e) {
                        setFirebaseStatus('error');
                        setLoading(false);
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab, loading, investments]);

            const updateData = async (newData) => {
                setInvestments(newData);
                if (dbRef.current && firebaseStatus === 'connected') {
                    try { await dbRef.current.set(newData); } catch (e) { console.error(e); }
                }
            };

            const editAcao = (id) => {
                const acao = investments.acoes.find(a => a.id === id);
                if (!acao) return;
                const novaQtd = window.prompt("Nova Quantidade:", acao.quantidade);
                const novoPreco = window.prompt("Novo Preço Médio (R$):", acao.precoMedio);
                
                if (novaQtd !== null && novoPreco !== null) {
                    const updated = investments.acoes.map(a => 
                        a.id === id ? { ...a, quantidade: Number(novaQtd), precoMedio: Number(novoPreco) } : a
                    );
                    updateData({ ...investments, acoes: updated });
                }
            };

            const editManual = (tab, id) => {
                const item = investments[tab].find(i => i.id === id);
                if (!item) return;
                const novoNome = window.prompt("Novo Nome:", item.nome);
                const novoValor = window.prompt("Novo Valor (R$):", item.valor);
                
                if (novoNome !== null && novoValor !== null) {
                    const updated = investments[tab].map(i => 
                        i.id === id ? { ...i, nome: novoNome, valor: Number(novoValor) } : i
                    );
                    updateData({ ...investments, [tab]: updated });
                }
            };

            const syncPrices = async () => {
                if (investments.acoes.length === 0) return;
                setIsUpdating(true);
                setStatusMessage({ type: 'info', text: 'Sincronizando com a B3 via IA...' });

                try {
                    const apiKey = ""; // Substituir pela chave Gemini se necessário
                    const tickers = investments.acoes.map(a => a.ticker).join(', ');
                    const prompt = `Preços atuais reais na B3 para: ${tickers}. Retorne apenas JSON: {"prices": [{"ticker": "PETR4", "price": 40.50}]}`;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "google_search": {} }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const result = await response.json();
                    const data = JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text);
                    
                    if (data?.prices) {
                        const updated = investments.acoes.map(a => {
                            const match = data.prices.find(p => p.ticker.toUpperCase() === a.ticker.toUpperCase());
                            return match ? { ...a, precoAtual: match.price } : a;
                        });
                        updateData({ ...investments, acoes: updated });
                        setStatusMessage({ type: 'success', text: 'Cotações Atualizadas!' });
                    }
                } catch (e) {
                    setStatusMessage({ type: 'error', text: 'Erro na sincronização.' });
                } finally {
                    setIsUpdating(false);
                    setTimeout(() => setStatusMessage(null), 3000);
                }
            };

            const totals = useMemo(() => {
                const getSum = (arr, key) => (arr || []).reduce((a, b) => a + Number(b[key] || 0), 0);
                const acoesSum = (investments.acoes || []).reduce((a, b) => a + (Number(b.quantidade) * Number(b.precoAtual || 0)), 0);
                return {
                    acoes: acoesSum,
                    realEstate: getSum(investments.realEstate, 'valor'),
                    caixa: getSum(investments.caixa, 'valor'),
                    alternativos: getSum(investments.alternativos, 'valor'),
                    total: acoesSum + getSum(investments.realEstate, 'valor') + getSum(investments.caixa, 'valor') + getSum(investments.alternativos, 'valor')
                };
            }, [investments]);

            const allocationData = [
                { name: 'Ações', value: totals.acoes },
                { name: 'Real Estate', value: totals.realEstate },
                { name: 'Caixa', value: totals.caixa },
                { name: 'Alternativos', value: totals.alternativos },
            ].filter(i => i.value > 0);

            const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-slate-400 font-black uppercase tracking-widest text-[10px]">Conectando à Nuvem...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    <header className="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-xl">
                                <i data-lucide="wallet" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tight">Icaro<span className="text-blue-600">Invest</span></h1>
                                <div className="flex items-center gap-2">
                                    <span className={`w-2 h-2 rounded-full ${firebaseStatus === 'connected' ? 'bg-emerald-500' : 'bg-slate-300'}`}></span>
                                    <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">{firebaseStatus === 'connected' ? 'Cloud Online' : 'Offline'}</p>
                                </div>
                            </div>
                        </div>

                        <nav className="bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 flex overflow-x-auto gap-1 custom-scroll">
                            {[
                                { id: 'dashboard', label: 'Resumo', icon: 'layout-dashboard' },
                                { id: 'acoes', label: 'Ações', icon: 'briefcase' },
                                { id: 'realEstate', label: 'Real Estate', icon: 'home' },
                                { id: 'caixa', label: 'Caixa', icon: 'landmark' },
                                { id: 'alternativos', label: 'Alternativos', icon: 'coins' },
                            ].map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-5 py-3 rounded-xl text-[10px] font-black transition-all uppercase tracking-widest whitespace-nowrap ${
                                        activeTab === tab.id ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'
                                    }`}
                                >
                                    <i data-lucide={tab.icon} className="w-4 h-4"></i> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {statusMessage && (
                        <div className={`mb-6 p-4 rounded-xl flex items-center gap-3 border shadow-sm animate-in ${
                            statusMessage.type === 'error' ? 'bg-red-50 border-red-100 text-red-700' : 
                            statusMessage.type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-700' : 
                            'bg-blue-50 border-blue-100 text-blue-700'
                        }`}>
                            <i data-lucide={statusMessage.type === 'error' ? 'alert-circle' : 'check-circle-2'} className="w-5 h-5"></i>
                            <span className="text-sm font-bold uppercase tracking-tight">{statusMessage.text}</span>
                        </div>
                    )}

                    <main className="space-y-6">
                        { activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                                    <StatCard title="Patrimônio Total" value={formatBRL(totals.total)} iconName="trending-up" colorClass="bg-slate-900" />
                                    <StatCard title="Ações" value={formatBRL(totals.acoes)} iconName="briefcase" colorClass="bg-blue-600" />
                                    <StatCard title="Real Estate" value={formatBRL(totals.realEstate)} iconName="home" colorClass="bg-emerald-600" />
                                    <StatCard title="Caixa" value={formatBRL(totals.caixa)} iconName="landmark" colorClass="bg-purple-600" />
                                    <StatCard title="Alternativos" value={formatBRL(totals.alternativos)} iconName="coins" colorClass="bg-rose-500" />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <Card>
                                        <h3 className="text-sm font-black uppercase text-slate-800 mb-6 tracking-widest">Alocação Estratégica</h3>
                                        <div className="h-72">
                                            {allocationData.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie data={allocationData} innerRadius={60} outerRadius={90} paddingAngle={8} dataKey="value" cornerRadius={6}>
                                                            {allocationData.map((e, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                                        </Pie>
                                                        <Tooltip formatter={(v) => formatBRL(v)} />
                                                        <Legend />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : (
                                                <div className="h-full flex items-center justify-center text-slate-300 italic text-sm font-medium">Cadastre seus primeiros ativos</div>
                                            )}
                                        </div>
                                    </Card>

                                    <Card>
                                        <h3 className="text-sm font-black uppercase text-slate-800 mb-6 tracking-widest">Resumo Percentual</h3>
                                        <div className="space-y-3">
                                            {allocationData.map((item, idx) => (
                                                <div key={item.name} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                    <div className="flex items-center gap-3 font-bold text-sm">
                                                        <div className="w-3 h-3 rounded-full" style={{ backgroundColor: COLORS[idx % COLORS.length] }}></div>
                                                        <span className="text-slate-700">{item.name}</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="font-black text-slate-900">{formatBRL(item.value)}</div>
                                                        <div className="text-[10px] text-slate-400 font-black tracking-widest">{((item.value / totals.total) * 100).toFixed(1)}%</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}

                        { activeTab === 'acoes' && (
                            <Card className="animate-in">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                                    <div>
                                        <h3 className="text-2xl font-black">Carteira de Ações</h3>
                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Preços Sincronizados via IA</p>
                                    </div>
                                    <button 
                                        onClick={syncPrices}
                                        disabled={isUpdating}
                                        className="flex items-center gap-2 px-6 py-3 rounded-xl font-black text-xs bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-50 transition-all shadow-lg"
                                    >
                                        <i data-lucide="refresh-cw" className={`w-4 h-4 ${isUpdating ? 'animate-spin' : ''}`}></i>
                                        {isUpdating ? 'SINCRONIZANDO...' : 'SINCRONIZAR B3'}
                                    </button>
                                </div>

                                <form 
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        if (!newAcao.ticker || !newAcao.quantidade || !newAcao.precoCompra) return;
                                        const ticker = newAcao.ticker.toUpperCase();
                                        const item = {
                                            id: Date.now(),
                                            ticker: ticker,
                                            nome: B3_DATA[ticker] || "Ativo B3",
                                            quantidade: Number(newAcao.quantidade),
                                            precoMedio: Number(newAcao.precoCompra),
                                            precoAtual: Number(newAcao.precoCompra)
                                        };
                                        updateData({ ...investments, acoes: [...investments.acoes, item] });
                                        setNewAcao({ ticker: '', quantidade: '', precoCompra: '' });
                                    }}
                                    className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10 p-6 bg-slate-900 rounded-3xl"
                                >
                                    <input type="text" placeholder="Ticker (Ex: PETR4)" value={newAcao.ticker} list="tickers-list" onChange={e => setNewAcao({...newAcao, ticker: e.target.value})} className="p-3 bg-slate-800 text-white rounded-xl outline-none font-bold placeholder:text-slate-500" />
                                    <datalist id="tickers-list">{Object.keys(B3_DATA).map(t => <option key={t} value={t}>{B3_DATA[t]}</option>)}</datalist>
                                    <input type="number" placeholder="Qtd" value={newAcao.quantidade} onChange={e => setNewAcao({...newAcao, quantidade: e.target.value})} className="p-3 bg-slate-800 text-white rounded-xl outline-none font-bold placeholder:text-slate-500" />
                                    <input type="number" step="0.01" placeholder="Vlr Compra" value={newAcao.precoCompra} onChange={e => setNewAcao({...newAcao, precoCompra: e.target.value})} className="p-3 bg-slate-800 text-white rounded-xl outline-none font-bold placeholder:text-slate-500" />
                                    <button type="submit" className="bg-blue-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-blue-500">Adicionar</button>
                                </form>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                                <th className="pb-4">Ativo</th>
                                                <th className="pb-4 text-center">Qtd</th>
                                                <th className="pb-4">Média Compra</th>
                                                <th className="pb-4">Preço Atual</th>
                                                <th className="pb-4">Lucro R$</th>
                                                <th className="pb-4">Lucro %</th>
                                                <th className="pb-4 text-right">Ação</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {investments.acoes.map(a => {
                                                const lucroReal = (a.precoAtual - a.precoMedio) * a.quantidade;
                                                const lucroPct = ((a.precoAtual - a.precoMedio) / a.precoMedio) * 100;
                                                return (
                                                    <tr key={a.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                        <td className="py-4">
                                                            <div className="font-black text-slate-900">{a.ticker}</div>
                                                            <div className="text-[10px] text-slate-400 font-bold uppercase">{a.nome}</div>
                                                        </td>
                                                        <td className="py-4 text-center font-bold">{a.quantidade}</td>
                                                        <td className="py-4 text-sm font-medium">{formatBRL(a.precoMedio)}</td>
                                                        <td className="py-4 font-black text-blue-600 text-sm">{formatBRL(a.precoAtual)}</td>
                                                        <td className={`py-4 font-black text-sm ${lucroReal >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{formatBRL(lucroReal)}</td>
                                                        <td className={`py-4 font-black text-sm ${lucroPct >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{lucroPct.toFixed(2)}%</td>
                                                        <td className="py-4 text-right">
                                                            <div className="flex justify-end gap-3">
                                                                <button onClick={() => editAcao(a.id)} className="text-slate-300 hover:text-blue-500 transition-colors"><i data-lucide="edit-3" className="w-5 h-5"></i></button>
                                                                <button onClick={() => updateData({ ...investments, acoes: investments.acoes.filter(x => x.id !== a.id) })} className="text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        )}

                        { (['realEstate', 'caixa', 'alternativos'].includes(activeTab)) && (
                            <Card className="animate-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase tracking-tight">{activeTab}</h3>
                                    <button 
                                        onClick={() => {
                                            const nome = window.prompt("Nome:");
                                            const valor = window.prompt("Valor:");
                                            if (nome && valor) {
                                                const item = { id: Date.now(), nome, valor: Number(valor) };
                                                updateData({ ...investments, [activeTab]: [...(investments[activeTab] || []), item] });
                                            }
                                        }}
                                        className="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-[10px] tracking-widest hover:bg-black"
                                    >
                                        NOVO LANÇAMENTO
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {(investments[activeTab] || []).map(item => (
                                        <div key={item.id} className="flex justify-between items-center p-5 bg-slate-50 rounded-2xl border border-slate-100 group">
                                            <div className="flex flex-col">
                                                <span className="font-black text-slate-800 text-sm uppercase tracking-tight">{item.nome}</span>
                                                <span className="text-[10px] text-slate-400 font-bold uppercase">{activeTab}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className="font-black text-slate-900 text-lg">{formatBRL(item.valor)}</span>
                                                <div className="flex gap-2">
                                                    <button onClick={() => editManual(activeTab, item.id)} className="text-slate-300 hover:text-blue-500 p-1"><i data-lucide="edit-3" className="w-5 h-5"></i></button>
                                                    <button onClick={() => updateData({ ...investments, [activeTab]: investments[activeTab].filter(x => x.id !== item.id) })} className="text-slate-300 hover:text-rose-500 p-1"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        )}
                    </main>

                    <footer className="mt-16 pt-8 border-t border-slate-100 text-center opacity-30">
                        <p className="text-[10px] font-black uppercase tracking-[0.3em]">IcaroInvest Control &copy; 2026</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
