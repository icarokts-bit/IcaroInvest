<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Controle Patrimonial Privado</title>
    
    <!-- Scripts de Dependência em Ordem Crítica -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts depende de React e PropTypes estarem no window -->
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
    
    <!-- UI e Auxiliares -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; overflow-x: hidden; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .value-text { 
            white-space: nowrap; 
            letter-spacing: -0.04em; 
            font-variant-numeric: tabular-nums; 
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-radius { border-radius: 2.2rem; }
        
        /* Animação suave para mudanças de aba */
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Ajuste para evitar quebra de valores monetários em telas pequenas */
        .stat-value {
            font-size: clamp(1rem, 4vw, 1.5rem);
            font-weight: 900;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        const RechartsObj = window.Recharts || {};
        const { PieChart, Pie, Cell, Legend, ResponsiveContainer, Tooltip } = RechartsObj;

        // Configurações de API e Firebase
        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            messagingSenderId: "45341061429",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c",
            measurementId: "G-Z8FZGVKK8W"
        };

        const INITIAL_DATA = { acoes: [], realEstate: [], caixa: [], alternativos: [] };
        const COLORS = ['#0f172a', '#2563eb', '#059669', '#7c3aed', '#db2777', '#0891b2'];

        const B3_NAMES = {
            "PETR4": "Petrobras PN", "VALE3": "Vale S.A.", "ITUB4": "Itaú Unibanco", 
            "BBAS3": "Banco do Brasil", "ITSAS4": "Itaúsa PN", "LJQQ3": "Lojas Quero-Quero",
            "WEGE3": "WEG S.A.", "MGLU3": "Magalu", "ABEV3": "Ambev", "B3SA3": "B3 S.A.", 
            "KNRI11": "FII Kinea Renda", "HGLG11": "FII CGHG Logística", "XPML11": "FII XP Malls", 
            "MXRF11": "FII Maxi Renda", "VISC11": "FII Vinci Malls", "VGIR11": "FII Valora RE"
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white p-6 card-radius shadow-sm border border-slate-100 ${className}`}>
                {children}
            </div>
        );

        const StatCard = ({ title, value, iconName, colorClass }) => (
            <Card className="flex items-center gap-4 hover:shadow-md transition-all duration-300 min-h-[110px]">
                <div className={`flex-shrink-0 p-3.5 rounded-2xl ${colorClass} text-white shadow-lg`}>
                    <i data-lucide={iconName} className="w-6 h-6"></i>
                </div>
                <div className="flex-1 min-w-0">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 truncate">{title}</p>
                    <p className="stat-value text-slate-900 value-text">
                        {value}
                    </p>
                </div>
            </Card>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [investments, setInvestments] = useState(INITIAL_DATA);
            const [syncing, setSyncing] = useState(false);
            const [statusMsg, setStatusMsg] = useState(null);
            
            const [newAsset, setNewAsset] = useState({ ticker: '', quantidade: '', precoCompra: '' });
            const dbRef = useRef(null);

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        if (!window.firebase.apps.length) {
                            window.firebase.initializeApp(firebaseConfig);
                        }
                        const db = window.firebase.firestore();
                        dbRef.current = db.collection("investments").doc("portfolio_principal");

                        dbRef.current.onSnapshot((doc) => {
                            if (doc.exists) {
                                setInvestments(doc.data());
                            } else {
                                dbRef.current.set(INITIAL_DATA);
                            }
                            setLoading(false);
                            setTimeout(() => lucide.createIcons(), 150);
                        });
                    } catch (e) {
                        console.error("Firebase Error:", e);
                        setLoading(false);
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab, loading, investments, syncing]);

            const updateData = async (newData) => {
                setInvestments(newData);
                if (dbRef.current) {
                    try { await dbRef.current.set(newData); } catch (e) { console.error(e); }
                }
            };

            const syncCategory = async (category) => {
                const targetList = investments[category];
                if (!targetList || targetList.length === 0) return;
                
                setSyncing(true);
                const newList = [...targetList];

                try {
                    for (let i = 0; i < newList.length; i++) {
                        const item = newList[i];
                        const tickerClean = item.ticker.split('.')[0].trim().toUpperCase();
                        setStatusMsg(`Sincronizando ${tickerClean}...`);
                        
                        try {
                            const response = await fetch(`https://brapi.dev/api/quote/${tickerClean}`, { 
                                headers: { "Authorization": `Bearer ${BRAPI_TOKEN}` } 
                            });
                            const data = await response.json();
                            if (data?.results?.[0]?.regularMarketPrice) {
                                newList[i] = { 
                                    ...item, 
                                    precoAtual: data.results[0].regularMarketPrice,
                                    nome: data.results[0].shortName || item.nome
                                };
                            }
                            await new Promise(r => setTimeout(r, 350));
                        } catch (err) { console.error(err); }
                    }
                    await updateData({ ...investments, [category]: newList });
                    setStatusMsg("Carteira Atualizada!");
                } catch (err) {
                    setStatusMsg("Erro na API.");
                } finally {
                    setSyncing(false);
                    setTimeout(() => setStatusMsg(null), 3000);
                }
            };

            const totals = useMemo(() => {
                const getSum = (arr) => (arr || []).reduce((a, b) => a + (Number(b.quantidade || 1) * Number(b.precoAtual || b.valor || 0)), 0);
                const acoesSum = getSum(investments.acoes);
                const reSum = getSum(investments.realEstate);
                const caixaSum = (investments.caixa || []).reduce((a, b) => a + Number(b.valor || 0), 0);
                const altSum = (investments.alternativos || []).reduce((a, b) => a + Number(b.valor || 0), 0);
                return { acoes: acoesSum, realEstate: reSum, caixa: caixaSum, alternativos: altSum, total: acoesSum + reSum + caixaSum + altSum };
            }, [investments]);

            const allocationData = [
                { name: 'Ações', value: totals.acoes },
                { name: 'Real Estate', value: totals.realEstate },
                { name: 'Caixa', value: totals.caixa },
                { name: 'Alternativos', value: totals.alternativos },
            ].filter(i => i.value > 0);

            const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center animate-pulse">
                        <div className="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-slate-400 font-black uppercase tracking-widest text-[10px]">Acessando Nuvem...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
                    <header className="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-12">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-3xl text-white shadow-2xl">
                                <i data-lucide="shield-check" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tight text-slate-900 leading-none">Icaro<span className="text-blue-600">Invest</span></h1>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Sistema de Gestão Privada v2.8</p>
                            </div>
                        </div>

                        <nav className="bg-white p-2 rounded-[2rem] shadow-sm border border-slate-100 flex overflow-x-auto gap-1 custom-scroll">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                                { id: 'acoes', label: 'Ações', icon: 'briefcase' },
                                { id: 'realEstate', label: 'Real Estate', icon: 'home' },
                                { id: 'caixa', label: 'Caixa', icon: 'landmark' },
                                { id: 'alternativos', label: 'Alternativos', icon: 'coins' },
                            ].map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-6 py-4 rounded-2xl text-[10px] font-black transition-all uppercase tracking-widest whitespace-nowrap ${
                                        activeTab === tab.id ? 'bg-slate-900 text-white shadow-xl' : 'text-slate-400 hover:bg-slate-50'
                                    }`}
                                >
                                    <i data-lucide={tab.icon} className="w-4 h-4"></i> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {statusMsg && (
                        <div className="mb-6 bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest animate-in flex items-center gap-3">
                            <div className="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
                            {statusMsg}
                        </div>
                    )}

                    <main className="space-y-6">
                        { activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in">
                                {}
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                                    <StatCard title="Patrimônio Total" value={formatBRL(totals.total)} iconName="trending-up" colorClass="bg-slate-900" />
                                    <StatCard title="Ações" value={formatBRL(totals.acoes)} iconName="briefcase" colorClass="bg-blue-600" />
                                    <StatCard title="Real Estate" value={formatBRL(totals.realEstate)} iconName="home" colorClass="bg-emerald-600" />
                                    <StatCard title="Caixa" value={formatBRL(totals.caixa)} iconName="landmark" colorClass="bg-purple-600" />
                                    <StatCard title="Alternativos" value={formatBRL(totals.alternativos)} iconName="coins" colorClass="bg-rose-500" />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <Card className="flex flex-col">
                                        <h3 className="text-[11px] font-black uppercase text-slate-400 mb-8 tracking-[0.2em] text-center">Alocação Estratégica</h3>
                                        <div className="h-72 flex-1">
                                            {PieChart && allocationData.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie data={allocationData} innerRadius={60} outerRadius={90} paddingAngle={8} dataKey="value" cornerRadius={8}>
                                                            {allocationData.map((e, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                                        </Pie>
                                                        <Tooltip formatter={(v) => formatBRL(v)} />
                                                        <Legend />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : (
                                                <div className="h-full flex items-center justify-center text-slate-300 font-bold uppercase text-[10px] tracking-widest text-center px-10">
                                                    Sem dados para exibir
                                                </div>
                                            )}
                                        </div>
                                    </Card>

                                    <Card>
                                        <h3 className="text-[11px] font-black uppercase text-slate-400 mb-8 tracking-[0.2em]">Resumo por Categoria</h3>
                                        <div className="space-y-3">
                                            {allocationData.map((item, idx) => (
                                                <div key={item.name} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 group hover:border-slate-200 transition-all">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-3 h-3 rounded-full shadow-sm" style={{ backgroundColor: COLORS[idx % COLORS.length] }}></div>
                                                        <span className="text-sm font-black text-slate-700 uppercase tracking-tight">{item.name}</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="font-black text-slate-900 leading-tight value-text">{formatBRL(item.value)}</div>
                                                        <div className="text-[9px] text-slate-400 font-black tracking-widest mt-0.5">{((item.value / (totals.total || 1)) * 100).toFixed(1)}%</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}

                        {}
                        { (activeTab === 'acoes' || activeTab === 'realEstate') && (
                            <Card className="animate-in">
                                <div className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div>
                                        <h3 className="text-2xl font-black uppercase tracking-tight text-slate-900">
                                            {activeTab === 'acoes' ? 'Carteira de Ações' : 'Fundos Imobiliários'}
                                        </h3>
                                        <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">Sincronização Brapi v2.0</p>
                                    </div>
                                    <button 
                                        onClick={() => syncCategory(activeTab)}
                                        disabled={syncing}
                                        className={`flex items-center gap-3 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-xl ${
                                            syncing ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-emerald-600 text-white hover:bg-emerald-500'
                                        }`}
                                    >
                                        <i data-lucide="refresh-cw" className={`w-4 h-4 ${syncing ? 'animate-spin' : ''}`}></i>
                                        {syncing ? 'Atualizando...' : `Sincronizar B3`}
                                    </button>
                                </div>

                                <form 
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        if (!newAsset.ticker || !newAsset.quantidade || !newAsset.precoCompra) return;
                                        const ticker = newAsset.ticker.toUpperCase().split('.')[0].trim();
                                        const item = {
                                            id: Date.now(),
                                            ticker,
                                            nome: B3_NAMES[ticker] || "Ativo B3",
                                            quantidade: Number(newAsset.quantidade),
                                            precoMedio: Number(newAsset.precoCompra),
                                            precoAtual: Number(newAsset.precoCompra)
                                        };
                                        updateData({ ...investments, [activeTab]: [...(investments[activeTab] || []), item] });
                                        setNewAsset({ ticker: '', quantidade: '', precoCompra: '' });
                                    }}
                                    className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10 p-6 bg-slate-900 rounded-[2.5rem] shadow-inner"
                                >
                                    <input 
                                        type="text" placeholder="Ticker (Ex: PETR4)" list="tickers-list" 
                                        value={newAsset.ticker} 
                                        onChange={e => setNewAsset({...newAsset, ticker: e.target.value})} 
                                        className="p-4 bg-slate-800 text-white rounded-xl outline-none font-bold placeholder:text-slate-600 text-sm uppercase" 
                                    />
                                    <datalist id="tickers-list">{Object.keys(B3_NAMES).map(t => <option key={t} value={t}>{B3_NAMES[t]}</option>)}</datalist>
                                    <input type="number" placeholder="Quantidade" value={newAsset.quantidade} onChange={e => setNewAsset({...newAsset, quantidade: e.target.value})} className="p-4 bg-slate-800 text-white rounded-xl outline-none font-bold text-sm" />
                                    <input type="number" step="0.01" placeholder="P. Médio" value={newAsset.precoCompra} onChange={e => setNewAsset({...newAsset, precoCompra: e.target.value})} className="p-4 bg-slate-800 text-white rounded-xl outline-none font-bold text-sm" />
                                    <button type="submit" className="bg-blue-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-blue-500 transition-colors">Adicionar</button>
                                </form>

                                <div className="overflow-x-auto custom-scroll">
                                    <table className="w-full text-left min-w-[900px]">
                                        <thead>
                                            <tr className="border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">
                                                <th className="pb-6">Ativo</th>
                                                <th className="pb-6 text-center">Qtd</th>
                                                <th className="pb-6 text-right">P. Médio</th>
                                                <th className="pb-6 text-right">P. Atual</th>
                                                <th className="pb-6 text-right">Patrimônio</th>
                                                <th className="pb-6 text-right">Lucro R$ / %</th>
                                                <th className="pb-6"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {investments[activeTab].map(a => {
                                                const totalCompra = a.quantidade * a.precoMedio;
                                                const totalAtual = a.quantidade * a.precoAtual;
                                                const lucroReal = totalAtual - totalCompra;
                                                const lucroPct = ((a.precoAtual - a.precoMedio) / (a.precoMedio || 1)) * 100;
                                                return (
                                                    <tr key={a.id} className="hover:bg-slate-50/50 transition-all group">
                                                        <td className="py-5">
                                                            <div className="font-black text-slate-900 text-sm leading-tight">{a.ticker}</div>
                                                            <div className="text-[10px] text-slate-400 font-bold uppercase truncate max-w-[150px]">{a.nome}</div>
                                                        </td>
                                                        <td className="py-5 text-center font-bold text-slate-600">{a.quantidade}</td>
                                                        <td className="py-5 text-right font-medium text-slate-500 value-text">{formatBRL(a.precoMedio)}</td>
                                                        <td className="py-5 text-right font-black text-blue-600 leading-tight cursor-pointer hover:underline value-text" onClick={() => {
                                                            const np = prompt("Novo Preço Atual:", a.precoAtual);
                                                            if (np) {
                                                                const up = investments[activeTab].map(x => x.id === a.id ? {...x, precoAtual: Number(np)} : x);
                                                                updateData({...investments, [activeTab]: up});
                                                            }
                                                        }}>{formatBRL(a.precoAtual)}</td>
                                                        <td className="py-5 text-right font-black text-slate-900 leading-tight value-text">{formatBRL(totalAtual)}</td>
                                                        <td className={`py-5 text-right font-black text-xs ${lucroReal >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                            <div className="leading-tight value-text">{formatBRL(lucroReal)}</div>
                                                            <div className="text-[9px] uppercase opacity-70 mt-1">({lucroPct >= 0 ? '+' : ''}{lucroPct.toFixed(2)}%)</div>
                                                        </td>
                                                        <td className="py-5 text-right">
                                                            <div className="flex justify-end gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => {
                                                                    const nq = prompt("Nova Quantidade:", a.quantidade);
                                                                    const nm = prompt("Novo Preço Médio:", a.precoMedio);
                                                                    if (nq && nm) {
                                                                        const up = investments[activeTab].map(x => x.id === a.id ? {...x, quantidade: Number(nq), precoMedio: Number(nm)} : x);
                                                                        updateData({...investments, [activeTab]: up});
                                                                    }
                                                                }} className="text-slate-300 hover:text-slate-900"><i data-lucide="edit-3" className="w-5 h-5"></i></button>
                                                                <button onClick={() => updateData({ ...investments, [activeTab]: investments[activeTab].filter(x => x.id !== a.id) })} className="text-slate-300 hover:text-rose-600"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        )}

                        { (['caixa', 'alternativos'].includes(activeTab)) && (
                            <Card className="animate-in">
                                <div className="flex justify-between items-center mb-8">
                                    <div>
                                        <h3 className="text-2xl font-black uppercase tracking-tight text-slate-900">
                                            {activeTab === 'caixa' ? 'Reserva de Caixa' : 'Ativos Alternativos'}
                                        </h3>
                                        <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">Gestão Manual de Liquidez</p>
                                    </div>
                                    <button 
                                        onClick={() => {
                                            const nome = window.prompt("Nome do Lançamento:");
                                            const valor = window.prompt("Valor (R$):");
                                            if (nome && valor) {
                                                const item = { id: Date.now(), nome, valor: Number(valor) };
                                                updateData({ ...investments, [activeTab]: [...(investments[activeTab] || []), item] });
                                            }
                                        }}
                                        className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] tracking-widest hover:bg-black shadow-xl"
                                    >
                                        Novo Lançamento
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {(investments[activeTab] || []).map(item => (
                                        <div key={item.id} className="flex justify-between items-center p-6 bg-slate-50 rounded-[2.2rem] border border-slate-100 group hover:border-slate-300 transition-all">
                                            <span className="font-black text-slate-700 text-xs uppercase tracking-tight">{item.nome}</span>
                                            <div className="flex items-center gap-6">
                                                <span className="font-black text-slate-900 text-lg value-text">{formatBRL(item.valor)}</span>
                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                                    <button onClick={() => {
                                                        const nv = prompt("Novo Valor:", item.valor);
                                                        if (nv) {
                                                            const up = investments[activeTab].map(x => x.id === item.id ? {...x, valor: Number(nv)} : x);
                                                            updateData({...investments, [activeTab]: up});
                                                        }
                                                    }} className="text-slate-300 hover:text-slate-900"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                    <button onClick={() => updateData({ ...investments, [activeTab]: investments[activeTab].filter(x => x.id !== item.id) })} className="text-slate-300 hover:text-rose-600 transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        )}
                    </main>

                    <footer className="mt-16 py-10 border-t border-slate-100 text-center opacity-40">
                        <p className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">IcaroInvest • Cloud System v2.8 • Brapi Secure Sync</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
