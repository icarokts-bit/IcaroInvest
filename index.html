<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Gestão Patrimonial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; padding: 0; }
        .rounded-premium { border-radius: 2rem; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .tabular { font-variant-numeric: tabular-nums; }
        .text-huge { font-size: clamp(1.1rem, 4vw, 1.6rem); line-height: 1.2; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="font-bold text-slate-400 animate-pulse uppercase tracking-widest text-xs">A sincronizar com a nuvem...</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            messagingSenderId: "45341061429",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c",
            measurementId: "G-Z8FZGVKK8W"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            window.firebaseAPI = { db, doc, setDoc, onSnapshot, auth, signInAnonymously, onAuthStateChanged };
        } catch (e) { console.error("Firebase Fail:", e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = window.Recharts;

        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const COLORS = ['#0f172a', '#2563eb', '#10b981', '#8b5cf6', '#f43f5e', '#f59e0b'];

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => { if (window.lucide) { setReady(true); window.lucide.createIcons(); } }, [name]);
            return ready ? <i data-lucide={name} style={{ width: size, height: size }} className={className}></i> : <div style={{ width: size, height: size }}></div>;
        };

        const StatCard = ({ title, value, icon, colorClass, isMobile }) => (
            <div className={`glass p-6 rounded-premium flex ${isMobile ? 'flex-col items-start gap-2' : 'items-center gap-5'} min-w-0 shadow-sm hover:shadow-md transition-all`}>
                <div className={`${colorClass} p-4 rounded-3xl text-white shadow-lg flex-shrink-0`}>
                    <LucideIcon name={icon} size={28} />
                </div>
                <div className="min-w-0 flex-1">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">{title}</p>
                    <h3 className="text-huge font-black text-slate-900 tabular truncate">{value}</h3>
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [investments, setInvestments] = useState({ acoes: [], realEstate: [], caixa: [], alternativos: [] });
            const [syncStatus, setSyncStatus] = useState("");
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (!window.firebaseAPI) return;
                const { auth, signInAnonymously, onAuthStateChanged, db, doc, onSnapshot } = window.firebaseAPI;

                signInAnonymously(auth).catch(console.error);

                const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                    if (user) {
                        const docRef = doc(db, 'investments', 'portfolio_principal');
                        const unsubscribeData = onSnapshot(docRef, (snap) => {
                            if (snap.exists()) setInvestments(snap.data());
                        });
                        return () => unsubscribeData();
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            const save = async (newData) => {
                if (!window.firebaseAPI) return;
                const { db, doc, setDoc } = window.firebaseAPI;
                await setDoc(doc(db, 'investments', 'portfolio_principal'), newData);
            };

            const totals = useMemo(() => {
                const getSum = (arr) => (arr || []).reduce((acc, curr) => {
                    const preco = Number(curr.precoAtual || curr.valorAtual || curr.valor || 0);
                    const qtd = Number(curr.quantidade || 1);
                    return acc + (preco * qtd);
                }, 0);

                const acoes = getSum(investments.acoes);
                const re = getSum(investments.realEstate);
                const caixa = (investments.caixa || []).reduce((acc, curr) => acc + Number(curr.valorAtual || curr.valor || 0), 0);
                const alt = getSum(investments.alternativos);
                
                return { acoes, re, caixa, alt, total: acoes + re + caixa + alt };
            }, [investments]);

            const format = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const sync = async (category) => {
                const list = [...(investments[category] || [])];
                if (list.length === 0) return;

                setSyncStatus(`Sincronizando ativos...`);
                for (let i = 0; i < list.length; i++) {
                    const t = list[i].ticker.split('.')[0].trim().toUpperCase();
                    setSyncStatus(`A atualizar ${t} (${i+1}/${list.length})...`);
                    try {
                        const res = await fetch(`https://brapi.dev/api/quote/${t}`, { headers: { 'Authorization': `Bearer ${BRAPI_TOKEN}` } });
                        const d = await res.json();
                        if (d.results?.[0]) list[i].precoAtual = d.results[0].regularMarketPrice;
                        await new Promise(r => setTimeout(r, 400));
                    } catch (e) { console.error(e); }
                }
                const updated = { ...investments, [category]: list };
                setInvestments(updated);
                save(updated);
                setSyncStatus("Patrimônio Atualizado!");
                setTimeout(() => setSyncStatus(""), 2000);
            };

            const add = (cat) => {
                let item = { id: Date.now().toString() };
                if (cat === 'caixa') {
                    const n = prompt("Nome da Aplicação:");
                    const va = prompt("Valor Aplicado (R$):");
                    const vt = prompt("Valor Atual Hoje (R$):");
                    if (!n || !va) return;
                    item = { ...item, nome: n, valorAplicado: Number(va), valorAtual: Number(vt || va) };
                } else if (cat === 'alternativos') {
                    const n = prompt("Nome do Ativo:");
                    const v = prompt("Valor Estimado (R$):");
                    if (!n || !v) return;
                    item = { ...item, nome: n, valor: Number(v), precoAtual: Number(v), quantidade: 1 };
                } else {
                    const t = prompt("Ticker:");
                    const q = prompt("Quantidade:");
                    const p = prompt("Preço Médio:");
                    if (!t || !q) return;
                    item = { ...item, ticker: t.toUpperCase(), quantidade: Number(q), precoMedio: Number(p), precoAtual: Number(p) };
                }
                const updated = { ...investments, [cat]: [...(investments[cat] || []), item] };
                setInvestments(updated);
                save(updated);
            };

            const editItem = (cat, id) => {
                const list = [...(investments[cat] || [])];
                const index = list.findIndex(i => i.id === id);
                if (index === -1) return;

                const item = list[index];
                if (cat === 'caixa') {
                    const va = prompt("Novo Valor Aplicado:", item.valorAplicado);
                    const vt = prompt("Novo Valor Atual:", item.valorAtual);
                    if (va && vt) {
                        list[index] = { ...item, valorAplicado: Number(va), valorAtual: Number(vt) };
                    }
                } else if (cat === 'alternativos') {
                    const v = prompt("Novo Valor Estimado:", item.valor);
                    if (v) {
                        list[index] = { ...item, valor: Number(v), precoAtual: Number(v) };
                    }
                } else {
                    const q = prompt("Nova Quantidade:", item.quantidade);
                    const p = prompt("Novo Preço Médio:", item.precoMedio);
                    if (q && p) {
                        list[index] = { ...item, quantidade: Number(q), precoMedio: Number(p) };
                    }
                }

                const updated = { ...investments, [cat]: list };
                setInvestments(updated);
                save(updated);
            };

            const removeItem = (cat, id) => {
                if (!confirm("Deseja realmente excluir este item?")) return;
                const updated = { ...investments, [cat]: (investments[cat] || []).filter(i => i.id !== id) };
                setInvestments(updated);
                save(updated);
            };

            const chartData = useMemo(() => [
                { name: 'Ações', value: totals.acoes },
                { name: 'Real Estate', value: totals.re },
                { name: 'Caixa', value: totals.caixa },
                { name: 'Alternativos', value: totals.alt }
            ].filter(d => d.value > 0), [totals]);

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
                    <header className="py-10 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 text-white p-4 rounded-[2rem] shadow-2xl">
                                <LucideIcon name="ShieldCheck" size={32} />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter leading-none uppercase">ICARO<span className="text-blue-600">INVEST</span></h1>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mt-1">Management Elite v4.1</p>
                            </div>
                        </div>

                        <nav className="flex bg-white p-2 rounded-[1.5rem] shadow-xl border border-slate-100 overflow-x-auto no-scrollbar max-w-full">
                            {[
                                { id: 'dashboard', icon: 'LayoutDashboard', label: 'Início' },
                                { id: 'acoes', icon: 'TrendingUp', label: 'Ações' },
                                { id: 'realEstate', icon: 'Home', label: 'RE' },
                                { id: 'caixa', icon: 'Landmark', label: 'Caixa' },
                                { id: 'alternativos', icon: 'Layers', label: 'Alt' }
                            ].map(t => (
                                <button
                                    key={t.id}
                                    onClick={() => setActiveTab(t.id)}
                                    className={`flex items-center gap-2 px-6 py-3 rounded-2xl text-[10px] font-black transition-all whitespace-nowrap uppercase tracking-widest ${
                                        activeTab === t.id ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'
                                    }`}
                                >
                                    <LucideIcon name={t.icon} size={14} /> {t.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {syncStatus && (
                        <div className="fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-slate-900/90 backdrop-blur text-white px-8 py-4 rounded-full shadow-2xl text-[10px] font-black flex items-center gap-4 animate-bounce">
                            <div className="w-2 h-2 bg-blue-400 rounded-full animate-ping"></div>
                            {syncStatus}
                        </div>
                    )}

                    <main className="space-y-10 animate-in">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                            <StatCard isMobile={isMobile} title="Patrimônio" value={format(totals.total)} icon="Wallet" colorClass="bg-slate-900" />
                            <StatCard isMobile={isMobile} title="Ações" value={format(totals.acoes)} icon="BarChart3" colorClass="bg-blue-600" />
                            <StatCard isMobile={isMobile} title="Real Estate" value={format(totals.re)} icon="Building2" colorClass="bg-emerald-500" />
                            <StatCard isMobile={isMobile} title="Caixa" value={format(totals.caixa)} icon="PiggyBank" colorClass="bg-indigo-500" />
                            <StatCard isMobile={isMobile} title="Alternativos" value={format(totals.alt)} icon="Diamond" colorClass="bg-rose-500" />
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                <div className="lg:col-span-2 glass rounded-[2.5rem] p-10 min-h-[500px] flex flex-col shadow-inner">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-10 text-center">Alocação de Ativos</h2>
                                    <div className="flex-1 w-full">
                                        {chartData.length > 0 ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={chartData} innerRadius={80} outerRadius={140} paddingAngle={8} dataKey="value" stroke="none" cornerRadius={12}>
                                                        {chartData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                                    </Pie>
                                                    <Tooltip 
                                                        contentStyle={{ borderRadius: '1.5rem', border: 'none', boxShadow: '0 25px 50px rgba(0,0,0,0.1)', fontWeight: '900' }}
                                                        formatter={(v) => format(v)}
                                                    />
                                                    <Legend iconType="circle" />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        ) : (
                                            <div className="h-full flex items-center justify-center text-slate-300 font-bold uppercase tracking-widest text-[10px]">Aguardando dados...</div>
                                        )}
                                    </div>
                                </div>
                                <div className="glass rounded-[2.5rem] p-10 shadow-inner">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Composição</h2>
                                    <div className="space-y-4">
                                        {chartData.map((item, i) => (
                                            <div key={item.name} className="flex items-center justify-between p-5 bg-slate-50/50 rounded-3xl border border-slate-100 tabular">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-4 h-4 rounded-full" style={{ background: COLORS[i % COLORS.length] }}></div>
                                                    <span className="font-bold text-slate-700 text-sm">{item.name}</span>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-black text-slate-900">{format(item.value)}</p>
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{((item.value / totals.total) * 100).toFixed(1)}%</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {['acoes', 'realEstate', 'alternativos'].includes(activeTab) && (
                            <div className="glass rounded-[2.5rem] overflow-hidden shadow-2xl animate-fade">
                                <div className="p-8 bg-slate-50/50 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                                    <h2 className="font-black text-slate-800 uppercase tracking-tighter text-2xl">{activeTab}</h2>
                                    <div className="flex gap-4">
                                        {['acoes', 'realEstate'].includes(activeTab) && (
                                            <button onClick={() => sync(activeTab)} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black tracking-widest hover:bg-emerald-700 shadow-lg shadow-emerald-100 uppercase">Sincronizar</button>
                                        )}
                                        <button onClick={() => add(activeTab)} className="bg-blue-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black tracking-widest hover:bg-blue-700 shadow-lg shadow-blue-100 uppercase">+ Adicionar</button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                            <tr>
                                                <th className="px-10 py-6">Ativo</th>
                                                <th className="px-10 py-6">Quantidade</th>
                                                <th className="px-10 py-6">P. Médio</th>
                                                <th className="px-10 py-6">P. Atual</th>
                                                <th className="px-10 py-6">Total</th>
                                                <th className="px-10 py-6 text-right">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {(investments[activeTab] || []).map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50/50 transition-colors tabular text-sm">
                                                    <td className="px-10 py-6 font-black text-slate-900 uppercase">{item.ticker || item.nome}</td>
                                                    <td className="px-10 py-6 font-bold text-slate-500">{item.quantidade}</td>
                                                    <td className="px-10 py-6 font-bold text-slate-500">{format(item.precoMedio || item.valor)}</td>
                                                    <td className="px-10 py-6 font-black text-blue-600">{format(item.precoAtual || item.valor)}</td>
                                                    <td className="px-10 py-6 font-black text-slate-900">{format((item.quantidade || 1) * (item.precoAtual || item.valor || 0))}</td>
                                                    <td className="px-10 py-6 text-right">
                                                        <div className="flex justify-end gap-3">
                                                            <button onClick={() => editItem(activeTab, item.id)} className="text-slate-300 hover:text-blue-600 transition-colors">
                                                                <LucideIcon name="Edit3" size={18} />
                                                            </button>
                                                            <button onClick={() => removeItem(activeTab, item.id)} className="text-slate-300 hover:text-rose-500 transition-colors">
                                                                <LucideIcon name="Trash2" size={18} />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'caixa' && (
                            <div className="glass rounded-[2.5rem] overflow-hidden shadow-2xl animate-fade">
                                <div className="p-8 bg-slate-50/50 border-b flex justify-between items-center">
                                    <h2 className="font-black text-slate-800 uppercase tracking-tighter text-2xl">Reserva e Caixa</h2>
                                    <button onClick={() => add('caixa')} className="bg-blue-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase">+ Novo Lançamento</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                            <tr>
                                                <th className="px-10 py-6">Aplicação</th>
                                                <th className="px-10 py-6">Vlr Aplicado</th>
                                                <th className="px-10 py-6">Vlr Atualizado</th>
                                                <th className="px-10 py-6">Rendimento</th>
                                                <th className="px-10 py-6 text-right">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {(investments.caixa || []).map(item => {
                                                const rend = item.valorAtual - item.valorAplicado;
                                                return (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 tabular text-sm">
                                                        <td className="px-10 py-6 font-black text-slate-900 uppercase">{item.nome}</td>
                                                        <td className="px-10 py-6 font-bold text-slate-500">{format(item.valorAplicado)}</td>
                                                        <td className="px-10 py-6 font-black text-slate-900">{format(item.valorAtual)}</td>
                                                        <td className={`px-10 py-6 font-bold ${rend >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                            {rend >= 0 ? '+' : ''}{format(rend)}
                                                        </td>
                                                        <td className="px-10 py-6 text-right">
                                                            <div className="flex justify-end gap-3">
                                                                <button onClick={() => editItem('caixa', item.id)} className="text-slate-300 hover:text-blue-600 transition-colors">
                                                                    <LucideIcon name="Edit3" size={18} />
                                                                </button>
                                                                <button onClick={() => removeItem('caixa', item.id)} className="text-slate-300 hover:text-rose-500 transition-colors">
                                                                    <LucideIcon name="Trash2" size={18} />
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 py-10 text-center border-t border-slate-100 text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">
                        IcaroInvest Management Systems &copy; 2026
                    </footer>
                </div>
            );
        };

        const start = () => {
            const el = document.getElementById('root');
            if (window.ReactDOM && window.React && window.Recharts) {
                ReactDOM.createRoot(el).render(<App />);
            } else { setTimeout(start, 50); }
        };
        start();
    </script>
</body>
</html>
