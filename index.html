<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Gestão Patrimonial</title>
    
    <!-- Favicon Inicial -->
    <link rel="icon" type="image/png" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #133054; /* Azul do Logo */
            --accent: #bfa260;  /* Dourado do Logo */
            --bg: #f9f9f7;      /* Fundo do Logo */
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #1e293b; 
            margin: 0; 
            padding: 0; 
        }
        .rounded-premium { border-radius: 2rem; }
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(19, 48, 84, 0.05); 
        }
        .tabular { font-variant-numeric: tabular-nums; }
        .no-break { white-space: nowrap; }
        .text-huge { font-size: clamp(1rem, 3.5vw, 1.4rem); line-height: 1.1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: #0d223d; }
        .text-brand { color: var(--primary); }
        .text-gold { color: var(--accent); }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-[#133054] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="font-bold text-slate-400 animate-pulse uppercase tracking-widest text-xs">Iniciando IcaroInvest Elite v8.2...</p>
            </div>
        </div>
    </div>

    <!-- Bibliotecas (Ordem Crítica para evitar erros de undefined) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            window.firebaseAPI = { db, doc, setDoc, onSnapshot, auth, signInAnonymously, onAuthStateChanged };
        } catch (e) { console.error("Firebase Fail:", e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = window.Recharts;

        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const COLORS = ['#133054', '#bfa260', '#10b981', '#64748b', '#f43f5e', '#f59e0b'];

        const parseValue = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'number') return val;
            let clean = val.toString().trim();
            clean = clean.replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };

        const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => { if (window.lucide) { setReady(true); window.lucide.createIcons(); } }, [name]);
            return ready ? <i data-lucide={name} style={{ width: size, height: size }} className={className}></i> : <div style={{ width: size, height: size }}></div>;
        };

        const StatCard = ({ title, value, icon, colorClass, isMobile, subValue = null }) => (
            <div className={`glass p-5 rounded-premium flex ${isMobile ? 'flex-col items-start gap-2' : 'items-center gap-4'} min-w-0 shadow-sm hover:shadow-md transition-all flex-1`}>
                <div className={`${colorClass} p-3 rounded-2xl text-white shadow-lg flex-shrink-0`}>
                    <LucideIcon name={icon} size={24} />
                </div>
                <div className="min-w-0 flex-1">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1 truncate">{title}</p>
                    <h3 className="text-huge font-black text-slate-900 tabular no-break">{value}</h3>
                    {subValue && <p className={`text-[9px] font-bold mt-1 uppercase ${subValue.startsWith('-') ? 'text-rose-500' : 'text-emerald-500'}`}>{subValue}</p>}
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [investments, setInvestments] = useState({ 
                acoes: [], realEstate: [], caixa: [], alternativos: [],
                caixaTicker: [], altFunds: [], altStocks: [], altCrypto: [], dividendos: [],
                historico: [], movimentacoes: []
            });
            const [syncStatus, setSyncStatus] = useState("");
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

            // Lógica para Favicon com Fundo Branco
            useEffect(() => {
                const img = new Image();
                img.src = 'icon.png';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 64; canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.roundRect(0, 0, 64, 64, 12);
                    ctx.fill();
                    ctx.drawImage(img, 4, 4, 56, 56);
                    const link = document.querySelector("link[rel~='icon']");
                    if (link) link.href = canvas.toDataURL('image/png');
                };
            }, []);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (!window.firebaseAPI) return;
                const { auth, signInAnonymously, onAuthStateChanged, db, doc, onSnapshot } = window.firebaseAPI;
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(doc(db, 'investments', 'portfolio_principal'), (snap) => {
                            if (snap.exists()) setInvestments(prevState => ({...prevState, ...snap.data()}));
                        });
                    }
                });
            }, []);

            const save = async (newData) => {
                if (!window.firebaseAPI) return;
                const { db, doc, setDoc } = window.firebaseAPI;
                await setDoc(doc(db, 'investments', 'portfolio_principal'), newData);
            };

            const registrarMovimentacao = (data, ativo, tipo, qtd, valorUnit) => {
                return {
                    id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                    data: data || new Date().toLocaleDateString('pt-BR'),
                    ativo,
                    tipo, // 'Compra' ou 'Venda'
                    quantidade: parseValue(qtd),
                    valorUnitario: parseValue(valorUnit),
                    valorTotal: parseValue(qtd) * parseValue(valorUnit)
                };
            };

            const venderAtivo = (cat, id) => {
                const item = investments[cat].find(i => i.id === id);
                if (!item) return;

                const dataVenda = prompt("Data da venda (DD/MM/AAAA):", new Date().toLocaleDateString('pt-BR'));
                if (!dataVenda) return;

                const maxQtd = cat === 'caixa' ? item.valorAtual : item.quantidade;
                const qtdVendaStr = prompt(`Quantidade a vender (Máx: ${maxQtd}):`, maxQtd);
                const qtdVenda = parseValue(qtdVendaStr);

                if (isNaN(qtdVenda) || qtdVenda <= 0 || qtdVenda > maxQtd) {
                    alert("Quantidade inválida.");
                    return;
                }

                const vUnitStr = prompt("Valor de venda (Unitário):", cat === 'caixa' ? 1 : item.precoAtual);
                const vUnit = parseValue(vUnitStr);
                if (isNaN(vUnit)) return;

                let updatedList;
                if (cat === 'caixa') {
                    const restante = item.valorAtual - qtdVenda;
                    if (restante <= 0) updatedList = investments[cat].filter(i => i.id !== id);
                    else updatedList = investments[cat].map(i => i.id === id ? {...i, valorAtual: restante} : i);
                } else {
                    const restante = item.quantidade - qtdVenda;
                    if (restante <= 0) updatedList = investments[cat].filter(i => i.id !== id);
                    else updatedList = investments[cat].map(i => i.id === id ? {...i, quantidade: restante} : i);
                }

                const novaMov = registrarMovimentacao(dataVenda, cat === 'caixa' ? item.nome : item.ticker, 'Venda', qtdVenda, vUnit);
                const nextData = { 
                    ...investments, 
                    [cat]: updatedList, 
                    movimentacoes: [novaMov, ...(investments.movimentacoes || [])] 
                };
                setInvestments(nextData);
                save(nextData);
                setSyncStatus("Venda registada!");
                setTimeout(() => setSyncStatus(""), 2000);
            };

            const getSectionStats = (list, type = 'ticker') => {
                let investido = 0; let atual = 0; let variacaoDiaR$ = 0;
                if (type === 'ticker') {
                    investido = (list || []).reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoMedio)), 0);
                    atual = (list || []).reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoAtual)), 0);
                    (list || []).forEach(i => {
                        const qty = parseValue(i.quantidade); const cur = parseValue(i.precoAtual); const varPct = parseValue(i.variacaoDia);
                        if (varPct !== 0) {
                            const prevPrice = cur / (1 + (varPct / 100));
                            variacaoDiaR$ += (cur - prevPrice) * qty;
                        }
                    });
                } else {
                    investido = (list || []).reduce((acc, i) => acc + parseValue(i.valorAplicado), 0);
                    atual = (list || []).reduce((acc, i) => acc + parseValue(i.valorAtual), 0);
                }
                const lucro = atual - investido;
                const lucroPct = investido > 0 ? (lucro / investido) * 100 : 0;
                const varDiaPct = atual > 0 ? (variacaoDiaR$ / (atual - variacaoDiaR$)) * 100 : 0;
                return { investido, atual, lucro, lucroPct, variacaoDiaR$, varDiaPct };
            };

            const totals = useMemo(() => {
                const sAcoes = getSectionStats(investments.acoes, 'ticker');
                const sRE = getSectionStats(investments.realEstate, 'ticker');
                const sCaixaM = getSectionStats(investments.caixa, 'manual');
                const sCaixaT = getSectionStats(investments.caixaTicker, 'ticker');
                const sAltF = getSectionStats(investments.altFunds, 'manual');
                const sAltS = getSectionStats(investments.altStocks, 'ticker');
                const sAltC = getSectionStats(investments.altCrypto, 'ticker');
                const dividendos = (investments.dividendos || []).reduce((acc, b) => acc + parseValue(b.valor || 0), 0);

                const acoes = sAcoes; const re = sRE;
                const caixa = { 
                    investido: sCaixaM.investido + sCaixaT.investido, 
                    atual: sCaixaM.atual + sCaixaT.atual, 
                    lucro: sCaixaM.lucro + sCaixaT.lucro,
                    variacaoDiaR$: sCaixaT.variacaoDiaR$
                };
                caixa.lucroPct = caixa.investido > 0 ? (caixa.lucro / caixa.investido) * 100 : 0;
                caixa.varDiaPct = caixa.atual > 0 ? (caixa.variacaoDiaR$ / (caixa.atual - caixa.variacaoDiaR$)) * 100 : 0;
                
                const alt = { 
                    investido: sAltF.investido + sAltS.investido + sAltC.investido, 
                    atual: sAltF.atual + sAltS.atual + sAltC.atual, 
                    lucro: sAltF.lucro + sAltS.lucro + sAltC.lucro,
                    variacaoDiaR$: sAltS.variacaoDiaR$ + sAltC.variacaoDiaR$
                };
                alt.lucroPct = alt.investido > 0 ? (alt.lucro / alt.investido) * 100 : 0;
                alt.varDiaPct = alt.atual > 0 ? (alt.variacaoDiaR$ / (alt.atual - alt.variacaoDiaR$)) * 100 : 0;

                const totalAtu = acoes.atual + re.atual + caixa.atual + alt.atual;
                const varDiaTotal = acoes.variacaoDiaR$ + re.variacaoDiaR$ + caixa.variacaoDiaR$ + alt.variacaoDiaR$ ;
                const varDiaTotalPct = totalAtu > 0 ? (varDiaTotal / (totalAtu - varDiaTotal)) * 100 : 0;

                return { acoes, re, caixa, alt, sAltF, sAltS, sAltC, dividendos, total: totalAtu, varDiaTotal, varDiaTotalPct };
            }, [investments]);

            const capturarSnapshot = () => {
                const dataHoje = new Date().toLocaleDateString('pt-BR');
                const entry = {
                    id: Date.now().toString(),
                    data: dataHoje,
                    geral: { atual: totals.total, investido: totals.acoes.investido + totals.re.investido + totals.caixa.investido + totals.alt.investido },
                    acoes: { ...totals.acoes },
                    re: { ...totals.re },
                    caixa: { ...totals.caixa },
                    alt: { ...totals.alt }
                };
                const updated = { ...investments, historico: [entry, ...(investments.historico || [])] };
                setInvestments(updated); save(updated);
                setSyncStatus("Snapshot salvo!"); setTimeout(() => setSyncStatus(""), 2000);
            };

            const renderTableSection = (cat, title, type = 'ticker') => {
                const data = investments[cat] || [];
                return (
                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 animate-in mb-10">
                        <div className="p-8 bg-slate-50/30 border-b flex justify-between items-center">
                            <h2 className="font-black text-[#133054] uppercase tracking-tighter text-2xl">{title}</h2>
                            <div className="flex gap-4">
                                {type === 'ticker' && <button onClick={() => sync(cat)} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 shadow-lg flex items-center gap-2"><LucideIcon name="RefreshCw" size={14} /> Sincronizar</button>}
                                <button onClick={() => {
                                    if(type === 'ticker') {
                                        const t = prompt("Ticker:"); const q = prompt("Qtd:"); const p = prompt("P. Médio:");
                                        if(t && q) { 
                                            const item = {id: Date.now().toString(), ticker: t.toUpperCase(), quantidade: parseValue(q), precoMedio: parseValue(p), precoAtual: parseValue(p)};
                                            const mov = registrarMovimentacao(null, t.toUpperCase(), 'Compra', q, p);
                                            const u = {...investments, [cat]: [...(investments[cat]||[]), item], movimentacoes: [mov, ...(investments.movimentacoes || [])]}; 
                                            setInvestments(u); save(u); 
                                        }
                                    } else {
                                        const n = prompt("Nome:"); const va = prompt("Vlr Aplicado:"); const vt = prompt("Vlr Atual:");
                                        if(n && va) { 
                                            const item = {id: Date.now().toString(), nome: n, valorAplicado: parseValue(va), valorAtual: parseValue(vt || va)};
                                            const mov = registrarMovimentacao(null, n, 'Compra', 1, va);
                                            const u = {...investments, [cat]: [...(investments[cat]||[]), item], movimentacoes: [mov, ...(investments.movimentacoes || [])]}; 
                                            setInvestments(u); save(u); 
                                        }
                                    }
                                }} className="bg-[#133054] text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black shadow-lg">+ Adicionar</button>
                            </div>
                        </div>
                        <div className="overflow-x-auto custom-scroll">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                    <tr>
                                        <th className="px-10 py-6">Ativo</th>
                                        {type === 'ticker' && <th className="px-10 py-6 text-center">Qtd</th>}
                                        <th className="px-10 py-6 text-right">Custo</th>
                                        <th className="px-10 py-6 text-right">Atual</th>
                                        {type === 'ticker' && <th className="px-10 py-6 text-right">Var. Dia %</th>}
                                        <th className="px-10 py-6 text-right">Patrimônio</th>
                                        <th className="px-10 py-6 text-right">Lucro R$</th>
                                        <th className="px-10 py-6 text-right">Ação</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {data.map(item => {
                                        const q = type === 'ticker' ? parseValue(item.quantidade) : 1;
                                        const pA = type === 'ticker' ? parseValue(item.precoAtual) : parseValue(item.valorAtual);
                                        const pC = type === 'ticker' ? parseValue(item.precoMedio) : parseValue(item.valorAplicado);
                                        const pat = q * pA; const lucro = pat - (q * pC);
                                        return (
                                            <tr key={item.id} className="hover:bg-slate-50/50 tabular text-sm">
                                                <td className="px-10 py-6 font-black text-slate-900 uppercase">{type === 'ticker' ? item.ticker : item.nome}</td>
                                                {type === 'ticker' && <td className="px-10 py-6 text-center font-bold">{q < 1 ? q.toFixed(8).replace(/\.?0+$/, "") : q.toLocaleString()}</td>}
                                                <td className="px-10 py-6 text-right font-bold text-slate-500">{formatBRL(pC)}</td>
                                                <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(pA)}</td>
                                                {type === 'ticker' && <td className={`px-10 py-6 text-right font-bold ${parseValue(item.variacaoDia) >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{item.variacaoDia !== undefined ? `${parseValue(item.variacaoDia).toFixed(2)}%` : '-'}</td>}
                                                <td className="px-10 py-6 text-right font-black text-slate-900">{formatBRL(pat)}</td>
                                                <td className={`px-10 py-6 text-right font-black ${lucro >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{formatBRL(lucro)}</td>
                                                <td className="px-10 py-6 text-right">
                                                    <div className="flex justify-end gap-2">
                                                        <button onClick={() => venderAtivo(cat, item.id)} className="bg-rose-50 text-rose-600 px-3 py-1 rounded-lg font-black text-[9px] uppercase tracking-widest border border-rose-100 hover:bg-rose-600 hover:text-white transition-all">Vender</button>
                                                        <button onClick={() => { if(confirm("Remover permanentemente?")) { const u = {...investments, [cat]: investments[cat].filter(i => i.id !== item.id)}; setInvestments(u); save(u); } }} className="text-slate-300 hover:text-rose-500"><LucideIcon name="Trash2" size={16}/></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const sync = async (cat) => {
                const list = [...(investments[cat] || [])]; setSyncStatus("Sincronizando...");
                for(let i=0; i<list.length; i++) {
                    const t = list[i].ticker;
                    try {
                        const isC = ['BTC','ETH','SOL','USDT'].includes(t) || cat === 'altCrypto';
                        const url = isC ? `https://brapi.dev/api/v2/crypto?coin=${t}&currency=BRL` : `https://brapi.dev/api/quote/${t}`;
                        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${BRAPI_TOKEN}` } });
                        const d = await res.json();
                        if(d.coins?.[0]) { list[i].precoAtual = d.coins[0].regularMarketPrice; list[i].variacaoDia = d.coins[0].coinChangePercent; }
                        else if(d.results?.[0]) { list[i].precoAtual = d.results[0].regularMarketPrice; list[i].variacaoDia = d.results[0].regularMarketChangePercent; }
                        await new Promise(r => setTimeout(r, 400));
                    } catch(e) { console.error(e); }
                }
                const u = {...investments, [cat]: list}; setInvestments(u); save(u); setSyncStatus("Fim!"); setTimeout(()=>setSyncStatus(""), 2000);
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
                    <header className="py-10 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="flex items-center gap-4">
                            <img src="logo.png" alt="Logo" className="h-20 w-auto" />
                            <div className="flex flex-col">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mt-1">Management Elite v8.2</p>
                            </div>
                        </div>
                        <nav className="flex bg-white p-2 rounded-[1.5rem] shadow-sm border border-slate-100 overflow-x-auto no-scrollbar max-w-full">
                            {[
                                { id: 'dashboard', icon: 'LayoutDashboard', label: 'Resumo' },
                                { id: 'acoes', icon: 'TrendingUp', label: 'Ações' },
                                { id: 'realEstate', icon: 'Home', label: 'RE' },
                                { id: 'caixa', icon: 'Landmark', label: 'Caixa' },
                                { id: 'alternativos', icon: 'Layers', label: 'Alt' },
                                { id: 'movimentacoes', icon: 'ArrowLeftRight', label: 'Movimentações' },
                                { id: 'dividendos', icon: 'Coins', label: 'Proventos' },
                                { id: 'historico', icon: 'History', label: 'Histórico' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl text-xs font-black transition-all whitespace-nowrap ${activeTab === t.id ? 'bg-[#133054] text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <LucideIcon name={t.icon} size={14} /> {t.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {syncStatus && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-50 bg-[#133054] text-white px-8 py-3 rounded-full shadow-2xl text-[10px] font-black uppercase tracking-widest animate-in">{syncStatus}</div>}

                    <main className="space-y-10 animate-in">
                        {activeTab === 'dashboard' ? (
                            <div className="space-y-10">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                                    <StatCard isMobile={isMobile} title="Patrimônio Total" value={formatBRL(totals.total)} icon="Wallet" colorClass="bg-[#133054]" />
                                    <StatCard isMobile={isMobile} title="Bolsa / Ações" value={formatBRL(totals.acoes.atual)} icon="BarChart3" colorClass="bg-[#bfa260]" />
                                    <StatCard isMobile={isMobile} title="Real Estate" value={formatBRL(totals.re.atual)} icon="Building2" colorClass="bg-emerald-600" />
                                    <StatCard isMobile={isMobile} title="Reserva / Caixa" value={formatBRL(totals.caixa.atual)} icon="PiggyBank" colorClass="bg-slate-500" />
                                    <StatCard isMobile={isMobile} title="Alternativos" value={formatBRL(totals.alt.atual)} icon="Layers" colorClass="bg-rose-500" />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 bg-white rounded-[2.5rem] p-10 min-h-[500px] flex flex-col shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-10 text-center">Alocação</h2>
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={[{ name: 'Ações', value: totals.acoes.atual }, { name: 'RE', value: totals.re.atual }, { name: 'Caixa', value: totals.caixa.atual }, { name: 'Alt', value: totals.alt.atual }].filter(d => d.value > 0)} innerRadius={80} outerRadius={140} paddingAngle={8} dataKey="value" stroke="none" cornerRadius={12}>
                                                    {COLORS.map((c, i) => <Cell key={i} fill={c} />)}
                                                </Pie>
                                                <Tooltip contentStyle={{ borderRadius: '1.5rem', border: 'none', boxShadow: '0 10px 20px rgba(0,0,0,0.05)', fontWeight: '900' }} formatter={(v) => formatBRL(v)} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Composição</h2>
                                        <div className="space-y-4">
                                            {[ { label: 'Ações', v: totals.acoes, color: COLORS[0] }, { label: 'Real Estate', v: totals.re, color: COLORS[1] }, { label: 'Caixa', v: totals.caixa, color: COLORS[2] }, { label: 'Alternativos', v: totals.alt, color: COLORS[4] } ].map(item => (
                                                <div key={item.label} className="p-5 bg-slate-50/50 rounded-3xl border border-slate-100">
                                                    <div className="flex items-center justify-between mb-2">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-3 h-3 rounded-full" style={{ background: item.color }}></div>
                                                            <span className="font-bold text-slate-700 text-xs uppercase">{item.label}</span>
                                                        </div>
                                                        <span className="text-[10px] font-black text-slate-400">{((item.v.atual / (totals.total || 1)) * 100).toFixed(1)}%</span>
                                                    </div>
                                                    <div className="flex justify-between items-end">
                                                        <p className="font-black text-sm text-slate-900">{formatBRL(item.v.atual)}</p>
                                                        <p className={`text-[9px] font-bold ${item.v.lucro >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}> {item.v.lucroPct.toFixed(2)}% </p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : activeTab === 'movimentacoes' ? (
                            <div className="space-y-10 animate-in">
                                <h2 className="text-2xl font-black uppercase text-[#133054]">Movimentações</h2>
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                <tr><th className="px-10 py-6">Data</th><th className="px-10 py-6">Ativo</th><th className="px-10 py-6">Tipo</th><th className="px-10 py-6 text-center">Quantidade</th><th className="px-10 py-6 text-right">Vlr Unitário</th><th className="px-10 py-6 text-right">Total</th><th className="px-10 py-6"></th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 tabular text-sm">
                                                {(investments.movimentacoes || []).map(m => (
                                                    <tr key={m.id} className="hover:bg-slate-50/50">
                                                        <td className="px-10 py-6 text-slate-500 font-bold">{m.data}</td>
                                                        <td className="px-10 py-6 font-black uppercase text-[#133054]">{m.ativo}</td>
                                                        <td className="px-10 py-6"><span className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${m.tipo === 'Compra' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>{m.tipo}</span></td>
                                                        <td className="px-10 py-6 text-center font-bold">{m.quantidade < 1 ? m.quantidade.toFixed(8).replace(/\.?0+$/, "") : m.quantidade.toLocaleString()}</td>
                                                        <td className="px-10 py-6 text-right font-bold text-slate-400">{formatBRL(m.valorUnitario)}</td>
                                                        <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(m.valorTotal)}</td>
                                                        <td className="px-10 py-6 text-right"><button onClick={() => { if(confirm("Apagar registo?")) { const u = {...investments, movimentacoes: investments.movimentacoes.filter(x => x.id !== m.id)}; setInvestments(u); save(u); } }} className="text-slate-200 hover:text-rose-500"><LucideIcon name="Trash2" size={16}/></button></td>
                                                    </tr>
                                                ))}
                                                {(investments.movimentacoes || []).length === 0 && <tr><td colSpan="7" className="px-10 py-20 text-center text-slate-300 font-bold uppercase text-[10px] tracking-[0.4em]">Nenhuma movimentação registada</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : activeTab === 'historico' ? (
                            <div className="space-y-10">
                                <div className="flex justify-between items-center"><h2 className="text-2xl font-black uppercase text-[#133054]">Histórico de Evolução</h2><button onClick={capturarSnapshot} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 shadow-lg flex items-center gap-2"><LucideIcon name="Camera" size={14} /> Snapshot</button></div>
                                <div className="bg-white rounded-[2.5rem] overflow-x-auto custom-scroll shadow-sm border border-slate-100">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                            <tr><th className="px-10 py-6 sticky left-0 bg-slate-50 z-10 border-r"> Snapshot</th>{(investments.historico || []).map(h => <th key={h.id} className="px-10 py-6 text-center bg-slate-100/10 min-w-[220px] border-l">{h.data}</th>)}</tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 tabular">
                                            {[ { label: 'Total', key: 'geral', color: 'text-[#133054]' }, { label: 'Ações', key: 'acoes', color: 'text-[#bfa260]' }, { label: 'RE', key: 're', color: 'text-emerald-600' }, { label: 'Caixa', key: 'caixa', color: 'text-slate-500' }, { label: 'Alt', key: 'alt', color: 'text-rose-500' } ].map(cat => (
                                                <tr key={cat.key} className="hover:bg-slate-50/50">
                                                    <td className="px-10 py-6 font-black text-[10px] uppercase sticky left-0 bg-white border-r">{cat.label}</td>
                                                    {(investments.historico || []).map(h => {
                                                        const data = h[cat.key]; const luc = data.atual - data.investido; const pct = data.investido > 0 ? (luc / data.investido) * 100 : 0;
                                                        return ( <td key={h.id + cat.key} className="px-10 py-6 border-l"><span className={`font-black ${cat.color}`}>{formatBRL(data.atual)}</span><div className={`text-[8px] font-bold ${luc>=0?'text-emerald-500':'text-rose-500'}`}>{formatBRL(luc)} ({pct.toFixed(1)}%)</div></td> );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : activeTab === 'dividendos' ? (
                            <div className="space-y-10">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><StatCard isMobile={isMobile} title="Total Recebido" value={formatBRL(totals.dividendos)} icon="Coins" colorClass="bg-emerald-600" /><StatCard isMobile={isMobile} title="Entradas" value={(investments.dividendos?.length || 0)} icon="Activity" colorClass="bg-[#133054]" /></div>
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                    <div className="p-8 bg-slate-50/30 border-b flex justify-between items-center"><h2 className="font-black text-[#133054] uppercase tracking-tighter text-2xl">Proventos</h2><button onClick={() => { const a = prompt("Ativo:"); const v = prompt("Valor:"); if(a && v) { const u = {...investments, dividendos: [...(investments.dividendos||[]), {id: Date.now().toString(), data: new Date().toLocaleDateString('pt-BR'), ativo: a.toUpperCase(), tipo: "Dividendo", valor: parseValue(v)}]}; setInvestments(u); save(u); } }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">+ Lançar</button></div>
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-400 font-black"><tr><th className="px-10 py-6">Data</th><th className="px-10 py-6">Ativo</th><th className="px-10 py-6 text-right">Valor</th><th className="px-10 py-6"></th></tr></thead>
                                        <tbody className="divide-y divide-slate-100 tabular text-sm">
                                            {(investments.dividendos || []).map(item => ( <tr key={item.id}><td className="px-10 py-6 text-slate-500 font-bold">{item.data}</td><td className="px-10 py-6 font-black text-slate-900 uppercase">{item.ativo}</td><td className="px-10 py-6 text-right font-black text-emerald-600">{formatBRL(item.valor)}</td><td className="px-10 py-6 text-right"><button onClick={() => { if(confirm("Remover?")) { const u = {...investments, dividendos: investments.dividendos.filter(i => i.id !== item.id)}; setInvestments(u); save(u); } }} className="text-slate-200 hover:text-rose-500"><LucideIcon name="Trash2" size={18}/></button></td></tr> ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-10">
                                {(() => {
                                    let s; if (activeTab === 'alternativos') { const sF = getSectionStats(investments.altFunds, 'manual'); const sS = getSectionStats(investments.altStocks, 'ticker'); const sC = getSectionStats(investments.altCrypto, 'ticker'); const inv = sF.investido + sS.investido + sC.investido; const atu = sF.atual + sS.atual + sC.atual; const luc = atu - inv; const varR$ = sS.variacaoDiaR$ + sC.variacaoDiaR$; const varPct = atu > 0 ? (varR$ / (atu - varR$)) * 100 : 0; s = { investido: inv, atual: atu, lucro: luc, lucroPct: inv > 0 ? (luc / inv) * 100 : 0, varDiaR$: varR$, varDiaPct: varPct }; } 
                                    else { const catMap = { acoes: 'ticker', realEstate: 'ticker', caixa: 'manual' }; s = getSectionStats(investments[activeTab], catMap[activeTab]); if (activeTab === 'caixa') { const sT = getSectionStats(investments.caixaTicker, 'ticker'); s.variacaoDiaR$ = sT.variacaoDiaR$; s.varDiaPct = s.atual > 0 ? (s.variacaoDiaR$ / (s.atual - s.variacaoDiaR$)) * 100 : 0; } }
                                    return (
                                        <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                                            <StatCard isMobile={isMobile} title="Total Investido" value={formatBRL(s.investido)} icon="PiggyBank" colorClass="bg-slate-900" />
                                            <StatCard isMobile={isMobile} title="Lucro Bruto" value={formatBRL(s.lucro)} subValue={`${s.lucroPct.toFixed(2)}%`} icon="TrendingUp" colorClass={s.lucro >= 0 ? "bg-emerald-500" : "bg-rose-500"} />
                                            <StatCard isMobile={isMobile} title="Var. Dia (R$)" value={formatBRL(s.varDiaR$ || 0)} icon="Activity" colorClass={(s.varDiaR$ || 0) >= 0 ? "bg-emerald-400" : "bg-rose-400"} />
                                            <StatCard isMobile={isMobile} title="Var. Dia (%)" value={`${(s.varDiaPct || 0).toFixed(2)}%`} icon="Percent" colorClass={(s.varDiaPct || 0) >= 0 ? "bg-emerald-400" : "bg-rose-400"} />
                                            <StatCard isMobile={isMobile} title="Patrimônio" value={formatBRL(s.atual)} icon="Wallet" colorClass="bg-[#133054]" />
                                        </div>
                                    );
                                })()}
                                {activeTab === 'acoes' && renderTableSection('acoes', 'Ações', 'ticker')}
                                {activeTab === 'realEstate' && renderTableSection('realEstate', 'RE (FIIs)', 'ticker')}
                                {activeTab === 'caixa' && ( <> {renderTableSection('caixa', 'Caixa (Manual)', 'manual')} {renderTableSection('caixaTicker', 'RF Cotada', 'ticker')} </> )}
                                {activeTab === 'alternativos' && ( <> {renderTableSection('altFunds', 'Fundos', 'manual')} {renderTableSection('altStocks', 'Ações Alt', 'ticker')} {renderTableSection('altCrypto', 'Cripto', 'ticker')} </> )}
                            </div>
                        )}
                    </main>
                    <footer className="mt-20 py-10 text-center border-t border-slate-100 text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">IcaroInvest Management Elite &copy; 2026</footer>
                </div>
            );
        };
        const start = () => { if (window.ReactDOM && window.React && window.Recharts) { ReactDOM.createRoot(document.getElementById('root')).render(<App />); } else { setTimeout(start, 50); } };
        start();
    </script>
</body>
</html>
