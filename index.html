<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IcaroInvest - Controle Patrimonial</title>
    
    <!-- Scripts de Dependência -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root {
            --app-radius: 2.2rem;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Card Styling */
        .card-radius { border-radius: var(--app-radius); }
        
        /* Value Protection - Impede o erro da imagem 8ecb43 */
        .value-text {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            word-break: break-all;
            line-height: 1.1;
        }

        /* Animações */
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Ajuste para App Mode (Standalone) */
        @media (display-mode: standalone) {
            .app-padding { padding-top: env(safe-area-inset-top); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { PieChart, Pie, Cell, Legend, ResponsiveContainer, Tooltip } = window.Recharts;

        // Configurações
        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            messagingSenderId: "45341061429",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c",
            measurementId: "G-Z8FZGVKK8W"
        };

        const COLORS = ['#0f172a', '#2563eb', '#059669', '#7c3aed', '#db2777', '#0891b2'];
        const INITIAL_DATA = { acoes: [], realEstate: [], caixa: [], alternativos: [] };

        // Componente StatCard Adaptativo
        const StatCard = ({ title, value, iconName, colorClass, isApp }) => (
            <div className={`bg-white p-5 card-radius shadow-sm border border-slate-100 flex ${isApp ? 'flex-col items-start' : 'items-center'} gap-3 transition-all hover:shadow-md min-h-[120px]`}>
                <div className={`flex-shrink-0 p-3 rounded-2xl ${colorClass} text-white shadow-lg`}>
                    <i data-lucide={iconName} className="w-5 h-5"></i>
                </div>
                <div className="min-w-0 w-full">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">
                        {title}
                    </p>
                    <p className={`value-text font-black text-slate-900 ${isApp ? 'text-lg' : 'text-xl md:text-2xl'}`}>
                        {value}
                    </p>
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [investments, setInvestments] = useState(INITIAL_DATA);
            const [syncing, setSyncing] = useState(false);
            const [statusMsg, setStatusMsg] = useState(null);
            const [isApp, setIsApp] = useState(false);
            
            const dbRef = useRef(null);

            useEffect(() => {
                // Detecção de Site vs App
                const checkAppMode = () => {
                    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                    const isMobile = window.innerWidth < 768;
                    setIsApp(isStandalone || isMobile);
                };
                
                checkAppMode();
                window.addEventListener('resize', checkAppMode);

                // Inicialização Firebase
                const initFirebase = async () => {
                    try {
                        if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
                        const db = window.firebase.firestore();
                        dbRef.current = db.collection("investments").doc("portfolio_principal");

                        dbRef.current.onSnapshot((doc) => {
                            if (doc.exists) setInvestments(doc.data());
                            else dbRef.current.set(INITIAL_DATA);
                            setLoading(false);
                            setTimeout(() => lucide.createIcons(), 100);
                        });
                    } catch (e) {
                        console.error("Firebase Error:", e);
                        setLoading(false);
                    }
                };
                initFirebase();
                return () => window.removeEventListener('resize', checkAppMode);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab, loading, investments, syncing]);

            const updateData = async (newData) => {
                setInvestments(newData);
                if (dbRef.current) await dbRef.current.set(newData);
            };

            const syncCategory = async (category) => {
                const targetList = investments[category];
                if (!targetList || targetList.length === 0) return;
                
                setSyncing(true);
                const newList = [...targetList];

                try {
                    for (let i = 0; i < newList.length; i++) {
                        const item = newList[i];
                        const ticker = item.ticker.split('.')[0].trim().toUpperCase();
                        setStatusMsg(`Consultando ${ticker}...`);
                        
                        const response = await fetch(`https://brapi.dev/api/quote/${ticker}`, { 
                            headers: { "Authorization": `Bearer ${BRAPI_TOKEN}` } 
                        });
                        const data = await response.json();
                        
                        if (data?.results?.[0]?.regularMarketPrice) {
                            newList[i] = { ...item, precoAtual: data.results[0].regularMarketPrice };
                        }
                        await new Promise(r => setTimeout(r, 300));
                    }
                    await updateData({ ...investments, [category]: newList });
                    setStatusMsg("Carteira Atualizada!");
                } catch (err) {
                    setStatusMsg("Erro na API.");
                } finally {
                    setSyncing(false);
                    setTimeout(() => setStatusMsg(null), 3000);
                }
            };

            const totals = useMemo(() => {
                const getSum = (arr) => (arr || []).reduce((a, b) => a + (Number(b.quantidade || 1) * Number(b.precoAtual || b.valor || 0)), 0);
                const acoes = getSum(investments.acoes);
                const re = getSum(investments.realEstate);
                const caixa = (investments.caixa || []).reduce((a, b) => a + Number(b.valor || 0), 0);
                const alt = (investments.alternativos || []).reduce((a, b) => a + Number(b.valor || 0), 0);
                return { acoes, re, caixa, alt, total: acoes + re + caixa + alt };
            }, [investments]);

            const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white">
                    <div className="text-center">
                        <div className="w-10 h-10 border-4 border-slate-900 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-slate-400 font-black uppercase tracking-widest text-[10px]">IcaroInvest Cloud</p>
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen p-4 md:p-8 max-w-7xl mx-auto app-padding transition-all duration-500`}>
                    <header className="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-[1.8rem] text-white shadow-xl">
                                <i data-lucide="shield-check" className="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black uppercase tracking-tight text-slate-900">Icaro<span className="text-blue-600">Invest</span></h1>
                                <p className="text-slate-400 text-[9px] font-bold uppercase tracking-[0.2em]">
                                    {isApp ? 'App View Activated' : 'Web Dashboard Mode'}
                                </p>
                            </div>
                        </div>

                        <nav className="bg-white p-1.5 rounded-[2rem] shadow-sm border border-slate-100 flex overflow-x-auto gap-1 custom-scroll">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                                { id: 'acoes', label: 'Ações', icon: 'briefcase' },
                                { id: 'realEstate', label: 'RE', icon: 'home' },
                                { id: 'caixa', label: 'Caixa', icon: 'landmark' },
                                { id: 'alternativos', label: 'Alt', icon: 'coins' },
                            ].map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-5 py-3 rounded-2xl text-[10px] font-black transition-all uppercase tracking-widest whitespace-nowrap ${
                                        activeTab === tab.id ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'
                                    }`}
                                >
                                    <i data-lucide={tab.icon} className="w-4 h-4"></i> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {}
                    <main className="space-y-6">
                        { activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in">
                                <div className={`grid grid-cols-2 md:grid-cols-5 gap-3`}>
                                    <div className="col-span-2 md:col-span-1">
                                        <StatCard isApp={isApp} title="Patrimônio Total" value={formatBRL(totals.total)} iconName="trending-up" colorClass="bg-slate-900" />
                                    </div>
                                    <StatCard isApp={isApp} title="Ações" value={formatBRL(totals.acoes)} iconName="briefcase" colorClass="bg-blue-600" />
                                    <StatCard isApp={isApp} title="Real Estate" value={formatBRL(totals.re)} iconName="home" colorClass="bg-emerald-600" />
                                    <StatCard isApp={isApp} title="Caixa" value={formatBRL(totals.caixa)} iconName="landmark" colorClass="bg-purple-600" />
                                    <StatCard isApp={isApp} title="Alternativos" value={formatBRL(totals.alt)} iconName="coins" colorClass="bg-rose-500" />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 card-radius border border-slate-100 shadow-sm">
                                        <h3 className="text-[10px] font-black uppercase text-slate-400 mb-8 tracking-widest text-center">Alocação de Ativos</h3>
                                        <div className="h-64">
                                            {totals.total > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie 
                                                            data={[
                                                                { name: 'Ações', value: totals.acoes },
                                                                { name: 'RE', value: totals.re },
                                                                { name: 'Caixa', value: totals.caixa },
                                                                { name: 'Alt', value: totals.alt }
                                                            ].filter(d => d.value > 0)} 
                                                            innerRadius={60} outerRadius={80} paddingAngle={8} dataKey="value" cornerRadius={6}
                                                        >
                                                            {COLORS.map((e, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                                        </Pie>
                                                        <Tooltip formatter={(v) => formatBRL(v)} />
                                                        <Legend iconType="circle" wrapperStyle={{ fontSize: '10px', fontWeight: '900', textTransform: 'uppercase' }} />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : (
                                                <div className="h-full flex items-center justify-center text-slate-200 uppercase text-[10px] font-black tracking-widest">Sem Dados</div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-white p-6 card-radius border border-slate-100 shadow-sm">
                                        <h3 className="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">Resumo Consolidado</h3>
                                        <div className="space-y-3">
                                            {[
                                                { label: 'Ações', val: totals.acoes, color: COLORS[1] },
                                                { label: 'Real Estate', val: totals.re, color: COLORS[2] },
                                                { label: 'Caixa', val: totals.caixa, color: COLORS[3] },
                                                { label: 'Alternativos', val: totals.alt, color: COLORS[4] }
                                            ].map((item) => (
                                                <div key={item.label} className="flex items-center justify-between p-4 bg-slate-50/50 rounded-2xl border border-slate-100 group transition-all">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: item.color }}></div>
                                                        <span className="text-[11px] font-black text-slate-600 uppercase tracking-tight">{item.label}</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="font-black text-slate-900 text-sm value-text">{formatBRL(item.val)}</div>
                                                        <div className="text-[9px] text-slate-400 font-bold mt-0.5">{((item.val / (totals.total || 1)) * 100).toFixed(1)}%</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        { (activeTab === 'acoes' || activeTab === 'realEstate') && (
                            <div className="bg-white p-6 card-radius shadow-sm border border-slate-100 animate-in">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                                    <div>
                                        <h2 className="text-xl font-black uppercase text-slate-900 leading-none">
                                            {activeTab === 'acoes' ? 'Carteira de Ações' : 'Fundos Imobiliários'}
                                        </h2>
                                        <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-2">Sincronização Ativa B3</p>
                                    </div>
                                    <button 
                                        onClick={() => syncCategory(activeTab)}
                                        disabled={syncing}
                                        className={`flex items-center gap-2 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${
                                            syncing ? 'bg-slate-100 text-slate-300' : 'bg-emerald-600 text-white shadow-lg'
                                        }`}
                                    >
                                        <i data-lucide="refresh-cw" className={`w-3 h-3 ${syncing ? 'animate-spin' : ''}`}></i>
                                        {syncing ? 'Sincronizando...' : 'Atualizar Preços'}
                                    </button>
                                </div>

                                <div className="overflow-x-auto custom-scroll -mx-6 px-6">
                                    <table className="w-full text-left min-w-[700px]">
                                        <thead>
                                            <tr className="border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                                <th className="pb-4">Ativo</th>
                                                <th className="pb-4 text-center">Qtd</th>
                                                <th className="pb-4 text-right">P. Atual</th>
                                                <th className="pb-4 text-right">Total</th>
                                                <th className="pb-4 text-right">Lucro %</th>
                                                <th className="pb-4"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {investments[activeTab].map(a => {
                                                const lucroPct = ((a.precoAtual - a.precoMedio) / (a.precoMedio || 1)) * 100;
                                                return (
                                                    <tr key={a.id} className="group">
                                                        <td className="py-4">
                                                            <div className="font-black text-slate-900 text-sm">{a.ticker}</div>
                                                            <div className="text-[9px] text-slate-400 font-bold uppercase">{a.nome || 'B3 Asset'}</div>
                                                        </td>
                                                        <td className="py-4 text-center font-bold text-slate-600 text-sm">{a.quantidade}</td>
                                                        <td className="py-4 text-right font-black text-blue-600 text-sm value-text">{formatBRL(a.precoAtual)}</td>
                                                        <td className="py-4 text-right font-black text-slate-900 text-sm value-text">{formatBRL(a.quantidade * a.precoAtual)}</td>
                                                        <td className={`py-4 text-right font-black text-xs ${lucroPct >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                            {lucroPct.toFixed(2)}%
                                                        </td>
                                                        <td className="py-4 text-right">
                                                            <button onClick={() => updateData({ ...investments, [activeTab]: investments[activeTab].filter(x => x.id !== a.id) })} className="text-slate-200 hover:text-rose-600">
                                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 pb-10 text-center opacity-30">
                        <p className="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400">IcaroInvest • Sistema Patrimonial Privado • v3.0</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
