<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Gestão Patrimonial</title>
    
    <!-- Favicon Inicial -->
    <link rel="icon" type="image/png" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #133054; /* Azul do Logo */
            --accent: #bfa260;  /* Dourado do Logo */
            --bg: #f9f9f7;      /* Fundo do Logo */
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #1e293b; 
            margin: 0; 
            padding: 0; 
        }
        .rounded-premium { border-radius: 2rem; }
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(19, 48, 84, 0.05); 
        }
        .tabular { font-variant-numeric: tabular-nums; }
        .no-break { white-space: nowrap; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex flex-col items-center justify-center min-h-screen">
            <div class="w-12 h-12 border-4 border-[#133054] border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-bold text-slate-400 animate-pulse uppercase tracking-widest text-xs">A carregar IcaroInvest Elite v11.21...</p>
        </div>
    </div>

    <!-- Bibliotecas React e Gráficos -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- Script de Inicialização do Firebase -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const wrapSnap = (snap) => ({ exists: () => snap.exists, data: () => snap.data() });

        window.firebaseAPI = {
            db: db, auth: auth,
            doc: (dbInstance, col, id) => dbInstance.collection(col).doc(id),
            setDoc: (ref, data) => ref.set(data),
            getDoc: async (ref) => wrapSnap(await ref.get()),
            onSnapshot: (ref, cb, errCb) => ref.onSnapshot(snap => cb(wrapSnap(snap)), errCb),
            signInWithEmailAndPassword: (authInstance, e, p) => authInstance.signInWithEmailAndPassword(e, p),
            createUserWithEmailAndPassword: (authInstance, e, p) => authInstance.createUserWithEmailAndPassword(e, p),
            signOut: (authInstance) => authInstance.signOut(),
            onAuthStateChanged: (authInstance, cb) => authInstance.onAuthStateChanged(cb)
        };
        
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <!-- Corrigido: Remoção da flag de módulo para forçar o React clássico e evitar o erro jsx-runtime -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip } = window.Recharts;

        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const COLORS = ['#133054', '#bfa260', '#10b981', '#64748b', '#f43f5e', '#f59e0b'];
        const EXCLUDED_TICKERS = ['CHAINLINK', 'PENDLE'];

        const parseValue = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'number') return val;
            let clean = val.toString().trim();
            if (clean.includes(',')) return parseFloat(clean.replace(/\./g, '').replace(',', '.')) || 0;
            if (clean.includes('.')) {
                const pointsCount = (clean.match(/\./g) || []).length;
                if (pointsCount > 1) return parseFloat(clean.replace(/\./g, '')) || 0;
                if (clean.startsWith('0.')) return parseFloat(clean) || 0;
                const parts = clean.split('.');
                if (parts[1] && parts[1].length === 3 && parseInt(parts[0]) > 9) return parseFloat(clean.replace(/\./g, '')) || 0;
            }
            return parseFloat(clean) || 0;
        };

        const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => { if (window.lucide) { setReady(true); window.lucide.createIcons(); } }, [name, ready]);
            return ready ? <i data-lucide={name} style={{ width: size, height: size }} className={className}></i> : <div style={{ width: size, height: size }}></div>;
        };

        const StatCard = ({ title, value, icon, colorClass, isMobile, subValue = null }) => (
            <div className="glass p-3 sm:p-4 rounded-premium flex items-center gap-2 sm:gap-3 min-w-0 shadow-sm hover:shadow-md transition-all flex-1">
                <div className={`${colorClass} p-2 sm:p-3 rounded-xl sm:rounded-2xl text-white shadow-md flex-shrink-0`}>
                    <LucideIcon name={icon} size={16} className="sm:w-5 sm:h-5" />
                </div>
                <div className="min-w-0 flex-1">
                    <p className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5 truncate">{title}</p>
                    <h3 className={`text-xs sm:text-sm md:text-base lg:text-lg font-black tabular truncate ${
                        title.includes('Var.') || title.includes('Lucro') 
                        ? (parseValue(value.toString().replace(/[^0-9,-]/g, '').replace(',', '.')) >= 0 ? 'text-emerald-600' : 'text-rose-600') 
                        : 'text-slate-900'
                    }`}>
                        {value}
                    </h3>
                    {subValue && (
                        <p className={`text-[8px] font-bold truncate mt-0.5 uppercase ${subValue.toString().startsWith('-') ? 'text-rose-500' : 'text-emerald-500'}`}>
                            {subValue}
                        </p>
                    )}
                </div>
            </div>
        );

        const TabSummaryHeader = ({ stats, label }) => (
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 animate-in">
                <div className="glass p-4 sm:p-5 rounded-premium shadow-sm border border-slate-100 min-w-0">
                    <p className="text-[8px] sm:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 truncate">Património {label}</p>
                    <h3 className="text-sm sm:text-base md:text-lg lg:text-xl font-black text-[#133054] truncate tabular">{formatBRL(stats.atual)}</h3>
                </div>
                <div className="glass p-4 sm:p-5 rounded-premium shadow-sm border border-slate-100 min-w-0">
                    <p className="text-[8px] sm:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 truncate">Total Investido / Custo</p>
                    <h3 className="text-sm sm:text-base md:text-lg lg:text-xl font-black text-slate-500 truncate tabular">{formatBRL(stats.investido)}</h3>
                </div>
                <div className="glass p-4 sm:p-5 rounded-premium shadow-sm border border-slate-100 min-w-0">
                    <p className="text-[8px] sm:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 truncate">Lucro / Prejuízo</p>
                    <h3 className={`text-sm sm:text-base md:text-lg lg:text-xl font-black truncate tabular ${stats.lucro >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                        {formatBRL(stats.lucro)}
                        <span className="text-[10px] font-bold ml-1">({stats.lucroPct.toFixed(2)}%)</span>
                    </h3>
                </div>
                <div className="glass p-4 sm:p-5 rounded-premium shadow-sm border border-slate-100 min-w-0">
                    <p className="text-[8px] sm:text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 truncate">Variação Diária</p>
                    <h3 className={`text-sm sm:text-base md:text-lg lg:text-xl font-black truncate tabular ${stats.variacaoDiaR$ >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                        {stats.variacaoDiaR$ >= 0 ? '+' : ''}{formatBRL(stats.variacaoDiaR$)}
                        <span className="text-[10px] font-bold ml-1">({stats.varDiaPct.toFixed(2)}%)</span>
                    </h3>
                </div>
            </div>
        );

        const CategoryPerformanceCard = ({ title, stats, icon, colorClass, borderClass }) => (
            <div className={`bg-white p-5 sm:p-6 rounded-[2rem] border ${borderClass} shadow-sm hover:shadow-md transition-all flex flex-col justify-between min-w-0`}>
                <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-3 min-w-0">
                        <div className={`${colorClass} p-2 rounded-xl text-white shadow-md flex-shrink-0`}>
                            <LucideIcon name={icon} size={16} />
                        </div>
                        <span className="font-black text-[10px] sm:text-xs uppercase text-slate-700 tracking-wider truncate">{title}</span>
                    </div>
                </div>
                <div className="space-y-4 min-w-0">
                    <div>
                        <span className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-wider block">Património Atual</span>
                        <span className="text-base sm:text-lg md:text-xl lg:text-2xl font-black text-slate-950 truncate block tabular">{formatBRL(stats.atual)}</span>
                    </div>
                    <div className="grid grid-cols-2 gap-2 pt-3 border-t border-slate-100 min-w-0">
                        <div className="min-w-0">
                            <span className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-wider block truncate">Custo / Aplicado</span>
                            <span className="text-[10px] sm:text-xs font-black text-slate-600 truncate block tabular">{formatBRL(stats.investido)}</span>
                        </div>
                        <div className="min-w-0">
                            <span className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-wider block truncate">Lucro Total</span>
                            <span className={`text-[10px] sm:text-xs font-black truncate block tabular ${stats.lucro >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                                {stats.lucroPct.toFixed(1)}%
                            </span>
                        </div>
                    </div>
                    <div className="pt-3 border-t border-slate-100 flex justify-between items-center min-w-0">
                        <span className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-wider truncate mr-1">Variação Diária</span>
                        <span className={`text-[10px] sm:text-xs font-black tabular px-2 py-0.5 rounded-lg flex-shrink-0 ${stats.variacaoDiaR$ >= 0 ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}`}>
                            {stats.variacaoDiaR$ >= 0 ? '+' : ''}{formatBRL(stats.variacaoDiaR$)} ({stats.variacaoDiaR$ >= 0 ? '+' : ''}{stats.varDiaPct.toFixed(2)}%)
                        </span>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginError, setLoginError] = useState("");
            
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [isRegistering, setIsRegistering] = useState(false);

            const [activeTab, setActiveTab] = useState('dashboard');
            const [investments, setInvestments] = useState({ 
                acoes: [], realEstate: [], caixa: [], alternativos: [],
                caixaTicker: [], altFunds: [], altStocks: [], altCrypto: [], dividendos: [],
                historico: [], movimentacoes: [], saldoDisponivel: 0
            });
            
            const [syncStatus, setSyncStatus] = useState("");
            const [globalSyncing, setGlobalSyncing] = useState(false);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            
            const [marketTopGainers, setMarketTopGainers] = useState([]);
            const [marketTopLosers, setMarketTopLosers] = useState([]);
            const [marketSort, setMarketSort] = useState({ key: 'patrimonio', dir: 'desc' });
            const [sectionSort, setSectionSort] = useState({ key: 'patrimonio', dir: 'desc' });

            const fileInputRef = useRef(null);

            // Modais Premium
            const [editModal, setEditModal] = useState({ isOpen: false, cat: '', type: '', item: null, ticker: '', nome: '', quantidade: '', precoMedio: '', precoAtual: '', valorAplicado: '', valorAtual: '', metaRs: '' });
            const [saldoModal, setSaldoModal] = useState({ isOpen: false, type: 'WITHDRAW', valor: '', data: new Date().toLocaleDateString('pt-BR'), descricao: '' });
            const [newAssetModal, setNewAssetModal] = useState({ isOpen: false, cat: '', type: '' });
            const [tradeModal, setTradeModal] = useState({ isOpen: false, cat: '', item: null, type: '', operation: '' });
            const [proventoModal, setProventoModal] = useState({ isOpen: false, ativo: '' });
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });
            const [alertDialog, setAlertDialog] = useState({ isOpen: false, message: '' });

            const showAlert = (message) => setAlertDialog({ isOpen: true, message });

            useEffect(() => {
                const setupAuth = () => {
                    const { auth, onAuthStateChanged, db, doc, onSnapshot, setDoc } = window.firebaseAPI;
                    const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser);
                        setAuthLoading(false);
                        if (currentUser) {
                            onSnapshot(doc(db, 'users', currentUser.uid), (snap) => {
                                if (snap.exists()) setInvestments(prevState => ({...prevState, ...snap.data()}));
                                else {
                                    const initialData = { acoes: [], realEstate: [], caixa: [], alternativos: [], caixaTicker: [], altFunds: [], altStocks: [], altCrypto: [], dividendos: [], historico: [], movimentacoes: [], saldoDisponivel: 0 };
                                    setDoc(doc(db, 'users', currentUser.uid), initialData);
                                    setInvestments(initialData);
                                }
                            });
                        }
                    });
                    window.authUnsubscribe = unsubscribe;
                };

                if (window.firebaseAPI) setupAuth();
                else {
                    const handleFirebaseLoaded = () => setupAuth();
                    window.addEventListener('firebase-loaded', handleFirebaseLoaded);
                    return () => window.removeEventListener('firebase-loaded', handleFirebaseLoaded);
                }
                return () => { if (window.authUnsubscribe) window.authUnsubscribe(); };
            }, []);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => { if (activeTab === 'mercado') fetchMarketMovers(); }, [activeTab]);

            const handleEmailAuth = async (e) => {
                e.preventDefault();
                setLoginError("");
                if (!email || !password) { setLoginError("Por favor, preencha o email e a senha."); return; }
                const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.firebaseAPI;
                try {
                    if (isRegistering) await createUserWithEmailAndPassword(auth, email, password);
                    else await signInWithEmailAndPassword(auth, email, password);
                } catch (error) {
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') setLoginError("Credenciais inválidas.");
                    else if (error.code === 'auth/email-already-in-use') setLoginError("Email já registado. Faça login.");
                    else if (error.code === 'auth/weak-password') setLoginError("Senha muito fraca.");
                    else setLoginError("Erro: " + error.message);
                }
            };

            const handleLogout = async () => { try { await window.firebaseAPI.signOut(window.firebaseAPI.auth); } catch (error) { console.error(error); } };

            const save = async (newData) => {
                if (!user) return;
                await window.firebaseAPI.setDoc(window.firebaseAPI.doc(window.firebaseAPI.db, 'users', user.uid), newData);
            };

            const exportBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(investments));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", `icaroinvest-backup-${new Date().toISOString().slice(0,10)}.json`);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click(); downloadAnchorNode.remove();
                setSyncStatus("Backup exportado!"); setTimeout(() => setSyncStatus(""), 3000);
            };

            const handleImportBackup = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed && typeof parsed === 'object') {
                            const next = { ...investments, ...parsed };
                            setInvestments(next); await save(next);
                            setSyncStatus("Dados restaurados!"); setTimeout(() => setSyncStatus(""), 3000);
                        }
                    } catch (err) { showAlert("Erro ao ler backup."); }
                };
                reader.readAsText(file);
                if (fileInputRef.current) fileInputRef.current.value = "";
            };

            const handleMigrateOldData = async () => {
                setConfirmDialog({
                    isOpen: true,
                    message: "Puxar os dados de 'portfolio_principal' para a sua conta atual?",
                    onConfirm: async () => {
                        setConfirmDialog({ isOpen: false });
                        if (!user) return;
                        try {
                            setSyncStatus("A importar...");
                            const { db, doc, getDoc, setDoc } = window.firebaseAPI;
                            const oldDocRef = doc(db, 'investments', 'portfolio_principal');
                            const oldDocSnap = await getDoc(oldDocRef);
                            if (oldDocSnap.exists()) {
                                const next = { ...investments, ...oldDocSnap.data() }; 
                                setInvestments(next); await save(next);
                                setSyncStatus("Migração concluída!");
                            } else { showAlert("Dados antigos não encontrados."); setSyncStatus(""); }
                        } catch (error) { showAlert("Erro ao migrar: " + error.message); setSyncStatus(""); }
                        setTimeout(() => setSyncStatus(""), 3000);
                    }
                });
            };

            const renderCustomizedLabel = ({ cx, cy, midAngle, innerRadius, outerRadius, percent, index, name, value }) => {
                const connectorLength = isMobile ? 12 : 24;
                const RADIAN = Math.PI / 180;
                const sin = Math.sin(-RADIAN * midAngle);
                const cos = Math.cos(-RADIAN * midAngle);
                const sx = cx + (outerRadius + 4) * cos;
                const sy = cy + (outerRadius + 4) * sin;
                const mx = cx + (outerRadius + (connectorLength - 6)) * cos;
                const my = cy + (outerRadius + (connectorLength - 6)) * sin;
                const ex = mx + (cos >= 0 ? 1 : -1) * connectorLength;
                const ey = my;
                const textAnchor = cos >= 0 ? 'start' : 'end';
                const tx = ex + (cos >= 0 ? 6 : -6);
                const ty = ey;

                return (
                    <g>
                        <path d={`M${sx},${sy}L${mx},${my}L${ex},${ey}`} stroke={COLORS[index % COLORS.length]} fill="none" strokeWidth={1.5} opacity={0.65} />
                        <circle cx={ex} cy={ey} r={isMobile ? 2 : 3} fill={COLORS[index % COLORS.length]} />
                        <text x={tx} y={ty - (isMobile ? 4 : 6)} fill="#133054" textAnchor={textAnchor} dominantBaseline="central" style={{ fontSize: isMobile ? '8px' : '10px', fontWeight: 900, fontFamily: 'Inter', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                            {name}
                        </text>
                        <text x={tx} y={ty + (isMobile ? 5 : 8)} fill="#64748b" textAnchor={textAnchor} dominantBaseline="central" style={{ fontSize: isMobile ? '8px' : '9.5px', fontWeight: 700, fontFamily: 'Inter' }}>
                            {isMobile ? `${(percent * 100).toFixed(0)}%` : `${formatBRL(value)} (${(percent * 100).toFixed(1)}%)`}
                        </text>
                    </g>
                );
            };

            const fetchMarketMovers = async () => {
                try {
                    setSyncStatus("Atualizando mercado...");
                    const filterMainStocks = (stocks) => stocks.filter(s => s.volume > 50000 && !EXCLUDED_TICKERS.some(ex => s.stock.toUpperCase().includes(ex)));
                    const res = await fetch(`https://brapi.dev/api/quote/list?sortBy=change&sortOrder=desc&limit=50&token=${BRAPI_TOKEN}`);
                    const data = await res.json();
                    if (data.stocks) setMarketTopGainers(filterMainStocks(data.stocks).slice(0, 10));
                    const resL = await fetch(`https://brapi.dev/api/quote/list?sortBy=change&sortOrder=asc&limit=50&token=${BRAPI_TOKEN}`);
                    const dataL = await resL.json();
                    if (dataL.stocks) setMarketTopLosers(filterMainStocks(dataL.stocks).slice(0, 10));
                    setSyncStatus("");
                } catch (e) { console.error(e); setSyncStatus("Erro de conexão B3."); }
            };

            const registrarMovimentacao = (data, ativo, tipo, qtd, valorUnit) => ({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                data: data || new Date().toLocaleDateString('pt-BR'), ativo: ativo.toUpperCase(), tipo,
                quantidade: parseValue(qtd), valorUnitario: parseValue(valorUnit), valorTotal: parseValue(qtd) * parseValue(valorUnit)
            });

            const getSectionStats = (list, type = 'ticker') => {
                let investido = 0; let atual = 0; let variacaoDiaR$ = 0;
                const filteredList = (list || []).filter(item => !EXCLUDED_TICKERS.includes((item.ticker || "").toUpperCase()));
                if (type === 'ticker') {
                    investido = filteredList.reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoMedio)), 0);
                    atual = filteredList.reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoAtual)), 0);
                    filteredList.forEach(i => {
                        const qty = parseValue(i.quantidade); const cur = parseValue(i.precoAtual); const varPct = parseValue(i.variacaoDia);
                        if (varPct !== 0) { const prevPrice = cur / (1 + (varPct / 100)); variacaoDiaR$ += (cur - prevPrice) * qty; }
                    });
                } else {
                    investido = filteredList.reduce((acc, i) => acc + parseValue(i.valorAplicado), 0);
                    atual = filteredList.reduce((acc, i) => acc + parseValue(i.valorAtual), 0);
                }
                const lucro = atual - investido;
                const lucroPct = investido > 0 ? (lucro / investido) * 100 : 0;
                const varDiaPct = atual > 0 ? (variacaoDiaR$ / (atual - variacaoDiaR$)) * 100 : 0;
                return { investido, atual, lucro, lucroPct, variacaoDiaR$, varDiaPct };
            };

            const totals = useMemo(() => {
                const sAcoes = getSectionStats(investments.acoes, 'ticker');
                const sRE = getSectionStats(investments.realEstate, 'ticker');
                const sCaixaM = getSectionStats(investments.caixa, 'manual');
                const sCaixaT = getSectionStats(investments.caixaTicker, 'ticker');
                const sAltF = getSectionStats(investments.altFunds, 'manual');
                const sAltS = getSectionStats(investments.altStocks, 'ticker');
                const sAltC = getSectionStats(investments.altCrypto, 'ticker');
                const divsPagos = (investments.dividendos || []).filter(d => (d.status === 'pago' || !d.status) && !EXCLUDED_TICKERS.includes(d.ativo.toUpperCase())).reduce((acc, b) => acc + parseValue(b.valor || 0), 0);
                const divsPendentes = (investments.dividendos || []).filter(d => d.status === 'pendente' && !EXCLUDED_TICKERS.includes(d.ativo.toUpperCase())).reduce((acc, b) => acc + parseValue(b.valor || 0), 0);
                const saldo = parseValue(investments.saldoDisponivel);
                
                const caixa = { investido: sCaixaM.investido + sCaixaT.investido, atual: sCaixaM.atual + sCaixaT.atual + saldo, lucro: sCaixaM.lucro + sCaixaT.lucro, variacaoDiaR$: sCaixaT.variacaoDiaR$ };
                caixa.lucroPct = caixa.investido > 0 ? (caixa.lucro / caixa.investido) * 100 : 0;
                const prevCaixaActual = (caixa.atual - saldo) - caixa.variacaoDiaR$;
                caixa.varDiaPct = prevCaixaActual !== 0 ? (caixa.variacaoDiaR$ / prevCaixaActual) * 100 : 0;
                
                const alt = { investido: sAltF.investido + sAltS.investido + sAltC.investido, atual: sAltF.atual + sAltS.atual + sAltC.atual, lucro: sAltF.lucro + sAltS.lucro + sAltC.lucro, variacaoDiaR$: sAltS.variacaoDiaR$ + sAltC.variacaoDiaR$ };
                alt.lucroPct = alt.investido > 0 ? (alt.lucro / alt.investido) * 100 : 0;
                const prevAltActual = alt.atual - alt.variacaoDiaR$;
                alt.varDiaPct = prevAltActual !== 0 ? (alt.variacaoDiaR$ / prevAltActual) * 100 : 0;
                
                const totalAtu = sAcoes.atual + sRE.atual + caixa.atual + alt.atual;
                const varDiaTotal = sAcoes.variacaoDiaR$ + sRE.variacaoDiaR$ + caixa.variacaoDiaR$ + alt.variacaoDiaR$ ;
                const prevTotal = totalAtu - varDiaTotal;
                const varDiaTotalPct = prevTotal !== 0 ? (varDiaTotal / prevTotal) * 100 : 0;
                
                return { acoes: sAcoes, re: sRE, caixa, alt, divsPagos, divsPendentes, total: totalAtu, varDiaTotal, varDiaTotalPct, saldo };
            }, [investments]);

            const marketPortfolioList = useMemo(() => {
                const combined = [...(investments.acoes || []), ...(investments.realEstate || []), ...(investments.caixaTicker || []), ...(investments.altStocks || []), ...(investments.altCrypto || [])].filter(item => !EXCLUDED_TICKERS.includes((item.ticker || "").toUpperCase()));
                const list = combined.map(item => {
                    const q = parseValue(item.quantidade); const cur = parseValue(item.precoAtual); const varPct = parseValue(item.variacaoDia);
                    const pat = q * cur; const custo = q * parseValue(item.precoMedio);
                    let varR = 0; if (varPct !== 0) { const prevP = cur / (1 + (varPct / 100)); varR = (cur - prevP) * q; }
                    return { ativo: item.ticker, qtd: q, custo: custo, atual: cur, varDia: varPct, varDiaR$: varR, patrimonio: pat, lucro: pat - custo };
                });
                return list.sort((a, b) => { const valA = a[marketSort.key]; const valB = b[marketSort.key]; return marketSort.dir === 'desc' ? valB - valA : valA - valB; });
            }, [investments, marketSort]);

            const handleMarketSort = (key) => setMarketSort(prev => ({ key, dir: prev.key === key && prev.dir === 'desc' ? 'asc' : 'desc' }));
            const handleSectionSort = (key) => setSectionSort(prev => ({ key, dir: prev.key === key && prev.dir === 'desc' ? 'asc' : 'desc' }));

            const syncGlobalPortfolio = async () => {
                const categories = [ { name: 'acoes', isCrypto: false }, { name: 'realEstate', isCrypto: false }, { name: 'caixaTicker', isCrypto: false }, { name: 'altStocks', isCrypto: false } ];
                setGlobalSyncing(true); setSyncStatus("Sincronização Total B3...");
                let updatedInvestments = { ...investments };
                for (const catObj of categories) {
                    const list = [...(updatedInvestments[catObj.name] || [])];
                    if (list.length === 0) continue;
                    for (let i = 0; i < list.length; i++) {
                        const t = list[i].ticker;
                        setSyncStatus(`A atualizar ${t}...`);
                        try {
                            let url = `https://brapi.dev/api/quote/${t}?token=${BRAPI_TOKEN}`;
                            const isCryptoAsset = catObj.isCrypto || t === 'BTC' || t === 'ETH' || t.includes('BTC') || t.includes('ETH');
                            if (isCryptoAsset) url = `https://brapi.dev/api/v2/crypto?coin=${t}&currency=BRL&token=${BRAPI_TOKEN}`;
                            const res = await fetch(url); const d = await res.json();
                            if (isCryptoAsset && d.coins?.[0]) { list[i].precoAtual = d.coins[0].regularMarketPrice; list[i].variacaoDia = d.coins[0].regularMarketChangePercent; } 
                            else if (d.results?.[0]) { list[i].precoAtual = d.results[0].regularMarketPrice; list[i].variacaoDia = d.results[0].regularMarketChangePercent; }
                            await new Promise(r => setTimeout(r, 400));
                        } catch (e) {}
                    }
                    updatedInvestments[catObj.name] = list;
                }
                setInvestments(updatedInvestments); await save(updatedInvestments);
                setGlobalSyncing(false); setSyncStatus("Carteira Sincronizada!"); setTimeout(() => setSyncStatus(""), 3000);
            };

            const handleCreateAsset = (data) => {
                const { cat, type } = newAssetModal;
                let next = { ...investments };
                if (type === 'ticker') {
                    const tickerUpper = data.ticker.toUpperCase();
                    if(!tickerUpper || !data.quantidade || !data.precoMedio) { showAlert("Preencha todos os campos obrigatórios."); return; }
                    if (EXCLUDED_TICKERS.includes(tickerUpper)) { showAlert("Ativo excluído."); return; }
                    const q = parseValue(data.quantidade); const p = parseValue(data.precoMedio);
                    const newItem = { id: Date.now().toString(), ticker: tickerUpper, quantity: q, quantidade: q, precoMedio: p, precoAtual: p, metaRs: 0 };
                    next[cat] = [...(next[cat]||[]), newItem];
                    next.movimentacoes = [registrarMovimentacao(null, tickerUpper, 'Compra', q, p), ...(next.movimentacoes || [])];
                    next.saldoDisponivel = parseValue(next.saldoDisponivel) - (q * p);
                } else {
                    if(!data.nome || !data.valorAplicado) { showAlert("Preencha o Nome e o Valor."); return; }
                    const va = parseValue(data.valorAplicado); const vt = parseValue(data.valorAtual || data.valorAplicado);
                    const newItem = { id: Date.now().toString(), nome: data.nome, valorAplicado: va, valorAtual: vt, metaRs: 0 };
                    next[cat] = [...(next[cat]||[]), newItem];
                    next.movimentacoes = [registrarMovimentacao(null, data.nome, 'Compra', 1, va), ...(next.movimentacoes || [])];
                    next.saldoDisponivel = parseValue(next.saldoDisponivel) - va;
                }
                setInvestments(next); save(next); setNewAssetModal({ isOpen: false, cat: '', type: '' });
            };

            const handleExecuteTrade = (data) => {
                const { cat, item, type, operation } = tradeModal;
                const isBuy = operation === 'BUY'; const label = isBuy ? 'Compra' : 'Venda';
                let next = { ...investments }; const list = [...(next[cat] || [])]; const idx = list.findIndex(i => i.id === item.id);
                if (idx === -1) return;
                if (type === 'ticker') {
                    const qty = parseValue(data.quantidade); const price = parseValue(data.preco);
                    if(qty <= 0 || price <= 0) { showAlert("Valores inválidos."); return; }
                    const totalOp = qty * price;
                    if (!isBuy && qty > item.quantidade) { showAlert("Quantidade insuficiente para venda."); return; }
                    if (isBuy) {
                        const currentTotal = list[idx].quantidade * list[idx].precoMedio;
                        const newQty = list[idx].quantidade + qty;
                        list[idx].precoMedio = (currentTotal + totalOp) / newQty; list[idx].quantidade = newQty; next.saldoDisponivel -= totalOp;
                    } else {
                        list[idx].quantidade -= qty; next.saldoDisponivel += totalOp;
                        if (list[idx].quantidade <= 0) list.splice(idx, 1);
                    }
                    next.movimentacoes = [registrarMovimentacao(null, item.ticker, label, qty, price), ...(next.movimentacoes || [])];
                } else {
                    const val = parseValue(data.valor);
                    if(val <= 0) { showAlert("Valor inválido."); return; }
                    if (!isBuy && val > item.valorAtual) { showAlert("Saldo insuficiente para resgate."); return; }
                    if (isBuy) { list[idx].valorAtual += val; list[idx].valorAplicado += val; next.saldoDisponivel -= val; } 
                    else { list[idx].valorAtual -= val; next.saldoDisponivel += val; if (list[idx].valorAtual <= 0) list.splice(idx, 1); }
                    next.movimentacoes = [registrarMovimentacao(null, item.nome, isBuy ? 'Aporte' : 'Resgate', 1, val), ...(next.movimentacoes || [])];
                }
                next[cat] = list; setInvestments(next); save(next); setTradeModal({ isOpen: false, cat: '', item: null, type: '', operation: '' });
            };

            const handleSaveProvento = (data) => {
                const valor = parseValue(data.valor);

                const isPaid = data.isPaid; const dataStr = data.dataStr || new Date().toLocaleDateString('pt-BR');
                let next = { ...investments };
                const newDiv = { id: Date.now().toString(), data: dataStr, ativo: proventoModal.ativo.toUpperCase(), tipo: "Dividendo", valor, status: isPaid ? 'pago' : 'pendente' };
                next.dividendos = [...(next.dividendos || []), newDiv];
                if (isPaid) {
                    next.movimentacoes = [registrarMovimentacao(dataStr, proventoModal.ativo, "Provento", 1, valor), ...(next.movimentacoes || [])];

                }
                setInvestments(next); save(next); setProventoModal({ isOpen: false, ativo: '' });
            };

            const handleSaveEdit = () => {
                const { cat, type, item } = editModal; if (!item) return;
                let next = { ...investments }; const list = [...(next[cat] || [])]; const idx = list.findIndex(i => i.id === item.id);
