<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Controle Patrimonial Privado</title>
    
    <!-- Bibliotecas de UI e Gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat v10) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; overflow-x: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { PieChart, Pie, Cell, Legend, ResponsiveContainer, Tooltip } = window.Recharts;

        const ALPHA_VANTAGE_KEY = "H24XAW2D59R2902Y";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            messagingSenderId: "45341061429",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c",
            measurementId: "G-Z8FZGVKK8W"
        };

        const INITIAL_DATA = { acoes: [], realEstate: [], caixa: [], alternativos: [] };
        const COLORS = ['#0f172a', '#2563eb', '#059669', '#7c3aed', '#db2777', '#0891b2'];

        const B3_NAMES = {
            "PETR4": "Petrobras PN", "VALE3": "Vale S.A.", "ITUB4": "Itaú Unibanco", 
            "BBAS3": "Banco do Brasil", "ITSAS4": "Itaúsa PN", "LJQQ3": "Lojas Quero-Quero",
            "WEGE3": "WEG S.A.", "MGLU3": "Magalu", "KNRI11": "FII Kinea", "HGLG11": "FII Logística"
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 ${className}`}>
                {children}
            </div>
        );

        const StatCard = ({ title, value, iconName, colorClass }) => (
            <Card className="flex items-center gap-4 hover:shadow-lg transition-all duration-300">
                <div className={`p-4 rounded-2xl ${colorClass} text-white shadow-xl flex items-center justify-center`}>
                    <i data-lucide={iconName} className="w-6 h-6"></i>
                </div>
                <div className="overflow-hidden">
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{title}</p>
                    <p className="text-xl font-black text-slate-900 truncate">{value}</p>
                </div>
            </Card>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [investments, setInvestments] = useState(INITIAL_DATA);
            const [syncing, setSyncing] = useState(false);
            const [statusMsg, setStatusMsg] = useState(null);
            const [newAcao, setNewAcao] = useState({ ticker: '', quantidade: '', precoCompra: '' });
            
            const dbRef = useRef(null);

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        if (!window.firebase.apps.length) {
                            window.firebase.initializeApp(firebaseConfig);
                        }
                        const db = window.firebase.firestore();
                        dbRef.current = db.collection("investments").doc("portfolio_principal");

                        dbRef.current.onSnapshot((doc) => {
                            if (doc.exists) {
                                setInvestments(doc.data());
                            } else {
                                dbRef.current.set(INITIAL_DATA);
                            }
                            setLoading(false);
                            setTimeout(() => lucide.createIcons(), 100);
                        });
                    } catch (e) {
                        setLoading(false);
                    }
                };
                initFirebase();
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab, loading, investments, syncing]);

            const updateData = async (newData) => {
                setInvestments(newData);
                if (dbRef.current) {
                    try { await dbRef.current.set(newData); } catch (e) { console.error(e); }
                }
            };

            const syncAlphaVantage = async () => {
                if (investments.acoes.length === 0) return;
                setSyncing(true);
                setStatusMsg("Iniciando consulta Alpha Vantage...");
                
                const updatedAcoes = [...investments.acoes];
                
                for (let i = 0; i < updatedAcoes.length; i++) {
                    const acao = updatedAcoes[i];
                    // Alpha Vantage exige .SA para B3
                    const symbol = acao.ticker.includes('.') ? acao.ticker : `${acao.ticker}.SA`;
                    
                    setStatusMsg(`Consultando ${acao.ticker}...`);
                    
                    try {
                        const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${ALPHA_VANTAGE_KEY}`;
                        const response = await fetch(url);
                        const data = await response.json();
                        
                        // Verificação de limite de taxa (API gratuita = 5 chamadas por min)
                        if (data["Note"] || data["Information"]) {
                            setStatusMsg("Limite de API atingido. Aguarde 1 minuto.");
                            break; 
                        }

                        const quote = data["Global Quote"];
                        if (quote && quote["05. price"]) {
                            updatedAcoes[i] = {
                                ...acao,
                                precoAtual: parseFloat(quote["05. price"])
                            };
                        }
                    } catch (err) {
                        console.error("Erro na API:", err);
                    }

                    // Delay pequeno para respeitar limites de taxa se tiver muitos ativos
                    if (updatedAcoes.length > 2) await new Promise(r => setTimeout(r, 1000));
                }

                await updateData({ ...investments, acoes: updatedAcoes });
                setSyncing(false);
                setStatusMsg("Sincronização concluída!");
                setTimeout(() => setStatusMsg(null), 3000);
            };

            const editAcao = (id) => {
                const acao = investments.acoes.find(a => a.id === id);
                const novaQtd = window.prompt("Nova Quantidade:", acao.quantidade);
                const novoMedio = window.prompt("Novo Valor de Compra Médio (R$):", acao.precoMedio);
                const novoAtual = window.prompt("Nova Cotação Atual (R$):", acao.precoAtual);
                
                if (novaQtd !== null && novoMedio !== null && novoAtual !== null) {
                    const updated = investments.acoes.map(a => 
                        a.id === id ? { 
                            ...a, 
                            quantidade: Number(novaQtd), 
                            precoMedio: Number(novoMedio), 
                            precoAtual: Number(novoAtual) 
                        } : a
                    );
                    updateData({ ...investments, acoes: updated });
                }
            };

            const editPrecoRapido = (id) => {
                const acao = investments.acoes.find(a => a.id === id);
                const novoPreco = window.prompt(`Atualizar cotação de ${acao.ticker}:`, acao.precoAtual);
                if (novoPreco !== null && novoPreco !== "") {
                    const updated = investments.acoes.map(a => 
                        a.id === id ? { ...a, precoAtual: Number(novoPreco) } : a
                    );
                    updateData({ ...investments, acoes: updated });
                }
            };

            const totals = useMemo(() => {
                const getSum = (arr, key) => (arr || []).reduce((a, b) => a + Number(b[key] || 0), 0);
                const acoesSum = (investments.acoes || []).reduce((a, b) => a + (Number(b.quantidade) * Number(b.precoAtual || 0)), 0);
                const reSum = getSum(investments.realEstate, 'valor');
                const caixaSum = getSum(investments.caixa, 'valor');
                const altSum = getSum(investments.alternativos, 'valor');
                const total = acoesSum + reSum + caixaSum + altSum;
                return { acoes: acoesSum, realEstate: reSum, caixa: caixaSum, alternativos: altSum, total };
            }, [investments]);

            const allocationData = [
                { name: 'Ações', value: totals.acoes },
                { name: 'Real Estate', value: totals.realEstate },
                { name: 'Caixa', value: totals.caixa },
                { name: 'Alternativos', value: totals.alternativos },
            ].filter(i => i.value > 0);

            const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-slate-400 font-black uppercase tracking-widest text-[10px]">Acessando Cloud...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    <header className="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-12">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-3xl text-white shadow-2xl shadow-slate-200">
                                <i data-lucide="shield-check" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tight">Icaro<span className="text-blue-600">Invest</span></h1>
                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">Alpha Vantage Integrada</p>
                            </div>
                        </div>

                        <nav className="bg-white p-2 rounded-3xl shadow-sm border border-slate-200 flex overflow-x-auto gap-1 custom-scroll">
                            {[
                                { id: 'dashboard', label: 'Resumo', icon: 'layout-dashboard' },
                                { id: 'acoes', label: 'Ações', icon: 'briefcase' },
                                { id: 'realEstate', label: 'Real Estate', icon: 'home' },
                                { id: 'caixa', label: 'Caixa', icon: 'landmark' },
                                { id: 'alternativos', label: 'Alternativos', icon: 'coins' },
                            ].map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-2 px-6 py-4 rounded-2xl text-[10px] font-black transition-all uppercase tracking-widest whitespace-nowrap ${
                                        activeTab === tab.id ? 'bg-slate-900 text-white shadow-xl' : 'text-slate-400 hover:bg-slate-50'
                                    }`}
                                >
                                    <i data-lucide={tab.icon} className="w-4 h-4"></i> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {statusMsg && (
                        <div className="mb-6 bg-slate-900 text-white p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest animate-in flex items-center gap-3">
                            <div className="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
                            {statusMsg}
                        </div>
                    )}

                    <main className="space-y-6">
                        { activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                                    <StatCard title="Patrimônio Total" value={formatBRL(totals.total)} iconName="trending-up" colorClass="bg-slate-900" />
                                    <StatCard title="Ações" value={formatBRL(totals.acoes)} iconName="briefcase" colorClass="bg-blue-600" />
                                    <StatCard title="Real Estate" value={formatBRL(totals.realEstate)} iconName="emerald-600" colorClass="bg-emerald-600" />
                                    <StatCard title="Caixa" value={formatBRL(totals.caixa)} iconName="landmark" colorClass="bg-purple-600" />
                                    <StatCard title="Alternativos" value={formatBRL(totals.alternativos)} iconName="coins" colorClass="bg-rose-500" />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <Card>
                                        <h3 className="text-sm font-black uppercase text-slate-800 mb-8 tracking-widest text-center">Alocação de Ativos</h3>
                                        <div className="h-72">
                                            {allocationData.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie data={allocationData} innerRadius={60} outerRadius={90} paddingAngle={8} dataKey="value" cornerRadius={8}>
                                                            {allocationData.map((e, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                                        </Pie>
                                                        <Tooltip formatter={(v) => formatBRL(v)} />
                                                        <Legend />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : (
                                                <div className="h-full flex items-center justify-center text-slate-300 italic text-sm font-black uppercase tracking-widest">Sem ativos registrados</div>
                                            )}
                                        </div>
                                    </Card>

                                    <Card>
                                        <h3 className="text-sm font-black uppercase text-slate-800 mb-8 tracking-widest">Resumo Consolidado</h3>
                                        <div className="space-y-3">
                                            {allocationData.map((item, idx) => (
                                                <div key={item.name} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 group">
                                                    <div className="flex items-center gap-3 font-bold text-sm text-slate-700">
                                                        <div className="w-3 h-3 rounded-full" style={{ backgroundColor: COLORS[idx % COLORS.length] }}></div>
                                                        <span>{item.name}</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="font-black text-slate-900">{formatBRL(item.value)}</div>
                                                        <div className="text-[10px] text-slate-400 font-black tracking-widest">{((item.value / (totals.total || 1)) * 100).toFixed(1)}%</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}

                        { activeTab === 'acoes' && (
                            <Card className="animate-in">
                                <div className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div>
                                        <h3 className="text-2xl font-black uppercase tracking-tight">Carteira de Ações</h3>
                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Sincronização via Alpha Vantage (Chave: H24X...)</p>
                                    </div>
                                    <button 
                                        onClick={syncAlphaVantage}
                                        disabled={syncing}
                                        className={`flex items-center gap-3 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-xl ${
                                            syncing ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-emerald-600 text-white hover:bg-emerald-500'
                                        }`}
                                    >
                                        <i data-lucide="refresh-cw" className={`w-4 h-4 ${syncing ? 'animate-spin' : ''}`}></i>
                                        {syncing ? 'Sincronizando...' : 'Sincronizar B3'}
                                    </button>
                                </div>

                                <form 
                                    onSubmit={(e) => {
                                        e.preventDefault();
                                        if (!newAcao.ticker || !newAcao.quantidade || !newAcao.precoCompra) return;
                                        const ticker = newAcao.ticker.toUpperCase();
                                        const item = {
                                            id: Date.now(),
                                            ticker,
                                            nome: B3_NAMES[ticker] || "Ativo B3",
                                            quantidade: Number(newAcao.quantidade),
                                            precoMedio: Number(newAcao.precoCompra),
                                            precoAtual: Number(newAcao.precoCompra)
                                        };
                                        updateData({ ...investments, acoes: [...investments.acoes, item] });
                                        setNewAcao({ ticker: '', quantidade: '', precoCompra: '' });
                                    }}
                                    className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10 p-8 bg-slate-900 rounded-[2.5rem]"
                                >
                                    <input type="text" placeholder="Ticker" list="tickers-list" value={newAcao.ticker} onChange={e => setNewAcao({...newAcao, ticker: e.target.value})} className="p-4 bg-slate-800 text-white rounded-xl outline-none font-bold placeholder:text-slate-600 text-sm" />
                                    <datalist id="tickers-list">{Object.keys(B3_NAMES).map(t => <option key={t} value={t}>{B3_NAMES[t]}</option>)}</datalist>
                                    <input type="number" placeholder="Quantidade" value={newAcao.quantidade} onChange={e => setNewAcao({...newAcao, quantidade: e.target.value})} className="p-4 bg-slate-800 text-white rounded-xl outline-none font-bold placeholder:text-slate-600 text-sm" />
                                    <input type="number" step="0.01" placeholder="Vlr Médio" value={newAcao.precoCompra} onChange={e => setNewAcao({...newAcao, precoCompra: e.target.value})} className="p-4 bg-slate-800 text-white rounded-xl outline-none font-bold placeholder:text-slate-600 text-sm" />
                                    <button type="submit" className="bg-blue-600 text-white rounded-xl font-black uppercase text-xs tracking-widest hover:bg-blue-500 transition-colors">ADICIONAR</button>
                                </form>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-left min-w-[800px]">
                                        <thead>
                                            <tr className="border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">
                                                <th className="pb-6">Ativo</th>
                                                <th className="pb-6 text-center">Qtd</th>
                                                <th className="pb-6">Preço Médio</th>
                                                <th className="pb-6">Preço Atual</th>
                                                <th className="pb-6">Total Patrimônio</th>
                                                <th className="pb-6">Lucro R$ / %</th>
                                                <th className="pb-6 text-right">Opções</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {investments.acoes.map(a => {
                                                const totalCompra = a.quantidade * a.precoMedio;
                                                const totalAtual = a.quantidade * a.precoAtual;
                                                const lucroReal = totalAtual - totalCompra;
                                                const lucroPct = ((a.precoAtual - a.precoMedio) / (a.precoMedio || 1)) * 100;
                                                return (
                                                    <tr key={a.id} className="border-b border-slate-50 hover:bg-slate-50 transition-all group">
                                                        <td className="py-5">
                                                            <div className="font-black text-slate-900 leading-tight">{a.ticker}</div>
                                                            <div className="text-[10px] text-slate-400 font-bold uppercase leading-none">{a.nome}</div>
                                                        </td>
                                                        <td className="py-5 text-center font-bold text-slate-600">{a.quantidade}</td>
                                                        <td className="py-5 text-sm font-medium text-slate-500">{formatBRL(a.precoMedio)}</td>
                                                        <td className="py-5">
                                                            <button 
                                                                onClick={() => editPrecoRapido(a.id)} 
                                                                className="flex items-center gap-1 font-black text-blue-600 text-sm hover:underline bg-blue-50 px-3 py-2 rounded-xl"
                                                            >
                                                                {formatBRL(a.precoAtual)}
                                                                <i data-lucide="edit-2" className="w-3 h-3"></i>
                                                            </button>
                                                        </td>
                                                        <td className="py-5 font-black text-slate-900">{formatBRL(totalAtual)}</td>
                                                        <td className={`py-5 font-black text-sm ${lucroReal >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                            <div>{formatBRL(lucroReal)}</div>
                                                            <div className="text-[10px] uppercase opacity-70">({lucroPct >= 0 ? '+' : ''}{lucroPct.toFixed(2)}%)</div>
                                                        </td>
                                                        <td className="py-5 text-right">
                                                            <div className="flex justify-end gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => editAcao(a.id)} className="text-slate-400 hover:text-slate-900"><i data-lucide="edit-3" className="w-5 h-5"></i></button>
                                                                <button onClick={() => updateData({ ...investments, acoes: investments.acoes.filter(x => x.id !== a.id) })} className="text-slate-400 hover:text-rose-600"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        )}

                        { (['realEstate', 'caixa', 'alternativos'].includes(activeTab)) && (
                            <Card className="animate-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black uppercase tracking-tight">
                                        {activeTab === 'realEstate' ? 'Real Estate' : 
                                         activeTab === 'caixa' ? 'Caixa' : 'Alternativos'}
                                    </h3>
                                    <button 
                                        onClick={() => {
                                            const nome = window.prompt("Nome do Ativo:");
                                            const valor = window.prompt("Valor Total (R$):");
                                            if (nome && valor) {
                                                const item = { id: Date.now(), nome, valor: Number(valor) };
                                                updateData({ ...investments, [activeTab]: [...(investments[activeTab] || []), item] });
                                            }
                                        }}
                                        className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] tracking-widest hover:bg-black transition-all shadow-xl"
                                    >
                                        NOVO LANÇAMENTO
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {(investments[activeTab] || []).map(item => (
                                        <div key={item.id} className="flex justify-between items-center p-6 bg-slate-50 rounded-[2.5rem] border border-slate-100 group hover:border-slate-300">
                                            <div className="flex flex-col">
                                                <span className="font-black text-slate-800 text-sm uppercase tracking-tight">{item.nome}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className="font-black text-slate-900 text-xl">{formatBRL(item.valor)}</span>
                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                                    <button onClick={() => {
                                                        const n = window.prompt("Novo Nome:", item.nome);
                                                        const v = window.prompt("Novo Valor:", item.valor);
                                                        if (n && v) {
                                                            const updated = investments[activeTab].map(x => x.id === item.id ? { ...x, nome: n, valor: Number(v) } : x);
                                                            updateData({ ...investments, [activeTab]: updated });
                                                        }
                                                    }} className="text-slate-400 hover:text-slate-900"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                    <button onClick={() => updateData({ ...investments, [activeTab]: investments[activeTab].filter(x => x.id !== item.id) })} className="text-slate-400 hover:text-rose-600"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        )}
                    </main>
