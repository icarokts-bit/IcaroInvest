<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Gestão Patrimonial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; padding: 0; }
        .rounded-premium { border-radius: 2rem; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .tabular { font-variant-numeric: tabular-nums; }
        .no-break { white-space: nowrap; }
        .text-huge { font-size: clamp(1rem, 3.5vw, 1.4rem); line-height: 1.1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="font-bold text-slate-400 animate-pulse uppercase tracking-widest text-xs">Sincronizando IcaroInvest...</p>
            </div>
        </div>
    </div>

    <!-- Bibliotecas -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            messagingSenderId: "45341061429",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c",
            measurementId: "G-Z8FZGVKK8W"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            window.firebaseAPI = { db, doc, setDoc, onSnapshot, auth, signInAnonymously, onAuthStateChanged };
        } catch (e) { console.error("Firebase Fail:", e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = window.Recharts;

        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const COLORS = ['#0f172a', '#2563eb', '#10b981', '#8b5cf6', '#f43f5e', '#f59e0b'];

        const parseValue = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'number') return val;
            const clean = val.toString().replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => { if (window.lucide) { setReady(true); window.lucide.createIcons(); } }, [name]);
            return ready ? <i data-lucide={name} style={{ width: size, height: size }} className={className}></i> : <div style={{ width: size, height: size }}></div>;
        };

        const StatCard = ({ title, value, icon, colorClass, isMobile }) => (
            <div className={`glass p-5 rounded-premium flex ${isMobile ? 'flex-col items-start gap-2' : 'items-center gap-4'} min-w-0 shadow-sm hover:shadow-md transition-all`}>
                <div className={`${colorClass} p-3 rounded-2xl text-white shadow-lg flex-shrink-0`}>
                    <LucideIcon name={icon} size={24} />
                </div>
                <div className="min-w-0 flex-1">
                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1 truncate">{title}</p>
                    <h3 className="text-huge font-black text-slate-900 tabular no-break">
                        {value}
                    </h3>
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [investments, setInvestments] = useState({ 
                acoes: [], 
                realEstate: [], 
                caixa: [], 
                alternativos: [],
                caixaTicker: [],
                altTicker: []
            });
            const [syncStatus, setSyncStatus] = useState("");
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (!window.firebaseAPI) return;
                const { auth, signInAnonymously, onAuthStateChanged, db, doc, onSnapshot } = window.firebaseAPI;
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(doc(db, 'investments', 'portfolio_principal'), (snap) => {
                            if (snap.exists()) setInvestments(snap.data());
                        });
                    }
                });
            }, []);

            const save = async (newData) => {
                if (!window.firebaseAPI) return;
                const { db, doc, setDoc } = window.firebaseAPI;
                await setDoc(doc(db, 'investments', 'portfolio_principal'), newData);
            };

            const totals = useMemo(() => {
                const getSumManual = (arr) => (arr || []).reduce((acc, b) => acc + parseValue(b.valorAtual || 0), 0);
                const getSumTicker = (arr) => (arr || []).reduce((acc, b) => acc + (parseValue(b.quantidade || 0) * parseValue(b.precoAtual || 0)), 0);
                
                const acoes = getSumTicker(investments.acoes);
                const re = getSumTicker(investments.realEstate);
                const caixa = getSumManual(investments.caixa) + getSumTicker(investments.caixaTicker);
                const alt = getSumManual(investments.alternativos) + getSumTicker(investments.altTicker);
                
                return { acoes, re, caixa, alt, total: acoes + re + caixa + alt };
            }, [investments]);

            const format = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const addManual = (cat) => {
                const n = prompt("Nome do Ativo:");
                const va = prompt("Valor Aplicado (R$):");
                const vt = prompt("Valor Atual Hoje (R$):");
                if (!n || va === null) return;
                const item = { id: Date.now().toString(), nome: n, valorAplicado: parseValue(va), valorAtual: parseValue(vt || va) };
                const updated = { ...investments, [cat]: [...(investments[cat] || []), item] };
                setInvestments(updated); save(updated);
            };

            const addTicker = (cat) => {
                const t = prompt("Ticker (ex: B5P211 ou BTC):");
                const q = prompt("Quantidade:");
                const p = prompt("Preço Médio de Compra:");
                if (!t || !q) return;
                const item = { id: Date.now().toString(), ticker: t.toUpperCase(), quantidade: parseValue(q), precoMedio: parseValue(p), precoAtual: parseValue(p) };
                const updated = { ...investments, [cat]: [...(investments[cat] || []), item] };
                setInvestments(updated); save(updated);
            };

            const editItem = (cat, id, type = 'manual') => {
                const list = [...(investments[cat] || [])];
                const idx = list.findIndex(i => i.id === id);
                if (idx === -1) return;
                const item = list[idx];

                if (type === 'manual') {
                    const va = prompt("Novo Valor Aplicado:", item.valorAplicado);
                    const vt = prompt("Novo Valor Atualizado:", item.valorAtual);
                    if (va !== null && vt !== null) {
                        list[idx] = { ...item, valorAplicado: parseValue(va), valorAtual: parseValue(vt) };
                    }
                } else {
                    const q = prompt("Nova Quantidade:", item.quantidade);
                    const p = prompt("Novo Preço Médio:", item.precoMedio);
                    if (q !== null && p !== null) {
                        list[idx] = { ...item, quantidade: parseValue(q), precoMedio: parseValue(p) };
                    }
                }
                const updated = { ...investments, [cat]: list };
                setInvestments(updated); save(updated);
            };

            const sync = async (cat) => {
                const list = [...(investments[cat] || [])];
                if (list.length === 0) return;
                setSyncStatus(`A sincronizar ativos...`);
                for (let i = 0; i < list.length; i++) {
                    if (!list[i].ticker) continue;
                    const t = list[i].ticker.split('.')[0].trim().toUpperCase();
                    setSyncStatus(`A atualizar ${t} (${i+1}/${list.length})...`);
                    try {
                        const res = await fetch(`https://brapi.dev/api/quote/${t}`, { headers: { 'Authorization': `Bearer ${BRAPI_TOKEN}` } });
                        const d = await res.json();
                        if (d.results?.[0]) list[i].precoAtual = d.results[0].regularMarketPrice;
                        await new Promise(r => setTimeout(r, 350));
                    } catch (e) { console.error(e); }
                }
                const updated = { ...investments, [cat]: list };
                setInvestments(updated); save(updated);
                setSyncStatus("Atualizado!"); setTimeout(() => setSyncStatus(""), 2000);
            };

            const renderManualTable = (cat, title) => (
                <div className="glass rounded-[2.5rem] overflow-hidden shadow-2xl animate-in mb-8">
                    <div className="p-8 bg-slate-50/50 border-b flex justify-between items-center">
                        <div>
                            <h2 className="font-black text-slate-800 uppercase tracking-tighter text-2xl">{title}</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Controle Manual de Saldo</p>
                        </div>
                        <button onClick={() => addManual(cat)} className="bg-slate-900 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black shadow-lg">+ Novo Lançamento</button>
                    </div>
                    <div className="overflow-x-auto custom-scroll">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                <tr>
                                    <th className="px-10 py-6">Aplicação / Ativo</th>
                                    <th className="px-10 py-6 text-right">Vlr Aplicado</th>
                                    <th className="px-10 py-6 text-right">Vlr Atualizado</th>
                                    <th className="px-10 py-6 text-right">Rendimento</th>
                                    <th className="px-10 py-6 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {(investments[cat] || []).map(item => {
                                    const lucro = (item.valorAtual || 0) - (item.valorAplicado || 0);
                                    const pct = item.valorAplicado > 0 ? (lucro / item.valorAplicado) * 100 : 0;
                                    return (
                                        <tr key={item.id} className="hover:bg-slate-50/50 tabular text-sm">
                                            <td className="px-10 py-6 font-black text-slate-900 uppercase">{item.nome}</td>
                                            <td className="px-10 py-6 text-right font-bold text-slate-500">{format(item.valorAplicado)}</td>
                                            <td className="px-10 py-6 text-right font-black text-blue-600">{format(item.valorAtual)}</td>
                                            <td className={`px-10 py-6 text-right font-black ${lucro >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                <div className="no-break">{format(lucro)}</div>
                                                <span className="block text-[10px] opacity-70">({pct.toFixed(2)}%)</span>
                                            </td>
                                            <td className="px-10 py-6 text-right">
                                                <div className="flex justify-end gap-3">
                                                    <button onClick={() => editItem(cat, item.id, 'manual')} className="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all"><LucideIcon name="Edit3" size={18} /></button>
                                                    <button onClick={() => { if(confirm("Excluir?")) { const u = {...investments, [cat]: investments[cat].filter(i => i.id !== item.id)}; setInvestments(u); save(u); } }} className="p-2 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-600 hover:text-white transition-all"><LucideIcon name="Trash2" size={18} /></button>
                                                </div>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            const renderTickerTable = (cat, title) => (
                <div className="glass rounded-[2.5rem] overflow-hidden shadow-2xl animate-in">
                    <div className="p-8 bg-slate-50/50 border-b flex justify-between items-center">
                        <div>
                            <h2 className="font-black text-slate-800 uppercase tracking-tighter text-2xl">{title}</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ativos Sincronizados (Ticker)</p>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => sync(cat)} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 shadow-lg flex items-center gap-2"><LucideIcon name="RefreshCw" size={14} /> Sincronizar</button>
                            <button onClick={() => addTicker(cat)} className="bg-blue-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 shadow-lg">+ Adicionar Ticker</button>
                        </div>
                    </div>
                    <div className="overflow-x-auto custom-scroll">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                <tr>
                                    <th className="px-10 py-6">Ativo (Ticker)</th>
                                    <th className="px-10 py-6 text-center">Qtd</th>
                                    <th className="px-10 py-6">P. Compra</th>
                                    <th className="px-10 py-6">P. Atual</th>
                                    <th className="px-10 py-6">Patrimônio</th>
                                    <th className="px-10 py-6 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {(investments[cat] || []).map(item => {
                                    const totalVal = item.quantidade * item.precoAtual;
                                    const lucroVal = totalVal - (item.quantidade * item.precoMedio);
                                    const lucroPct = item.precoMedio > 0 ? ((item.precoAtual / item.precoMedio) - 1) * 100 : 0;
                                    return (
                                        <tr key={item.id} className="hover:bg-slate-50/50 tabular text-sm">
                                            <td className="px-10 py-6 font-black text-slate-900 uppercase">{item.ticker}</td>
                                            <td className="px-10 py-6 text-center font-bold text-slate-500">{item.quantidade}</td>
                                            <td className="px-10 py-6 text-slate-500 font-bold">{format(item.precoMedio)}</td>
                                            <td className="px-10 py-6 font-black text-blue-600">{format(item.precoAtual)}</td>
                                            <td className="px-10 py-6 font-black text-slate-900">
                                                {format(totalVal)}
                                                <span className={`block text-[10px] ${lucroVal >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                    {lucroVal >= 0 ? '+' : ''}{lucroPct.toFixed(2)}%
                                                </span>
                                            </td>
                                            <td className="px-10 py-6 text-right">
                                                <div className="flex justify-end gap-3">
                                                    <button onClick={() => editItem(cat, item.id, 'ticker')} className="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all"><LucideIcon name="Edit3" size={18} /></button>
                                                    <button onClick={() => { if(confirm("Excluir?")) { const u = {...investments, [cat]: investments[cat].filter(i => i.id !== item.id)}; setInvestments(u); save(u); } }} className="p-2 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-600 hover:text-white transition-all"><LucideIcon name="Trash2" size={18} /></button>
                                                </div>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
                    <header className="py-10 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 text-white p-4 rounded-[2rem] shadow-2xl">
                                <LucideIcon name="ShieldCheck" size={32} />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter uppercase leading-none">ICARO<span className="text-blue-600">INVEST</span></h1>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mt-1">Elite Management v6.0</p>
                            </div>
                        </div>
                        <nav className="flex bg-white p-2 rounded-[1.5rem] shadow-xl border border-slate-100 overflow-x-auto no-scrollbar max-w-full">
                            {[
                                { id: 'dashboard', icon: 'LayoutDashboard', label: 'Resumo' },
                                { id: 'acoes', icon: 'TrendingUp', label: 'Ações' },
                                { id: 'realEstate', icon: 'Home', label: 'RE' },
                                { id: 'caixa', icon: 'Landmark', label: 'Caixa' },
                                { id: 'alternativos', icon: 'Layers', label: 'Alt' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl text-xs font-black transition-all whitespace-nowrap ${activeTab === t.id ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <LucideIcon name={t.icon} size={14} /> {t.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {syncStatus && (
                        <div className="fixed top-10 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-8 py-3 rounded-full shadow-2xl text-[10px] font-black uppercase tracking-widest animate-in">
                            {syncStatus}
                        </div>
                    )}

                    <main className="space-y-10 animate-in">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                            <StatCard isMobile={isMobile} title="Património Total" value={format(totals.total)} icon="Wallet" colorClass="bg-slate-900" />
                            <StatCard isMobile={isMobile} title="Ações" value={format(totals.acoes)} icon="BarChart3" colorClass="bg-blue-600" />
                            <StatCard isMobile={isMobile} title="Real Estate" value={format(totals.re)} icon="Building2" colorClass="bg-emerald-500" />
                            <StatCard isMobile={isMobile} title="Reserva / Caixa" value={format(totals.caixa)} icon="PiggyBank" colorClass="bg-indigo-500" />
                            <StatCard isMobile={isMobile} title="Alternativos" value={format(totals.alt)} icon="Diamond" colorClass="bg-rose-500" />
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                <div className="lg:col-span-2 glass rounded-[2.5rem] p-10 min-h-[500px] flex flex-col shadow-inner">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-10 text-center">Alocação de Ativos</h2>
                                    <div className="flex-1 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={[{ name: 'Ações', value: totals.acoes }, { name: 'RE', value: totals.re }, { name: 'Caixa', value: totals.caixa }, { name: 'Alt', value: totals.alt }].filter(d => d.value > 0)} innerRadius={80} outerRadius={140} paddingAngle={8} dataKey="value" stroke="none" cornerRadius={12}>
                                                    {COLORS.map((c, i) => <Cell key={i} fill={c} />)}
                                                </Pie>
                                                <Tooltip contentStyle={{ borderRadius: '1.5rem', border: 'none', boxShadow: '0 25px 50px rgba(0,0,0,0.1)', fontWeight: '900' }} formatter={(v) => format(v)} />
                                                <Legend iconType="circle" />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                <div className="glass rounded-[2.5rem] p-10 shadow-inner">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Composição</h2>
                                    <div className="space-y-4">
                                        {[ { name: 'Ações', value: totals.acoes }, { name: 'Real Estate', value: totals.re }, { name: 'Caixa', value: totals.caixa }, { name: 'Alternativos', value: totals.alt } ].map((item, i) => (
                                            <div key={item.name} className="flex items-center justify-between p-5 bg-slate-50/50 rounded-3xl border border-slate-100 tabular">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-4 h-4 rounded-full" style={{ background: COLORS[i % COLORS.length] }}></div>
                                                    <span className="font-bold text-slate-700 text-sm">{item.name}</span>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-black text-slate-900">{format(item.value)}</p>
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{totals.total > 0 ? ((item.value / totals.total) * 100).toFixed(1) : 0}%</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'acoes' && renderTickerTable('acoes', 'Carteira de Ações')}
                        {activeTab === 'realEstate' && renderTickerTable('realEstate', 'Real Estate (FIIs)')}
                        
                        {activeTab === 'caixa' && (
                            <>
                                {renderManualTable('caixa', 'Reserva e Liquidez (Manual)')}
                                {renderTickerTable('caixaTicker', 'Renda Fixa Cotada (Tickers)')}
                            </>
                        )}
                        
                        {activeTab === 'alternativos' && (
                            <>
                                {renderManualTable('alternativos', 'Ativos Alternativos (Manual)')}
                                {renderTickerTable('altTicker', 'Ativos Cotados / Cripto (Tickers)')}
                            </>
                        )}
                    </main>

                    <footer className="mt-20 py-10 text-center border-t border-slate-100 text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">
                        IcaroInvest Management Systems &copy; 2026
                    </footer>
                </div>
            );
        };

        const start = () => { if (window.ReactDOM && window.React && window.Recharts) { ReactDOM.createRoot(document.getElementById('root')).render(<App />); } else { setTimeout(start, 50); } };
        start();
    </script>
</body>
</html>
