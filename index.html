                        list[idx].precoMedio = parseValue(editModal.precoMedio); list[idx].precoAtual = parseValue(editModal.precoAtual);
                        list[idx].metaRs = parseValue(editModal.metaRs); delete list[idx].metaPct;
                    } else {
                        list[idx].nome = editModal.nome; list[idx].valorAplicado = parseValue(editModal.valorAplicado);
                        list[idx].valorAtual = parseValue(editModal.valorAtual); list[idx].metaRs = parseValue(editModal.metaRs); delete list[idx].metaPct;
                    }
                    next[cat] = list; setInvestments(next); save(next); setSyncStatus("Atualizado!"); setTimeout(() => setSyncStatus(""), 2000);
                }
                setEditModal(prev => ({ ...prev, isOpen: false }));
            };

            const handleSaldoTransaction = () => {
                const val = parseValue(saldoModal.valor);
                if (isNaN(val) || val <= 0) { showAlert("Valor inválido."); return; }
                let next = { ...investments }; const currentSaldo = parseValue(next.saldoDisponivel);
                if (saldoModal.type === 'WITHDRAW') {
                    if (val > currentSaldo) { showAlert("Saldo livre insuficiente."); return; }
                    next.saldoDisponivel = currentSaldo - val;
                    next.movimentacoes = [registrarMovimentacao(saldoModal.data, 'SALDO', 'Saque', 1, val), ...(next.movimentacoes || [])];
                } else {
                    next.saldoDisponivel = currentSaldo + val;
                    next.movimentacoes = [registrarMovimentacao(saldoModal.data, 'SALDO', 'Depósito', 1, val), ...(next.movimentacoes || [])];
                }
                setInvestments(next); save(next); setSaldoModal(prev => ({ ...prev, isOpen: false }));
                setSyncStatus(saldoModal.type === 'WITHDRAW' ? "Saque realizado!" : "Depósito realizado!"); setTimeout(() => setSyncStatus(""), 3000);
            };

            const confirmarRecebimento = (divId) => {
                setInvestments(prev => {
                    const target = (prev.dividendos || []).find(d => d.id === divId); if (!target) return prev;
                    const updatedDivs = prev.dividendos.map(d => d.id === divId ? { ...d, status: 'pago' } : d);
                    const next = { ...prev, dividendos: updatedDivs, movimentacoes: [registrarMovimentacao(null, target.ativo, "Provento", 1, target.valor), ...(prev.movimentacoes || [])], saldoDisponivel: (parseValue(prev.saldoDisponivel) || 0) + parseValue(target.valor) };
                    save(next); return next;
                });
            };

            const renderTableSection = (cat, title, type = 'ticker') => {
                const rawData = (investments[cat] || []);
                const tempCustoTotal = rawData.reduce((acc, item) => acc + (type === 'ticker' ? (parseValue(item.quantidade) * parseValue(item.precoMedio)) : parseValue(item.valorAplicado)), 0);
                const processedData = rawData.map(item => {
                    const q = type === 'ticker' ? parseValue(item.quantidade) : 1;
                    const pA = type === 'ticker' ? parseValue(item.precoAtual) : parseValue(item.valorAtual);
                    const pC = type === 'ticker' ? parseValue(item.precoMedio) : parseValue(item.valorAplicado);
                    const varPct = type === 'ticker' ? parseValue(item.variacaoDia) : 0;
                    const pat = q * pA; const custoTotal = type === 'ticker' ? (q * pC) : pC;
                    const lucroR$ = pat - custoTotal; const lucroPct = custoTotal > 0 ? (lucroR$ / custoTotal) * 100 : 0;
                    let metaRs = 0;
                    if (item.metaRs !== undefined) metaRs = parseValue(item.metaRs);
                    else if (item.metaPct !== undefined && parseValue(item.metaPct) > 0) metaRs = (parseValue(item.metaPct) / 100) * tempCustoTotal;
                    let varR = 0; if (type === 'ticker' && varPct !== 0) { const prevP = pA / (1 + (varPct / 100)); varR = (pA - prevP) * q; }
                    return { ...item, _ativo: type === 'ticker' ? item.ticker : item.nome, _qtd: q, _custo: pC, _custoTotal: custoTotal, _atual: pA, _varPct: varPct, _varR: varR, _patrimonio: pat, _lucroR$: lucroR$, _lucroPct: lucroPct, _metaRs: metaRs, _diffCusto: metaRs - custoTotal };
                });
                const totalCustoCategory = processedData.reduce((acc, item) => acc + item._custoTotal, 0);
                const totalMetasPlaneadasRs = processedData.reduce((acc, item) => acc + item._metaRs, 0);
                const sortedData = [...processedData].sort((a, b) => {
                    const valA = a[sectionSort.key] ?? 0; const valB = b[sectionSort.key] ?? 0;
                    if (typeof valA === 'string') return sectionSort.dir === 'desc' ? valB.localeCompare(valA) : valA.localeCompare(valB);
                    return sectionSort.dir === 'desc' ? valB - valA : valA - valB;
                });
                const saldoAporteDiferenca = totalMetasPlaneadasRs - totalCustoCategory;

                return (
                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 animate-in mb-10">
                        <div className="p-8 bg-slate-50/30 border-b flex justify-between items-center flex-wrap gap-4">
                            <div>
                                <h2 className="font-black text-[#133054] uppercase tracking-tighter text-2xl">{title}</h2>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">
                                    Meta Planeada da Carteira: {formatBRL(totalMetasPlaneadasRs)} (Custo Atual Aportado: {formatBRL(totalCustoCategory)})
                                </p>
                            </div>
                            <button onClick={() => setNewAssetModal({ isOpen: true, cat, type })} className="bg-[#133054] text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black shadow-lg">
                                + Novo Ativo
                            </button>
                        </div>
                        <div className="px-8 py-6 bg-slate-50/10 border-b border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between"><span className="text-[9px] font-black uppercase text-slate-400 tracking-wider">O quanto tem investido (Custo Real)</span><span className="text-sm sm:text-base font-black text-slate-900 mt-1">{formatBRL(totalCustoCategory)}</span></div>
                            <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between"><span className="text-[9px] font-black uppercase text-slate-400 tracking-wider">O quanto tem que ter investido (Meta)</span><span className="text-sm sm:text-base font-black text-[#133054] mt-1">{formatBRL(totalMetasPlaneadasRs)}</span></div>
                            <div className={`p-4 rounded-2xl border shadow-sm flex flex-col justify-between ${saldoAporteDiferenca > 0 ? 'bg-amber-50/60 border-amber-100 text-amber-800' : saldoAporteDiferenca < 0 ? 'bg-emerald-50/60 border-emerald-100 text-emerald-800' : 'bg-slate-50 border-slate-100 text-slate-800'}`}>
                                <span className="text-[9px] font-black uppercase tracking-wider opacity-90">Saldo de Aporte</span>
                                <div className="flex items-center justify-between mt-1">
                                    <span className="text-sm sm:text-base font-black">{formatBRL(Math.abs(saldoAporteDiferenca))}</span>
                                    <span className={`text-[8px] font-black px-2 py-0.5 rounded-lg border uppercase tracking-widest ${saldoAporteDiferenca > 0 ? 'bg-white border-amber-200 text-amber-700' : saldoAporteDiferenca < 0 ? 'bg-white border-emerald-200 text-emerald-700' : 'bg-white border-slate-200 text-slate-700'}`}>{saldoAporteDiferenca > 0 ? "Falta Aportar (-)" : saldoAporteDiferenca < 0 ? "Sobra / Excesso (+)" : "Alinhado"}</span>
                                </div>
                            </div>
                        </div>
                        <div className="overflow-x-auto custom-scroll">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest cursor-pointer select-none">
                                    <tr>
                                        <th className="px-6 py-6" onClick={() => handleSectionSort('_ativo')}>Ativo <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        {type === 'ticker' && <th className="px-6 py-6 text-center" onClick={() => handleSectionSort('_qtd')}>Qtd <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>}
                                        <th className="px-6 py-6 text-right" onClick={() => handleSectionSort('_custoTotal')}>{type === 'ticker' ? 'Custo' : 'Aplicado'} <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        <th className="px-6 py-6 text-right" onClick={() => handleSectionSort('_metaRs')}>Meta (R$) <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        <th className="px-6 py-6 text-right" onClick={() => handleSectionSort('_diffCusto')}>Falta / Sobra <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        <th className="px-6 py-6 text-right" onClick={() => handleSectionSort('_atual')}>Valor Atual <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        {type === 'ticker' && <th className="px-6 py-6 text-right" onClick={() => handleSectionSort('_varPct')}>Var. Dia % <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>}
                                        <th className="px-6 py-6 text-right" onClick={() => handleSectionSort('_lucroR$')}>Lucro / Prejuízo <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        <th className="px-6 py-6 text-right" onClick={() => handleSectionSort('_patrimonio')}>Património <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        <th className="px-6 py-6 text-right min-w-[340px]">Gestão</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 tabular text-sm">
                                    {sortedData.map(item => (
                                        <tr key={item.id} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="px-6 py-6 font-black text-slate-900 uppercase">{item._ativo}</td>
                                            {type === 'ticker' && <td className="px-6 py-6 text-center font-bold">{item._qtd.toLocaleString(undefined, { maximumFractionDigits: 8 })}</td>}
                                            <td className="px-6 py-6 text-right font-bold text-slate-400">{formatBRL(item._custoTotal)}</td>
                                            <td className="px-6 py-6 text-right font-black text-slate-900">{formatBRL(item._metaRs)}</td>
                                            <td className="px-6 py-6 text-right font-bold">
                                                {item._metaRs === 0 && item._custoTotal === 0 ? (<span className="text-slate-300">-</span>) : item._metaRs === 0 && item._custoTotal > 0 ? (<div className="flex flex-col items-end"><span className="text-rose-600 font-black">-{formatBRL(item._custoTotal)}</span><span className="text-[8px] sm:text-[9px] font-black uppercase text-rose-500 bg-rose-50/80 border border-rose-100 px-2 py-0.5 rounded-lg tracking-wider mt-1 animate-pulse">Alerta de Venda</span></div>) : item._diffCusto > 0 ? (<span className="text-amber-500">Falta {formatBRL(item._diffCusto)}</span>) : (<span className="text-slate-400">Sobra {formatBRL(Math.abs(item._diffCusto))}</span>)}
                                            </td>
                                            <td className="px-6 py-6 text-right font-black text-[#133054]">{formatBRL(item._atual)}</td>
                                            {type === 'ticker' && <td className={`px-6 py-6 text-right font-bold ${item._varPct >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{item._varPct.toFixed(2)}%</td>}
                                            <td className={`px-6 py-6 text-right font-black ${item._lucroR$ >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}><div className="flex flex-col items-end"><span>{item._lucroR$ >= 0 ? '+' : ''}{formatBRL(item._lucroR$)}</span><span className="text-[10px] font-bold opacity-80">({item._lucroPct >= 0 ? '+' : ''}{item._lucroPct.toFixed(2)}%)</span></div></td>
                                            <td className="px-6 py-6 text-right font-black text-slate-900">{formatBRL(item._patrimonio)}</td>
                                            <td className="px-6 py-6 text-right">
                                                <div className="flex justify-end items-center gap-2">
                                                    <button onClick={() => {
                                                        const getMetaValue = () => { if (item.metaRs !== undefined) return item.metaRs.toString(); if (item.metaPct !== undefined && parseValue(item.metaPct) > 0) return ((parseValue(item.metaPct) / 100) * tempCustoTotal).toFixed(2); return '0'; };
                                                        setEditModal({ isOpen: true, cat, type, item, ticker: item.ticker || '', nome: item.nome || '', quantidade: item.quantidade !== undefined ? item.quantidade.toString() : '', precoMedio: item.precoMedio !== undefined ? item.precoMedio.toString() : '', precoAtual: item.precoAtual !== undefined ? item.precoAtual.toString() : '', valorAplicado: item.valorAplicado !== undefined ? item.valorAplicado.toString() : '', valorAtual: item.valorAtual !== undefined ? item.valorAtual.toString() : '', metaRs: getMetaValue() });
                                                    }} className="bg-slate-50 text-slate-700 hover:bg-[#133054] hover:text-white px-3 py-2 rounded-xl transition-all shadow-sm border border-slate-200 flex items-center gap-2 text-[9px] font-black uppercase tracking-widest"><LucideIcon name="Edit3" size={12}/> Editar</button>
                                                    {(cat === 'acoes' || cat === 'realEstate' || cat === 'caixaTicker') && (<button onClick={() => setProventoModal({ isOpen: true, ativo: item.ticker })} className="bg-emerald-50 text-emerald-600 px-3 py-2 rounded-xl border border-emerald-100 hover:bg-emerald-600 hover:text-white transition-all flex items-center gap-2 text-[9px] font-black uppercase tracking-widest"><LucideIcon name="Coins" size={12}/> Provento</button>)}
                                                    <button onClick={() => setTradeModal({ isOpen: true, cat, item, type, operation: 'BUY' })} className="bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white px-3 py-2 rounded-xl transition-all shadow-sm border border-emerald-100 flex items-center gap-2 text-[9px] font-black uppercase tracking-widest"><LucideIcon name="PlusCircle" size={12}/> Compra</button>
                                                    <button onClick={() => setTradeModal({ isOpen: true, cat, item, type, operation: 'SELL' })} className="bg-orange-50 text-orange-600 hover:bg-orange-600 hover:text-white px-3 py-2 rounded-xl transition-all shadow-sm border border-orange-100 flex items-center gap-2 text-[9px] font-black uppercase tracking-widest"><LucideIcon name="MinusCircle" size={12}/> Venda</button>
                                                    <button onClick={() => setConfirmDialog({ isOpen: true, message: `Tem a certeza que quer eliminar ${item._ativo} definitivamente?`, onConfirm: () => { const next = {...investments, [cat]: investments[cat].filter(i => i.id !== item.id)}; setInvestments(next); save(next); setConfirmDialog({ isOpen: false }); }})} className="bg-rose-50 text-rose-500 hover:bg-rose-600 hover:text-white px-3 py-2 rounded-xl transition-all shadow-sm border border-rose-100 flex items-center gap-2 text-[9px] font-black uppercase tracking-widest"><LucideIcon name="Trash2" size={12}/> Eliminar</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            if (authLoading) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50">
                    <div className="w-12 h-12 border-4 border-[#133054] border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-bold text-slate-400 animate-pulse uppercase tracking-widest text-xs">A validar segurança...</p>
                </div>
            );

            if (!user) return (
                <div className="flex items-center justify-center min-h-screen bg-slate-50 p-4">
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full border border-slate-100 text-center animate-in">
                        <div className="w-20 h-20 bg-[#133054] rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-xl"><LucideIcon name="ShieldCheck" size={40} className="text-white" /></div>
                        <h1 className="text-2xl font-black uppercase tracking-tight text-slate-900 mb-2">Icaro<span className="text-blue-600">Invest</span></h1>
                        <p className="text-sm font-bold text-slate-400 mb-6">{isRegistering ? "Crie uma nova conta segura para começar." : "Aceda à sua carteira de forma segura."}</p>
                        {loginError && <div className="mb-6 p-3.5 bg-rose-50 text-rose-700 border border-rose-100 rounded-2xl text-[10px] font-black uppercase tracking-wide text-left leading-relaxed">{loginError}</div>}
                        <form onSubmit={handleEmailAuth} className="space-y-4">
                            <div><input type="email" placeholder="O seu Email" value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-[#133054] focus:bg-white transition-all text-sm text-slate-900 text-left" required /></div>
                            <div><input type="password" placeholder="A sua Senha" value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-[#133054] focus:bg-white transition-all text-sm text-slate-900 text-left" required /></div>
                            <button type="submit" className="w-full bg-[#133054] text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-blue-900 transition-all shadow-lg flex justify-center items-center gap-3"><LucideIcon name={isRegistering ? "UserPlus" : "LogIn"} size={16} />{isRegistering ? "Registar Conta" : "Entrar no Sistema"}</button>
                        </form>
                        <div className="mt-6 text-center"><button onClick={() => { setIsRegistering(!isRegistering); setLoginError(""); }} className="text-[10px] font-black uppercase text-slate-400 hover:text-[#133054] tracking-widest transition-colors">{isRegistering ? "Já tem conta? Fazer Login" : "Não tem conta? Registar agora"}</button></div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
                    <header className="py-10 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setActiveTab('dashboard')}>
                            <div className="w-12 h-12 rounded-full overflow-hidden bg-slate-200 border-2 border-[#133054] shadow-md flex items-center justify-center">
                                <LucideIcon name="User" size={24} className="text-slate-400" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black uppercase tracking-tight text-slate-900 leading-none">Icaro<span className="text-blue-600">Invest</span></h1>
                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Bem-vindo, {user.email}</p>
                            </div>
                        </div>
                        <nav className="flex bg-white p-2 rounded-[1.5rem] shadow-sm border border-slate-100 overflow-x-auto no-scrollbar max-w-full">
                            {[{ id: 'dashboard', icon: 'LayoutDashboard', label: 'Resumo' }, { id: 'mercado', icon: 'Globe', label: 'Mercado' }, { id: 'acoes', icon: 'TrendingUp', label: 'Ações' }, { id: 'realEstate', icon: 'Home', label: 'RE' }, { id: 'caixa', icon: 'Landmark', label: 'Caixa' }, { id: 'alternativos', icon: 'Layers', label: 'Alt' }, { id: 'movimentacoes', icon: 'ArrowLeftRight', label: 'Mov' }, { id: 'dividendos', icon: 'Coins', label: 'Proventos' }, { id: 'historico', icon: 'History', label: 'Histórico' }, { id: 'config', icon: 'Settings', label: 'Definições' }].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-2 px-4 py-2.5 sm:px-6 sm:py-3 rounded-2xl text-[10px] sm:text-xs font-black transition-all whitespace-nowrap ${activeTab === t.id ? 'bg-[#133054] text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}><LucideIcon name={t.icon} size={14} /> {t.label}</button>
                            ))}
                        </nav>
                    </header>

                    {syncStatus && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-50 bg-[#133054] text-white px-8 py-3 rounded-full shadow-2xl text-[10px] font-black uppercase tracking-widest animate-in">{syncStatus}</div>}

                    <main className="space-y-10 animate-in">
                        {activeTab === 'config' && (
                            <div className="space-y-10 animate-fade">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100">
                                        <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4"><div className="bg-slate-100 p-3 rounded-xl text-slate-500"><LucideIcon name="User" size={20} /></div><h2 className="font-black text-[#133054] uppercase tracking-tighter text-xl">Perfil do Investidor</h2></div>
                                        <div className="space-y-4 mb-8">
                                            <div><p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Email Autenticado</p><p className="font-bold text-slate-900">{user.email}</p></div>
                                            <div><p className="text-[10px] font-black uppercase tracking-widest text-slate-400">ID de Segurança</p><p className="font-mono text-xs text-slate-500 bg-slate-50 p-2 rounded-lg break-all">{user.uid}</p></div>
                                        </div>
                                        <button onClick={handleLogout} className="w-full bg-rose-50 text-rose-600 border border-rose-100 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-rose-600 hover:text-white transition-all flex items-center justify-center gap-2"><LucideIcon name="LogOut" size={16} /> Terminar Sessão (Sair)</button>
                                    </div>
                                    <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100">
                                        <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4"><div className="bg-emerald-100 p-3 rounded-xl text-emerald-600"><LucideIcon name="Database" size={20} /></div><h2 className="font-black text-[#133054] uppercase tracking-tighter text-xl">Backup e Restauração</h2></div>
                                        <div className="space-y-6">
                                            <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                                <h3 className="font-black text-slate-800 uppercase tracking-widest text-[10px] mb-2">1. Exportar Dados (Backup)</h3>
                                                <button onClick={exportBackup} className="bg-[#133054] text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-black shadow-md flex items-center justify-center gap-2 w-full transition-all mt-4"><LucideIcon name="DownloadCloud" size={14} /> Download do Backup</button>
                                            </div>
                                            <div className="bg-amber-50 p-6 rounded-2xl border border-amber-100">
                                                <h3 className="font-black text-amber-800 uppercase tracking-widest text-[10px] mb-2">2. Restaurar Dados (Importar)</h3>
                                                <label className="bg-white text-amber-600 border border-amber-200 px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-amber-600 hover:text-white shadow-sm flex items-center justify-center gap-2 w-full transition-all cursor-pointer mt-4"><LucideIcon name="UploadCloud" size={14} /> Selecionar JSON<input type="file" accept=".json" onChange={handleImportBackup} ref={fileInputRef} className="hidden" /></label>
                                            </div>
                                            <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                                                <h3 className="font-black text-blue-800 uppercase tracking-widest text-[10px] mb-2">3. Migrar Dados Antigos</h3>
                                                <button onClick={handleMigrateOldData} className="bg-blue-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 shadow-sm flex items-center justify-center gap-2 w-full transition-all mt-4"><LucideIcon name="DatabaseBackup" size={14} /> Importar portfolio_principal</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-10 animate-fade">
                                <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3">
                                    <div className="glass p-3 sm:p-4 rounded-premium flex flex-col justify-between min-w-0 shadow-sm hover:shadow-md transition-all flex-1 border border-slate-100">
                                        <div className="flex items-center gap-2 sm:gap-3">
                                            <div className="bg-emerald-600 p-2 sm:p-3 rounded-xl sm:rounded-2xl text-white shadow-md flex-shrink-0"><LucideIcon name="Wallet" size={16} className="sm:w-5 sm:h-5" /></div>
                                            <div className="min-w-0 flex-1"><p className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-0.5 truncate">Saldo Livre</p><h3 className="text-xs sm:text-sm md:text-base lg:text-lg font-black tabular truncate text-slate-900">{formatBRL(totals.saldo)}</h3></div>
                                        </div>
                                        <div className="flex gap-1 mt-2.5 pt-2 border-t border-slate-100/60">
                                            <button onClick={() => setSaldoModal({ isOpen: true, type: 'DEPOSIT', valor: '', data: new Date().toLocaleDateString('pt-BR') })} className="flex-1 py-1 text-center bg-emerald-50 text-emerald-700 hover:bg-emerald-600 hover:text-white rounded-lg text-[8px] font-black uppercase tracking-wider transition-all">+ Depósito</button>
                                            <button onClick={() => setSaldoModal({ isOpen: true, type: 'WITHDRAW', valor: '', data: new Date().toLocaleDateString('pt-BR') })} className="flex-1 py-1 text-center bg-rose-50 text-rose-700 hover:bg-rose-600 hover:text-white rounded-lg text-[8px] font-black uppercase tracking-wider transition-all">- Saque</button>
                                        </div>
                                    </div>
                                    <StatCard isMobile={isMobile} title="Património" value={formatBRL(totals.total)} icon="PieChart" colorClass="bg-[#133054]" subValue={`${totals.varDiaTotal >= 0 ? '+' : ''}${formatBRL(totals.varDiaTotal)} (${totals.varDiaTotalPct >= 0 ? '+' : ''}${totals.varDiaTotalPct.toFixed(2)}%)`} />
                                    <StatCard isMobile={isMobile} title="Ações" value={formatBRL(totals.acoes.atual)} icon="BarChart3" colorClass="bg-[#bfa260]" subValue={`${totals.acoes.variacaoDiaR$ >= 0 ? '+' : ''}${formatBRL(totals.acoes.variacaoDiaR$)} (${totals.acoes.varDiaPct >= 0 ? '+' : ''}${totals.acoes.varDiaPct.toFixed(2)}%)`} />
                                    <StatCard isMobile={isMobile} title="RE" value={formatBRL(totals.re.atual)} icon="Building2" colorClass="bg-emerald-500" subValue={`${totals.re.variacaoDiaR$ >= 0 ? '+' : ''}${formatBRL(totals.re.variacaoDiaR$)} (${totals.re.varDiaPct >= 0 ? '+' : ''}${totals.re.varDiaPct.toFixed(2)}%)`} />
                                    <StatCard isMobile={isMobile} title="Caixa" value={formatBRL(totals.caixa.atual - totals.saldo)} icon="PiggyBank" colorClass="bg-slate-500" subValue={`${totals.caixa.variacaoDiaR$ >= 0 ? '+' : ''}${formatBRL(totals.caixa.variacaoDiaR$)} (${totals.caixa.varDiaPct >= 0 ? '+' : ''}${totals.caixa.varDiaPct.toFixed(2)}%)`} />
                                    <StatCard isMobile={isMobile} title="Alt" value={formatBRL(totals.alt.atual)} icon="Layers" colorClass="bg-rose-500" subValue={`${totals.alt.variacaoDiaR$ >= 0 ? '+' : ''}${formatBRL(totals.alt.variacaoDiaR$)} (${totals.alt.varDiaPct >= 0 ? '+' : ''}${totals.alt.varDiaPct.toFixed(2)}%)`} />
                                </div>
                                <div className="space-y-4">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Desempenho por Categoria (Abas)</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <CategoryPerformanceCard title="Ações / ETF" stats={totals.acoes} icon="BarChart3" colorClass="bg-[#bfa260]" borderClass="border-amber-100" />
                                        <CategoryPerformanceCard title="Real Estate" stats={totals.re} icon="Building2" colorClass="bg-emerald-500" borderClass="border-emerald-100" />
                                        <CategoryPerformanceCard title="Reserva e Caixa" stats={totals.caixa} icon="PiggyBank" colorClass="bg-slate-500" borderClass="border-slate-200" />
                                        <CategoryPerformanceCard title="Alternativos" stats={totals.alt} icon="Layers" colorClass="bg-rose-500" borderClass="border-rose-100" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 bg-white rounded-[2.5rem] p-10 min-h-[500px] flex flex-col shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-10 text-center">Alocação Total</h2>
                                        <div className="flex-1 w-full h-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart margin={{ top: 20, right: 35, left: 35, bottom: 20 }}>
                                                    <Pie data={[{ name: 'Ações', value: totals.acoes.atual }, { name: 'RE', value: totals.re.atual }, { name: 'Caixa', value: totals.caixa.atual }, { name: 'Alt', value: totals.alt.atual }].filter(d => d.value > 0)} innerRadius={isMobile ? 40 : 65} outerRadius={isMobile ? 70 : 100} paddingAngle={6} dataKey="value" stroke="none" cornerRadius={10} label={renderCustomizedLabel} labelLine={false}>{COLORS.map((c, i) => <Cell key={i} fill={c} />)}</Pie>
                                                    <Tooltip contentStyle={{ borderRadius: '1.5rem', border: 'none', boxShadow: '0 10px 20px rgba(0,0,0,0.05)', fontWeight: '900' }} formatter={(v) => formatBRL(v)} />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Composição</h2>
                                        <div className="space-y-4">
                                            {[ { label: 'Ações', v: totals.acoes, color: COLORS[0] }, { label: 'RE', v: totals.re, color: COLORS[1] }, { label: 'Caixa', v: totals.caixa, color: COLORS[2] }, { label: 'Alt', v: totals.alt, color: COLORS[4] } ].map(item => (
                                                <div key={item.label} className="p-5 bg-slate-50/50 rounded-3xl border border-slate-100 flex justify-between items-center"><div className="flex items-center gap-3"><div className="w-3 h-3 rounded-full" style={{ background: item.color }}></div><span className="font-bold text-slate-700 text-xs uppercase">{item.label}</span></div><span className="font-black text-slate-900 tabular">{formatBRL(item.v.atual)}</span></div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'mercado' && (
                            <div className="space-y-10 animate-in">
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                    <div className="p-8 bg-slate-50/30 border-b flex justify-between items-center flex-wrap gap-4">
                                        <div><h2 className="font-black text-[#133054] uppercase tracking-tighter text-2xl">Carteira Consolidada</h2><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Visão geral dos ativos cotados</p></div>
                                        <button onClick={syncGlobalPortfolio} disabled={globalSyncing} className={`bg-emerald-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 shadow-lg flex items-center gap-2 transition-all ${globalSyncing ? 'opacity-50' : ''}`}><LucideIcon name="RefreshCw" size={14} className={globalSyncing ? 'spin' : ''} /> {globalSyncing ? 'Sincronizando...' : 'Sincronizar B3'}</button>
                                    </div>
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest cursor-pointer select-none">
                                                <tr><th className="px-10 py-6" onClick={() => handleMarketSort('ativo')}>Ativos <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th><th className="px-10 py-6 text-center" onClick={() => handleMarketSort('qtd')}>QTY <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th><th className="px-10 py-6 text-right" onClick={() => handleMarketSort('custo')}>CUSTO <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th><th className="px-10 py-6 text-right" onClick={() => handleMarketSort('atual')}>ATUAL <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th><th className="px-10 py-6 text-right" onClick={() => handleMarketSort('varDia')}>VAR DIA % <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th><th className="px-10 py-6 text-right" onClick={() => handleMarketSort('varDiaR$')}>VAR DIA R$ <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th><th className="px-10 py-6 text-right" onClick={() => handleMarketSort('patrimonio')}>PATRIMONIO <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 tabular text-sm">
                                                {marketPortfolioList.map(item => (
                                                    <tr key={item.ativo + Math.random()} className="hover:bg-slate-50/50 transition-colors"><td className="px-10 py-6 font-black text-[#133054] uppercase">{item.ativo}</td><td className="px-10 py-6 text-center font-bold">{item.qtd.toLocaleString(undefined, { maximumFractionDigits: 8 })}</td><td className="px-10 py-6 text-right font-bold text-slate-400">{formatBRL(item.custo)}</td><td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(item.atual)}</td><td className={`px-10 py-6 text-right font-bold ${item.varDia >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{item.varDia.toFixed(2)}%</td><td className={`px-10 py-6 text-right font-bold ${item.varDiaR$ >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{formatBRL(item.varDiaR$)}</td><td className="px-10 py-6 text-right font-black text-slate-900">{formatBRL(item.patrimonio)}</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100"><div className="p-8 bg-emerald-50/50 border-b flex items-center gap-3"><div className="p-2 bg-emerald-600 rounded-lg text-white"><LucideIcon name="TrendingUp" size={20}/></div><h2 className="font-black text-emerald-800 uppercase tracking-tighter text-xl">Maiores Altas</h2></div><div className="p-4 space-y-2">{marketTopGainers.map((s) => (<div key={s.stock} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl"><span className="font-black text-[#133054] uppercase">{s.stock}</span><div className="text-right"><p className="font-black text-slate-900 text-xs">{formatBRL(s.close)}</p><p className="font-black text-emerald-600 text-[10px]">+{s.change.toFixed(2)}%</p></div></div>))}</div></div>
                                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100"><div className="p-8 bg-rose-50/50 border-b flex items-center gap-3"><div className="p-2 bg-rose-600 rounded-lg text-white"><LucideIcon name="TrendingDown" size={20}/></div><h2 className="font-black text-rose-800 uppercase tracking-tighter text-xl">Maiores Baixas</h2></div><div className="p-4 space-y-2">{marketTopLosers.map((s) => (<div key={s.stock} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl"><span className="font-black text-[#133054] uppercase">{s.stock}</span><div className="text-right"><p className="font-black text-slate-900 text-xs">{formatBRL(s.close)}</p><p className="font-black text-rose-600 text-[10px]">{s.change.toFixed(2)}%</p></div></div>))}</div></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'movimentacoes' && (

                                                    <td className="px-10 py-6 text-center font-bold">{m.quantidade.toLocaleString(undefined, { maximumFractionDigits: 8 })}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-slate-400">{formatBRL(m.valorUnitario)}</td>
                                                    <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(m.valorTotal)}</td>
                                                    <td className="px-10 py-6 text-right"><button onClick={() => setConfirmDialog({ isOpen: true, message: 'Deseja remover esta movimentação?', onConfirm: () => { const next = {...investments, movimentacoes: investments.movimentacoes.filter(x => x.id !== m.id)}; setInvestments(next); save(next); setConfirmDialog({isOpen: false}); }})} className="text-slate-200 hover:text-rose-500"><LucideIcon name="Trash2" size={16}/></button></td>

                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        {activeTab === 'dividendos' && (

                                    <div className="p-8 border-b flex justify-between items-center"><h2 className="text-2xl font-black uppercase text-[#133054]">Listagem de Proventos</h2><button onClick={() => setProventoModal({ isOpen: true, ativo: '' })} className="bg-emerald-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">+ Novo Provento</button></div>
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-400 font-black"><tr><th className="px-10 py-6">Data</th><th className="px-10 py-6">Ativo</th><th className="px-10 py-6 text-right">Valor</th><th className="px-10 py-6 text-center">Status</th><th className="px-10 py-6 text-right">Acções</th></tr></thead>

                                                {(investments.dividendos || []).map(d => (
                                                    <tr key={d.id} className="hover:bg-slate-50/50 transition-all">

                                                            <div className="flex justify-end gap-3">
                                                                {d.status === 'pendente' && <button onClick={() => confirmarRecebimento(d.id)} className="bg-emerald-600 text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase">Receber</button>}

                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'historico' && (
                            <div className="space-y-10 animate-in">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black uppercase text-[#133054]">Evolução Patrimonial</h2>

                                        const totalInvestido = (totals.acoes.investido || 0) + (totals.re.investido || 0) + (totals.caixa.investido || 0) + (totals.alt.investido || 0);
                                        const h = { id: Date.now().toString(), data: new Date().toLocaleDateString('pt-BR'), total: totals.total, investido: totalInvestido, dividendos: totals.divsPagos || 0, acoes: totals.acoes.atual, re: totals.re.atual, caixa: totals.caixa.atual, alt: totals.alt.atual }; 
                                        setInvestments(prev => { const next = { ...prev, historico: [h, ...(prev.historico || [])] }; save(next); return next; }); 
                                        setSyncStatus("Snapshot guardado!"); setTimeout(() => setSyncStatus(""), 2000); 
                                    }} className="bg-[#133054] text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg flex items-center gap-2"><LucideIcon name="Camera" size={14} /> Snapshot</button>

                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 overflow-x-auto custom-scroll">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                            <tr><th className="px-10 py-6">Data Snapshot</th><th className="px-10 py-6 text-right">Total</th><th className="px-10 py-6 text-right">Valor Investido</th><th className="px-10 py-6 text-right">Dividendos</th><th className="px-10 py-6 text-right">Ações</th><th className="px-10 py-6 text-right">RE</th><th className="px-10 py-6 text-right">Caixa</th><th className="px-10 py-6 text-right">Alt</th><th className="px-10 py-6 text-right">Acção</th></tr>

                                                    <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(h.total)}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-slate-500">{formatBRL(h.investido || 0)}</td>
                                                    <td className="px-10 py-6 text-right font-black text-emerald-600">{formatBRL(h.dividendos || 0)}</td>

                                                    <td className="px-10 py-6 text-right font-bold text-emerald-600">{formatBRL(h.re)}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-slate-500">{formatBRL(h.caixa)}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-rose-500">{formatBRL(h.alt)}</td>
                                                    <td className="px-10 py-6 text-right"><button onClick={() => setConfirmDialog({ isOpen: true, message: 'Eliminar snapshot?', onConfirm: () => { setInvestments(prev => { const next = {...prev, historico: prev.historico.filter(x => x.id !== h.id)}; save(next); return next; }); setConfirmDialog({isOpen: false}); }})} className="text-slate-200 hover:text-rose-500"><LucideIcon name="Trash2" size={16}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <>
                                <TabSummaryHeader stats={totals.acoes} label="Ações / ETF" />

                            <>
                                <TabSummaryHeader stats={totals.re} label="Real Estate (FIIs)" />
                                {renderTableSection('realEstate', 'Real Estate (FIIs)')}

                        {activeTab === 'caixa' && (
                            <>
                                <TabSummaryHeader stats={totals.caixa} label="Caixa" />

                                    </div>
                                </div>
                                {renderTableSection('caixa', 'Reserva Manual', 'manual')}
                                {renderTableSection('caixaTicker', 'Reserva Cotada', 'ticker')}
                            </>

                            <>
                                <TabSummaryHeader stats={totals.alt} label="Alternativos" />

                                {renderTableSection('altStocks', 'Stocks Alternativos', 'ticker')}
                                {renderTableSection('altCrypto', 'Crypto Assets', 'ticker')}
                            </>

                                <div className="flex justify-between items-center">

                                {modalError && (<div className="p-3.5 bg-rose-50 text-rose-700 border border-rose-100 rounded-2xl text-[10px] font-black uppercase flex items-center gap-2"><LucideIcon name="AlertCircle" size={14} className="flex-shrink-0" /><span>{modalError}</span></div>)}
                                <div className="space-y-4">
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center"><span className="text-[10px] font-black uppercase text-slate-400">Saldo Atualmente Livre:</span><span className="font-black text-slate-900 text-sm">{formatBRL(totals.saldo)}</span></div>
                                    <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Valor (R$)</label><input type="text" placeholder="0,00" value={saldoModal.valor} onChange={e => setSaldoModal(prev => ({ ...prev, valor: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>

                                </div>
                                <div className="flex gap-3 pt-4">
                                    <button onClick={() => { setSaldoModal(prev => ({ ...prev, isOpen: false })); setModalError(""); }} className="flex-1 py-3.5 border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-colors">Cancelar</button>
                                    <button onClick={handleSaldoTransaction} className={`flex-1 py-3.5 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest transition-colors ${saldoModal.type === 'DEPOSIT' ? 'bg-emerald-600 hover:bg-emerald-700 shadow-lg' : 'bg-rose-600 hover:bg-rose-700 shadow-lg'}`}>{saldoModal.type === 'DEPOSIT' ? 'Depositar' : 'Sacar'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {newAssetModal.isOpen && (() => {
                        const isTicker = newAssetModal.type === 'ticker';
                        return (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in">
                                <div className="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl border border-slate-100 space-y-6">
                                    <div className="flex justify-between items-center mb-2"><h3 className="text-xl font-black text-[#133054] uppercase tracking-tight">Adicionar Novo Ativo</h3><button onClick={() => setNewAssetModal({ isOpen: false })} className="text-slate-400 hover:text-slate-600"><LucideIcon name="X" size={20} /></button></div>
                                    <form onSubmit={(e) => { e.preventDefault(); handleCreateAsset(Object.fromEntries(new FormData(e.target))); }} className="space-y-4">
                                        {isTicker ? (
                                            <><input name="ticker" placeholder="Ticker (Ex: AAPL)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase outline-none focus:border-[#133054]" required /><input name="quantidade" placeholder="Quantidade" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required /><input name="precoMedio" placeholder="Preço Médio de Compra" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required /></>
                                        ) : (
                                            <><input name="nome" placeholder="Nome do Ativo" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required /><input name="valorAplicado" placeholder="Valor Aplicado" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required /><input name="valorAtual" placeholder="Valor Atual (Opcional)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" /></>
                                        )}
                                        <div className="flex gap-3 pt-4"><button type="button" onClick={() => setNewAssetModal({ isOpen: false })} className="flex-1 py-3.5 border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50">Cancelar</button><button type="submit" className="flex-1 py-3.5 bg-[#133054] text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black">Adicionar</button></div>
                                    </form>
                                </div>
                            </div>
                        );
                    })()}

                        const isBuy = tradeModal.operation === 'BUY';

                        const label = isBuy ? 'Comprar' : 'Vender';
                        const ativoNome = isTicker ? tradeModal.item.ticker : tradeModal.item.nome;
                        return (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in">
                                <div className="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl border border-slate-100 space-y-6">
                                    <div className="flex justify-between items-center mb-2"><h3 className={`text-xl font-black uppercase tracking-tight ${isBuy ? 'text-emerald-600' : 'text-orange-600'}`}>{label} {ativoNome}</h3><button onClick={() => setTradeModal({ isOpen: false })} className="text-slate-400 hover:text-slate-600"><LucideIcon name="X" size={20} /></button></div>
                                    <form onSubmit={(e) => { e.preventDefault(); handleExecuteTrade(Object.fromEntries(new FormData(e.target))); }} className="space-y-4">
                                        {isTicker ? (
                                            <><input name="quantidade" defaultValue="1" placeholder="Quantidade" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required /><input name="preco" defaultValue={tradeModal.item.precoAtual || tradeModal.item.precoMedio} placeholder="Preço Unitário" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required /></>
                                        ) : (
                                            <input name="valor" placeholder="Valor (R$)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required />
                                        )}
                                        <div className="flex gap-3 pt-4"><button type="button" onClick={() => setTradeModal({ isOpen: false })} className="flex-1 py-3.5 border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50">Cancelar</button><button type="submit" className={`flex-1 py-3.5 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest ${isBuy ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-orange-600 hover:bg-orange-700'}`}>Confirmar</button></div>
                                    </form>
                                </div>
                            </div>
                        );
                    })()}

                                <div className="flex justify-between items-center mb-2"><h3 className="text-xl font-black text-[#133054] uppercase tracking-tight">Lançar Provento {proventoModal.ativo && `- ${proventoModal.ativo}`}</h3><button onClick={() => setProventoModal({ isOpen: false })} className="text-slate-400 hover:text-slate-600"><LucideIcon name="X" size={20} /></button></div>

                                    {!proventoModal.ativo && <input name="ativo" placeholder="Ticker do Ativo" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase outline-none focus:border-[#133054]" required onChange={e => setProventoModal(prev => ({...prev, ativo: e.target.value}))} />}
                                    <input name="valor" placeholder="Valor do Provento (R$)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required />
                                    <input name="dataStr" defaultValue={new Date().toLocaleDateString('pt-BR')} placeholder="Data (DD/MM/AAAA)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054]" required />
                                    <div className="flex items-center gap-3 mt-2 px-1"><input type="checkbox" name="isPaid" id="isPaid" defaultChecked className="w-4 h-4 text-emerald-600" /><label htmlFor="isPaid" className="text-xs font-bold text-slate-700 uppercase tracking-wider cursor-pointer">Valor já Recebido (Pago)</label></div>
                                    <div className="flex gap-3 pt-4"><button type="button" onClick={() => setProventoModal({ isOpen: false })} className="flex-1 py-3.5 border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50">Cancelar</button><button type="submit" className="flex-1 py-3.5 bg-emerald-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700">Guardar</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL PREMIUM DE EDIÇÃO DE ATIVOS */}
                    {editModal.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in">
                            <div className="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl border border-slate-100 space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-xl font-black text-[#133054] uppercase tracking-tight">Editar Ativo</h3>
                                    <button onClick={() => setEditModal(prev => ({ ...prev, isOpen: false }))} className="text-slate-400 hover:text-slate-600 transition-colors"><LucideIcon name="X" size={20} /></button>
                                </div>
                                <div className="space-y-4">
                                    {editModal.type === 'ticker' ? (
                                        <>
                                            <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Ticker / Símbolo</label><input type="text" value={editModal.ticker} onChange={e => setEditModal(prev => ({ ...prev, ticker: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold uppercase outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>
                                            <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Quantidade</label><input type="text" value={editModal.quantidade} onChange={e => setEditModal(prev => ({ ...prev, quantidade: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>
                                            <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Preço Médio de Compra (R$)</label><input type="text" value={editModal.precoMedio} onChange={e => setEditModal(prev => ({ ...prev, precoMedio: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>
                                            <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Preço Atual / Cotação (R$)</label><input type="text" value={editModal.precoAtual} onChange={e => setEditModal(prev => ({ ...prev, precoAtual: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>
                                        </>
                                    ) : (
                                        <>
                                            <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Nome do Ativo</label><input type="text" value={editModal.nome} onChange={e => setEditModal(prev => ({ ...prev, nome: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>
                                            <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Valor Aplicado (R$)</label><input type="text" value={editModal.valorAplicado} onChange={e => setEditModal(prev => ({ ...prev, valorAplicado: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>
                                            <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Valor Atualizado (R$)</label><input type="text" value={editModal.valorAtual} onChange={e => setEditModal(prev => ({ ...prev, valorAtual: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>
                                        </>
                                    )}
                                    <div><label className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">Meta de Alocação Custo Ideal (R$)</label><input type="text" placeholder="Ex: 5000" value={editModal.metaRs} onChange={e => setEditModal(prev => ({ ...prev, metaRs: e.target.value }))} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none focus:border-[#133054] transition-all text-sm text-slate-900" /></div>
                                </div>
                                <div className="flex gap-3 pt-4"><button onClick={() => setEditModal(prev => ({ ...prev, isOpen: false }))} className="flex-1 py-3.5 border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-50 transition-colors">Cancelar</button><button onClick={handleSaveEdit} className="flex-1 py-3.5 bg-[#133054] text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black transition-colors">Gravar Ativo</button></div>
                            </div>
                        </div>
                    )}

                    {/* Dialog Genérico para Avisos de Erro / Alerta */}
                    {alertDialog.isOpen && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in">
                            <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-slate-100 text-center">
                                <LucideIcon name="Info" size={40} className="mx-auto text-blue-500 mb-4" />
                                <p className="font-bold text-slate-800 mb-6">{alertDialog.message}</p>
                                <button onClick={() => setAlertDialog({ isOpen: false, message: '' })} className="w-full py-3 bg-[#133054] text-white rounded-xl font-black uppercase text-[10px] tracking-widest">OK</button>
                            </div>
                        </div>
                    )}

                    {/* Dialog para Confirmações Críticas (Substitui confirm() do Browser) */}
                    {confirmDialog.isOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in">
                            <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl border border-slate-100 text-center">
                                <LucideIcon name="AlertTriangle" size={48} className="mx-auto text-amber-500 mb-4" />
                                <h3 className="text-lg font-black text-slate-900 mb-6">{confirmDialog.message}</h3>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmDialog({ isOpen: false })} className="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-2xl font-bold uppercase text-[10px] tracking-widest transition-colors">Cancelar</button>
                                    <button onClick={confirmDialog.onConfirm} className="flex-1 py-3.5 bg-rose-600 hover:bg-rose-700 text-white rounded-2xl font-bold uppercase text-[10px] tracking-widest transition-colors">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 py-10 text-center border-t border-slate-100 text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">IcaroInvest Elite Management v11.21</footer>
                </div>
            );
        };
        const start = () => { if (window.ReactDOM && window.React && window.Recharts) { ReactDOM.createRoot(document.getElementById('root')).render(<App />); } else { setTimeout(start, 50); } };
        start();
    </script>
</body>
</html>
